compatibility_claims:
  - id: sing_box_entware_baseline
    component_id: router_sing_box
    status: proven_good
    evidence:
      - live-check overall OK
      - leak-check overall OK
      - LAN managed-domain probe exits through Reality
      - managed HTTP 204 active probe passes through sing-box SOCKS/Reality path
    notes: Current stable router baseline remains the Entware package line.

  - id: sing_box_upstream_musl_candidate
    component_id: router_sing_box
    status: candidate
    evidence:
      - Config check and listeners are insufficient for adoption.
      - LAN/Wi-Fi transparent REDIRECT and managed HTTP 204 regression must pass before marking proven_good.
    notes: Keep rollback binary until all upgrade gates pass.

  - id: channel_c_native_client_support
    component_id: router_sing_box
    status: client_blocked
    evidence:
      - Router-side native Naive ingress is server-ready.
      - Tested iPhone SFI line did not support the required native Naive outbound.
    notes: C1-Shadowrocket remains the live-proven compatibility path.

  - id: channel_d_naiveproxy_lab
    component_id: router_channel_d_caddy_naiveproxy
    status: experimental
    evidence:
      - Disabled by default.
      - Uses a separate playbook, public port, Caddy binary, credentials and client artifacts.
      - Managed proof must show channel-d-naiveproxy-socks-in to reality-out for managed destinations and direct-out for non-managed destinations.
    notes: Channel D is removable and must not be treated as Channel C native Naive proof.

upgrade_gates:
  - id: router_sing_box_upgrade_gate
    component_id: router_sing_box
    required_checks:
      - candidate binary version prints successfully on router
      - candidate binary passes sing-box check -C /opt/etc/sing-box
      - old binary is backed up before replacement
      - service starts and expected listeners exist
      - live-check overall OK
      - leak-check overall OK
      - Reality cover SNI DNS rule remains present
      - plain HTTP generate_204 compatibility probe passes
      - managed HTTP 204 active probe passes through sing-box SOCKS/Reality path
      - real LAN/Wi-Fi managed-domain probe shows Reality exit
      - real LAN/Wi-Fi direct destination probe stays reachable
    rollback_action: Restore /opt/bin/sing-box.backup.* and restart sing-box.

  - id: router_port_change_gate
    component_id: router_firewall_ipset
    required_checks:
      - runtime-inventory static validation passes
      - ansible singbox_client validation passes
      - live-check confirms listener and firewall rules
      - no conflict group contains duplicate source_var references
    rollback_action: Restore previous Vault/local vars and redeploy only after approval.
