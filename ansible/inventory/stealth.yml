all:
  children:
    vps_stealth:
      hosts:
        stealth-vps:
          ansible_host: "{{ vps_ssh_host }}"
          ansible_user: "{{ vps_ssh_user }}"
          ansible_python_interpreter: /usr/bin/python3
    vps_egress_hermes:
      hosts:
        hermes-egress:
          ansible_host: "{{ vault_router_hermes_vps_ssh_host | default(vault_router_hermes_vps_host, true) }}"
          ansible_user: "{{ vault_router_hermes_vps_ssh_user }}"
          ansible_port: "{{ vault_router_hermes_vps_ssh_port | default(22) }}"
          ansible_ssh_private_key_file: "{{ vault_router_hermes_vps_ssh_key }}"
          ansible_python_interpreter: /usr/bin/python3
    routers:
      hosts:
        router-home:
          ansible_host: "{{ router_ssh_host }}"
          ansible_user: "{{ router_ssh_user }}"
          ansible_shell_executable: /bin/sh
          ansible_python_interpreter: /opt/bin/python3
