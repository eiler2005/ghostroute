# Managed egress backend for the stable router-side reality-out tag.
# primary_vps keeps the owned VPS Reality/Vision path. backup_reality is a
# manual reserve mode for a Vault-backed router-only VLESS/Reality provider
# profile for emergency managed egress.
router_managed_egress_mode: "{{ vault_router_managed_egress_mode | default('primary_vps') }}"
# Independent Channel D managed egress selector. 'follow' (default) keeps Channel D
# on the shared reality-out backend as Channel A/B/C; primary_vps/backup_reality/
# hermes_vps pin Channel D to its own reality-out-d backend (canary lane). Pins
# reuse the existing router_hermes_vps_* / router_backup_reality_* endpoints.
channel_d_managed_egress_mode: "{{ vault_channel_d_managed_egress_mode | default('follow') }}"
router_backup_dns_mode: "{{ vault_router_backup_dns_mode | default('cover_dns') }}"
router_backup_reality_server: "{{ vault_router_backup_reality_server | default('') }}"
router_backup_reality_server_port: "{{ vault_router_backup_reality_server_port | default(443) }}"
router_backup_reality_uuid: "{{ vault_router_backup_reality_uuid | default('') }}"
router_backup_reality_flow: "{{ vault_router_backup_reality_flow | default('xtls-rprx-vision') }}"
router_backup_reality_packet_encoding: "{{ vault_router_backup_reality_packet_encoding | default('xudp') }}"
router_backup_reality_server_name: "{{ vault_router_backup_reality_server_name | default('') }}"
router_backup_reality_utls_fingerprint: "{{ vault_router_backup_reality_utls_fingerprint | default('chrome') }}"
router_backup_reality_public_key: "{{ vault_router_backup_reality_public_key | default('') }}"
router_backup_reality_short_id: "{{ vault_router_backup_reality_short_id | default('') }}"
router_hermes_dns_mode: "{{ vault_router_hermes_dns_mode | default('managed_vps_dns') }}"
router_hermes_vps_host: "{{ vault_router_hermes_vps_host | default(vault_router_hermes_vps_ssh_host | default(''), true) }}"
router_hermes_vps_port: "{{ vault_router_hermes_vps_port | default(443) }}"
router_hermes_vps_server_name: "{{ vault_router_hermes_vps_server_name | default((reality_server_names | default(['']))[0], true) }}"
router_hermes_vps_utls_fingerprint: "{{ vault_router_hermes_vps_utls_fingerprint | default('chrome') }}"
router_hermes_vps_unbound_target_host: "{{ vault_router_hermes_vps_unbound_target_host | default(router_hermes_vps_host, true) }}"
router_hermes_vps_unbound_port: "{{ vault_router_hermes_vps_unbound_port | default(vps_unbound_listen_port | default(15353), true) }}"
router_hermes_vps_ssh_host: "{{ vault_router_hermes_vps_ssh_host | default(router_hermes_vps_host, true) }}"
