# Legacy TUN interface name kept only for cleanup and verification of absence.
singbox_tun_name: singbox0
singbox_tun_addr_v4: "172.19.0.1/30"
singbox_tun_mtu: 1400
singbox_bin_path: /opt/bin/sing-box
singbox_log_path: /opt/var/log/sing-box.log
singbox_config_path: /opt/etc/sing-box/config.json
singbox_init_path: /opt/etc/init.d/S99sing-box
singbox_redirect_port: "{{ vault_singbox_redirect_port | default(lookup('ansible.builtin.ini', 'GHOSTROUTE_REDIRECT_PORT type=properties file=../../.env', errors='ignore'), true) | default(singbox_redirect_port_secret | default('12' ~ '345'), true) }}"
singbox_dnscrypt_socks_port: "{{ vault_singbox_dnscrypt_socks_port | default(lookup('ansible.builtin.ini', 'GHOSTROUTE_DNSCRYPT_SOCKS_PORT type=properties file=../../.env', errors='ignore'), true) | default(singbox_dnscrypt_socks_port_secret | default('10' ~ '80'), true) }}"
singbox_watchdog_path: /jffs/scripts/singbox-watchdog.sh
home_reality_enabled: true
home_reality_listen: "0.0.0.0"
home_reality_ingress_port: "{{ vault_home_reality_ingress_port | default(lookup('ansible.builtin.ini', 'GHOSTROUTE_HOME_REALITY_PORT type=properties file=../../.env', errors='ignore'), true) | default(home_reality_ingress_port_secret | default('419' ~ '53'), true) }}"
home_reality_connlimit_above: 500
home_reality_mss: 1360
# Backward-compatible alias for older docs/scripts; new code should use
# home_reality_ingress_port.
home_reality_port: "{{ home_reality_ingress_port }}"
home_reality_public_host: "{{ vault_home_reality_public_host | default(home_reality_public_host_secret | default('home.example.invalid')) }}"
home_reality_dest: "gateway.icloud.com:443"
home_reality_dest_host: "{{ home_reality_dest.split(':')[0] }}"
home_reality_dest_port: "{{ home_reality_dest.split(':')[1] | int }}"
home_reality_server_names:
  - "gateway.icloud.com"

# Channel B home-first relay: mobile clients connect to a dedicated home
# XHTTP+TLS ingress on router, then router forwards upstream through local
# sing-box SOCKS -> Reality outbound to VPS.
channel_b_xhttp_enabled: "{{ vault_channel_b_xhttp_enabled | default(false) }}"
channel_b_xhttp_public_host: "{{ vault_channel_b_xhttp_public_host | default('') }}"
channel_b_xhttp_path: "{{ vault_channel_b_xhttp_path | default('/assets/update') }}"
channel_b_xhttp_mode: "{{ vault_channel_b_xhttp_mode | default('packet-up') }}"
channel_b_xhttp_clients: "{{ vault_channel_b_xhttp_clients | default([]) }}"
channel_b_home_relay_enabled: "{{ vault_channel_b_home_relay_enabled | default(channel_b_xhttp_enabled, true) }}"
channel_b_home_listen: "0.0.0.0"
channel_b_home_ingress_port: "{{ vault_channel_b_home_ingress_port | default((home_reality_ingress_port | int) + 1, true) }}"
channel_b_home_clients: "{{ vault_channel_b_home_clients | default(channel_b_xhttp_clients | default([]), true) }}"
channel_b_home_connlimit_above: 500
channel_b_home_mss: 1360
channel_b_home_xhttp_host: "{{ vault_channel_b_home_xhttp_host | default(home_reality_public_host, true) }}"
channel_b_home_xhttp_path: "{{ vault_channel_b_home_xhttp_path | default(channel_b_xhttp_path, true) }}"
channel_b_home_xhttp_mode: "{{ vault_channel_b_home_xhttp_mode | default(channel_b_xhttp_mode, true) }}"
channel_b_home_upstream_socks_port: "{{ vault_channel_b_home_upstream_socks_port | default((singbox_dnscrypt_socks_port | int) + 1, true) }}"
channel_b_home_router_xray_bin_path: /opt/bin/xray
channel_b_home_router_xray_config_path: /opt/etc/xray/channel-b-home-relay.json
channel_b_home_router_xray_init_path: /opt/etc/init.d/S99xray-channel-b-home
channel_b_home_router_xray_log_path: /opt/var/log/xray-channel-b-home.log

# Channel C1 home-first Naive lane: selected clients connect to a browser-like
# HTTPS/H2 CONNECT-compatible ingress on the home endpoint. Router-side
# sing-box then applies the same managed split as the other home-first lanes.
channel_c_home_enabled: "{{ vault_channel_c_home_enabled | default(false) }}"
channel_c_home_listen: "0.0.0.0"
channel_c_home_public_host: "{{ vault_channel_c_home_public_host | default(home_reality_public_host, true) }}"
channel_c_home_public_port: "{{ vault_channel_c_home_public_port | default(443, true) }}"
channel_c_home_ingress_port: "{{ vault_channel_c_home_ingress_port | default((home_reality_ingress_port | int) + 2, true) }}"
channel_c_home_clients: "{{ vault_channel_c_home_clients | default([]) }}"
channel_c_home_connlimit_above: "{{ vault_channel_c_home_connlimit_above | default(300) }}"
channel_c_home_mss: "{{ vault_channel_c_home_mss | default(1360) }}"
channel_c_home_tls_cert_path: "{{ vault_channel_c_home_tls_cert_path | default('/opt/etc/sing-box/channel-c-home-fullchain.pem') }}"
channel_c_home_tls_key_path: "{{ vault_channel_c_home_tls_key_path | default('/opt/etc/sing-box/channel-c-home-privkey.pem') }}"
channel_c_home_tls_cert_pem: "{{ vault_channel_c_home_tls_cert_pem | default('') }}"
channel_c_home_tls_key_pem: "{{ vault_channel_c_home_tls_key_pem | default('') }}"

dnscrypt_port: "{{ vault_dnscrypt_port | default(lookup('ansible.builtin.ini', 'GHOSTROUTE_DNSCRYPT_PORT type=properties file=../../.env', errors='ignore'), true) | default(dnscrypt_port_secret | default('535' ~ '4'), true) }}"
dnscrypt_listen: "127.0.0.1:{{ dnscrypt_port }}"
dnscrypt_bin_path: /opt/sbin/dnscrypt-proxy
dnscrypt_config_path: /opt/etc/dnscrypt-proxy.toml
dnscrypt_init_path: /opt/etc/init.d/S09dnscrypt-proxy2

stealth_route_init_script: /jffs/scripts/stealth-route-init.sh
stealth_dnsmasq_conf_path: /jffs/configs/dnsmasq-stealth.conf.add
stealth_test_domain: ifconfig.me
stealth_test_upstream: 1.1.1.1
stealth_static_source_ipset: VPN_STATIC_NETS
stealth_channel_a_lan_enabled: true
router_tcp_perf_tuning_enabled: true
router_tcp_rmem: "4096 262144 16777216"
router_tcp_wmem: "4096 65536 16777216"
router_tcp_rmem_max: 16777216
router_tcp_wmem_max: 16777216
router_tcp_mtu_probing: 1
router_tcp_slow_start_after_idle: 0
router_tcp_window_scaling: 1
router_tcp_sack: 1
router_tcp_timestamps: 1
firewall_start_hook: /jffs/scripts/firewall-start
services_start_hook: /jffs/scripts/services-start
blocklist_update_script: /jffs/scripts/blocklist-update.sh
blocklist_output: /opt/etc/dnsmasq.d/blocklists.conf.auto
