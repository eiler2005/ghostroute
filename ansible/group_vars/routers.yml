home_reality_server_names:
  - "gateway.icloud.com"
home_reality_handshake_host: "{{ vault_home_reality_handshake_host | default('setup.icloud.com') }}"

# Channel B home-first relay: mobile clients connect to a dedicated home
# XHTTP+TLS ingress on router, then router forwards upstream through local
# sing-box SOCKS -> Reality outbound to VPS.
channel_b_xhttp_enabled: "{{ vault_channel_b_xhttp_enabled | default(false) }}"
channel_b_xhttp_public_host: "{{ vault_channel_b_xhttp_public_host | default('') }}"
channel_b_xhttp_path: "{{ vault_channel_b_xhttp_path | default('/assets/update') }}"
channel_b_xhttp_mode: "{{ vault_channel_b_xhttp_mode | default('packet-up') }}"
channel_b_xhttp_clients: "{{ vault_channel_b_xhttp_clients | default([]) }}"
channel_b_home_relay_enabled: "{{ vault_channel_b_home_relay_enabled | default(channel_b_xhttp_enabled, true) }}"
channel_b_home_listen: "0.0.0.0"
channel_b_home_ingress_port: "{{ vault_channel_b_home_ingress_port | default((home_reality_ingress_port | int) + 1, true) }}"
channel_b_home_clients: "{{ vault_channel_b_home_clients | default(channel_b_xhttp_clients | default([]), true) }}"
channel_b_home_connlimit_above: 500
channel_b_home_mss: 1360
channel_b_home_xhttp_host: "{{ vault_channel_b_home_xhttp_host | default(home_reality_public_host, true) }}"
channel_b_home_xhttp_path: "{{ vault_channel_b_home_xhttp_path | default(channel_b_xhttp_path, true) }}"
channel_b_home_xhttp_mode: "{{ vault_channel_b_home_xhttp_mode | default(channel_b_xhttp_mode, true) }}"
channel_b_home_upstream_socks_port: "{{ vault_channel_b_home_upstream_socks_port | default((singbox_dnscrypt_socks_port | int) + 1, true) }}"
channel_b_home_router_xray_bin_path: /opt/bin/xray
channel_b_home_router_xray_config_path: /opt/etc/xray/channel-b-home-relay.json
channel_b_home_router_xray_init_path: /opt/etc/init.d/S99xray-channel-b-home
channel_b_home_router_xray_log_path: /opt/var/log/xray-channel-b-home.log

