# Channel D router-native NaiveProxy lab: Karing/Naive clients connect to
# Caddy forward_proxy@naive on the home endpoint, then Caddy relays into a
# local sing-box SOCKS inbound that applies the managed split. This lane is
# experimental, disabled by default, and isolated from Channel A/B/C ownership.
channel_d_naiveproxy_enabled: "{{ vault_channel_d_naiveproxy_enabled | default(false) }}"
channel_d_naiveproxy_profiles_enabled: "{{ vault_channel_d_naiveproxy_profiles_enabled | default(channel_d_naiveproxy_enabled, true) }}"
channel_d_naiveproxy_public_host: "{{ vault_channel_d_naiveproxy_public_host | default(channel_c_home_public_host | default(home_reality_public_host, true), true) }}"
channel_d_naiveproxy_public_port: "{{ vault_channel_d_naiveproxy_public_port | default(4444, true) }}"
channel_d_naiveproxy_ingress_port: "{{ vault_channel_d_naiveproxy_ingress_port | default((channel_m_maxtg_reverse_ingress_port | int) + 1, true) }}"
channel_d_naiveproxy_upstream_socks_port: "{{ vault_channel_d_naiveproxy_upstream_socks_port | default((channel_d_naiveproxy_ingress_port | int) + 1, true) }}"
channel_d_naiveproxy_clients: "{{ vault_channel_d_naiveproxy_clients | default([]) }}"
channel_d_naiveproxy_connlimit_above: "{{ vault_channel_d_naiveproxy_connlimit_above | default(300) }}"
channel_d_naiveproxy_mss: "{{ vault_channel_d_naiveproxy_mss | default(1360) }}"
channel_d_naiveproxy_tls_cert_path: "{{ vault_channel_d_naiveproxy_tls_cert_path | default(channel_c_home_tls_cert_path, true) }}"
channel_d_naiveproxy_tls_key_path: "{{ vault_channel_d_naiveproxy_tls_key_path | default(channel_c_home_tls_key_path, true) }}"
channel_d_naiveproxy_caddy_bin_path: "{{ vault_channel_d_naiveproxy_caddy_bin_path | default('/opt/bin/caddy-channel-d-naiveproxy') }}"
channel_d_naiveproxy_caddy_config_path: "{{ vault_channel_d_naiveproxy_caddy_config_path | default('/opt/etc/caddy/channel-d-naiveproxy/Caddyfile') }}"
