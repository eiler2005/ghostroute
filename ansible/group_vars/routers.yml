singbox_watchdog_path: /jffs/scripts/singbox-watchdog.sh
home_reality_enabled: true
home_reality_listen: "0.0.0.0"
home_reality_ingress_port: "{{ vault_home_reality_ingress_port | default(lookup('ansible.builtin.ini', 'GHOSTROUTE_HOME_REALITY_PORT type=properties file=../../.env', errors='ignore'), true) | default(home_reality_ingress_port_secret | default('419' ~ '53'), true) }}"
home_reality_connlimit_above: 500
home_reality_mss: 1360
# Backward-compatible alias for older docs/scripts; new code should use
# home_reality_ingress_port.
home_reality_port: "{{ home_reality_ingress_port }}"
home_reality_public_host: "{{ vault_home_reality_public_host | default(home_reality_public_host_secret | default('home.example.invalid')) }}"
home_reality_dest: "gateway.icloud.com:443"
