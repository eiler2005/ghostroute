stealth_stack_dir: /opt/stealth
caddy_dockerfile: caddy/Dockerfile
caddy_caddyfile: caddy/Caddyfile
caddy_image_tag: caddy-l4:local
xui_image: "ghcr.io/mhsanaei/3x-ui:latest"
xray_reality_listen_port: "{{ vault_xray_reality_listen_port | default(xray_reality_listen_port_secret | default(8443)) }}"

# Actual VPS currently has host-level Caddy already bound on :80/:443 for an
# existing site. Real hostnames, upstream ports and certificate paths are kept
# in ansible-vault (`ansible/secrets/stealth.yml`), not in git.
# In this mode we extend that Caddy with the layer4 plugin and a listener wrapper
# instead of starting a second public-facing Caddy container.
stealth_caddy_mode: system_listener_wrapper
system_caddy_target_version: "v2.11.1"
system_caddy_binary_path: /usr/bin/caddy
system_caddy_backup_path: /usr/bin/caddy.router-configuration.bak
system_caddyfile_path: /etc/caddy/Caddyfile
system_caddy_site_enabled: "{{ vault_system_caddy_site_enabled | default(system_caddy_site_enabled_secret | default(false)) }}"
system_caddy_site_host: "{{ vault_system_caddy_site_host | default(system_caddy_site_host_secret | default('example.invalid')) }}"
system_caddy_site_port: "{{ vault_system_caddy_site_port | default(system_caddy_site_port_secret | default(9443)) }}"
system_caddy_site_upstream: "{{ vault_system_caddy_site_upstream | default(system_caddy_site_upstream_secret | default('127.0.0.1:8080')) }}"
system_caddy_cert_file: "{{ vault_system_caddy_cert_file | default(system_caddy_cert_file_secret | default('/etc/caddy/certs/example-fullchain.pem')) }}"
system_caddy_key_file: "{{ vault_system_caddy_key_file | default(system_caddy_key_file_secret | default('/etc/caddy/certs/example-privkey.pem')) }}"
system_caddy_client_ca_file: "{{ vault_system_caddy_client_ca_file | default(system_caddy_client_ca_file_secret | default('/etc/caddy/certs/example-access-ca.crt')) }}"

# Phase 2 placeholder only. The mobile self-check receiver is disabled until a
# public hostname and token are explicitly added to ansible-vault.
mobile_checkin_enabled: "{{ vault_mobile_checkin_enabled | default(false) }}"
mobile_checkin_public_host: "{{ vault_mobile_checkin_public_host | default('') }}"
mobile_checkin_token: "{{ vault_mobile_checkin_token | default('') }}"

# Channel B and C are manual QR/profile-only lanes. They share public :443 via
# Caddy SNI and must not touch current Reality SNI. Channel B may be consumed
# directly by clients or via the optional home-first router relay add-on.
channel_b_xhttp_enabled: "{{ vault_channel_b_xhttp_enabled | default(false) }}"
channel_b_xhttp_image: "{{ vault_channel_b_xhttp_image | default('ghcr.io/xtls/xray-core:26.3.27') }}"
channel_b_xhttp_public_host: "{{ vault_channel_b_xhttp_public_host | default('') }}"
channel_b_xhttp_local_port: "{{ vault_channel_b_xhttp_local_port | default(18081) }}"
channel_b_xhttp_path: "{{ vault_channel_b_xhttp_path | default('/assets/update') }}"
channel_b_xhttp_mode: packet-up
channel_b_xhttp_clients: "{{ vault_channel_b_xhttp_clients | default([]) }}"
channel_b_xhttp_block_udp_443: "{{ vault_channel_b_xhttp_block_udp_443 | default(false) }}"

channel_c_naive_enabled: "{{ vault_channel_c_naive_enabled | default(false) }}"
channel_c_naive_backend: "{{ vault_channel_c_naive_backend | default('squid_tls') }}"
channel_c_naive_public_host: "{{ vault_channel_c_naive_public_host | default('') }}"
channel_c_naive_username: "{{ vault_channel_c_naive_username | default('') }}"
channel_c_naive_password: "{{ vault_channel_c_naive_password | default('') }}"
channel_c_naive_tinyproxy_local_port: "{{ vault_channel_c_naive_tinyproxy_local_port | default(18888) }}"
channel_c_naive_squid_local_port: "{{ vault_channel_c_naive_squid_local_port | default(18889) }}"
channel_c_naive_stunnel_local_port: "{{ vault_channel_c_naive_stunnel_local_port | default(18443) }}"
channel_c_naive_hide_ip_enabled: "{{ vault_channel_c_naive_hide_ip_enabled | default(true) }}"
channel_c_naive_hide_via_enabled: "{{ vault_channel_c_naive_hide_via_enabled | default(true) }}"
channel_c_naive_probe_resistance_enabled: "{{ vault_channel_c_naive_probe_resistance_enabled | default(true) }}"
channel_c_naive_probe_resistance_host: "{{ vault_channel_c_naive_probe_resistance_host | default('') }}"
channel_c_naive_clients: "{{ vault_channel_c_naive_clients | default(channel_b_xhttp_clients | default([])) }}"
