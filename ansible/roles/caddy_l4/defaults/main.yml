---
# Project role defaults. Production hostnames/cert paths belong in group_vars or vault.
stealth_stack_dir: /opt/stealth
stealth_caddy_mode: system_listener_wrapper
caddy_image_tag: caddy-l4:local
system_caddy_binary_path: /usr/bin/caddy
system_caddy_backup_path: /usr/bin/caddy.router-configuration.bak
system_caddyfile_path: /etc/caddy/Caddyfile
system_caddy_target_version: v2.11.1
system_caddy_site_enabled: false
system_caddy_site_host: example.invalid
system_caddy_site_port: 9443
system_caddy_site_upstream: 127.0.0.1:8080
system_caddy_cert_file: /etc/caddy/certs/example-fullchain.pem
system_caddy_key_file: /etc/caddy/certs/example-privkey.pem
system_caddy_client_ca_file: /etc/caddy/certs/example-access-ca.crt
xray_reality_listen_port: 8443
reality_server_names:
  - gateway.icloud.com

# Channel B direct mode is add-only and disabled until a real vault-only public
# hostname, path and credentials are supplied. Channel C is router-side only.
channel_b_xhttp_enabled: false
channel_b_xhttp_public_host: ""
channel_b_xhttp_local_port: 18081
channel_b_xhttp_path: /assets/update
channel_bc_access_log_enabled: true
caddy_l4_matching_timeout: 15s
