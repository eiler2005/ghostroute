- name: Detect WAN interface and gateway
  ansible.builtin.raw: |
    echo "wan_if=$(nvram get wan0_ifname)"
    echo "wan_gw=$(nvram get wan0_gateway)"
  register: wan_detect
  changed_when: false

- name: Parse WAN facts
  ansible.builtin.set_fact:
    wan_if: "{{ (wan_detect.stdout | regex_search('wan_if=(\\S+)', '\\1')) | first }}"
    wan_gw: "{{ (wan_detect.stdout | regex_search('wan_gw=(\\S+)', '\\1')) | first }}"

- name: Ensure router script directories exist
  ansible.builtin.raw: |
    mkdir -p /jffs/scripts {{ dns_catalog_script_dir }} /jffs/configs
  changed_when: false

- name: Install managed routing-core boot hooks
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../modules/routing-core/router/{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0755"
  loop:
    - { src: firewall-start, dest: "{{ firewall_start_hook }}" }
    - { src: nat-start, dest: "{{ nat_start_hook }}" }
    - { src: cron-save-ipset, dest: "{{ cron_save_ipset_script }}" }
    - { src: services-start, dest: "{{ services_start_hook }}" }

- name: Install stealth-route-init.sh
  ansible.builtin.template:
    src: stealth-route-init.sh.j2
    dest: "{{ stealth_route_init_script }}"
    mode: "0755"

- name: Install GhostRoute private runtime env
  ansible.builtin.template:
    src: ghostroute-runtime.env.j2
    dest: /jffs/scripts/ghostroute-runtime.env
    mode: "0600"

- name: Install dnsmasq stealth catalog
  ansible.builtin.copy:
    content: |
      {{ lookup('ansible.builtin.file', playbook_dir + '/../../configs/dnsmasq-stealth.conf.add') }}
      {% set private_catalog = lookup('ansible.builtin.file', playbook_dir + '/../../configs/private/dnsmasq-stealth.local.conf.add', errors='ignore') | default('', true) %}
      {% if private_catalog | length > 0 %}
      # BEGIN local private dnsmasq stealth catalog
      {{ private_catalog }}
      # END local private dnsmasq stealth catalog
      {% endif %}
    dest: "{{ stealth_dnsmasq_conf_path }}"
    mode: "0644"

- name: Install Channel A static CIDR catalog
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../configs/static-networks.txt"
    dest: "{{ static_networks_path }}"
    mode: "0644"

- name: Install Channel A per-IP port bypass catalog
  ansible.builtin.copy:
    content: |
      {{ lookup('ansible.builtin.file', playbook_dir + '/../../configs/no-vpn-ip-ports.txt') }}
      {% set private_bypass = lookup('ansible.builtin.file', playbook_dir + '/../../secrets/no-vpn-ip-ports.local.txt', errors='ignore') | default('', true) %}
      {% if private_bypass | length > 0 %}
      {{ private_bypass }}
      {% endif %}
    dest: "{{ no_vpn_ip_ports_path }}"
    mode: "0644"

- name: Install domain auto-discovery allowlist
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../configs/domains-no-vpn.txt"
    dest: "{{ domains_no_vpn_path }}"
    mode: "0644"

- name: Install DNS catalog intelligence scripts
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../modules/dns-catalog-intelligence/router/{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "0755"
  loop:
    - { src: domain-auto-add.sh, dest: "{{ domain_auto_add_script }}" }
    - { src: update-blocked-list.sh, dest: "{{ update_blocked_list_script }}" }

- name: Remove retired inline dnsmasq managed blocks
  ansible.builtin.raw: |
    CONF=/jffs/configs/dnsmasq.conf.add
    touch "$CONF"
    for marker in \
      "router_configuration dnsmasq.conf.add" \
      "router_configuration dnsmasq-vpn-upstream.conf.add" \
      "router_configuration dnsmasq-stealth.conf.add"
    do
      awk -v start="# BEGIN ${marker}" -v end="# END ${marker}" '
        $0 == start { skip = 1; next }
        $0 == end { skip = 0; next }
        !skip { print }
      ' "$CONF" > "${CONF}.tmp" && mv "${CONF}.tmp" "$CONF"
    done

- name: Ensure services-start hook starts singbox on boot
  ansible.builtin.raw: |
    touch {{ services_start_hook }}
    chmod +x {{ services_start_hook }}
    sed -i '\|/opt/etc/init.d/S99singbox start|d' {{ services_start_hook }}
    grep -q '# BEGIN stealth-singbox-bootstrap' {{ services_start_hook }} || cat >> {{ services_start_hook }} <<'EOF'
    # BEGIN stealth-singbox-bootstrap
    /sbin/modprobe tun >/dev/null 2>&1 || true
    mkdir -p /dev/net
    [ -c /dev/net/tun ] || mknod /dev/net/tun c 10 200
    chmod 666 /dev/net/tun
    {{ singbox_init_path }} start
    # END stealth-singbox-bootstrap
    EOF

- name: Ensure dnsmasq loads stealth catalog
  ansible.builtin.raw: |
    CONF=/jffs/configs/dnsmasq.conf.add
    touch $CONF
    grep -q '^conf-file={{ stealth_dnsmasq_conf_path }}$' $CONF || \
      echo 'conf-file={{ stealth_dnsmasq_conf_path }}' >> $CONF
    service restart_dnsmasq

- name: Ensure Channel A persistence and catalog cron entries
  ansible.builtin.raw: |
    cru d SaveIPSet 2>/dev/null || true
    cru a SaveIPSet "0 */6 * * * {{ cron_save_ipset_script }}"
    cru d DomainAutoAdd 2>/dev/null || true
    [ -x {{ domain_auto_add_script }} ] && \
      cru a DomainAutoAdd "0 * * * * {{ domain_auto_add_script }}"
    cru d UpdateBlockedList 2>/dev/null || true
    [ -x {{ update_blocked_list_script }} ] && \
      cru a UpdateBlockedList "0 5 * * * {{ update_blocked_list_script }}"
  changed_when: false

- name: Refresh blocked-domain cache opportunistically
  ansible.builtin.raw: "{{ update_blocked_list_script }} || true"
  changed_when: false

- name: Resolve test stealth domain through router dnsmasq to populate ipset
  ansible.builtin.raw: |
    nslookup {{ stealth_test_domain }} 127.0.0.1 >/dev/null 2>&1 || true

- name: Run stealth-route-init now
  ansible.builtin.raw: "{{ stealth_route_init_script }}"
  changed_when: false
  when: stealth_channel_a_lan_enabled | bool
