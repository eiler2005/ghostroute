---
- name: Install Unbound and DNS test tools
  ansible.builtin.apt:
    name:
      - unbound
      - dnsutils
    state: present
    update_cache: true
  when: vps_unbound_enabled | bool

- name: Render GhostRoute Unbound loopback resolver
  ansible.builtin.template:
    src: ghostroute-unbound.conf.j2
    dest: "{{ vps_unbound_config_path }}"
    owner: root
    group: root
    mode: "0644"
  notify: restart unbound
  when: vps_unbound_enabled | bool

- name: Ensure Unbound systemd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/unbound.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
    - vps_unbound_enabled | bool
    - vps_unbound_docker_bridge_host | default('') | length > 0

- name: Wait for Docker bridge address before starting Unbound
  ansible.builtin.copy:
    dest: /etc/systemd/system/unbound.service.d/ghostroute-docker-bridge.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      After=docker.service
      Wants=docker.service

      [Service]
      ExecStartPre=/usr/bin/timeout {{ vps_unbound_docker_bridge_startup_wait_seconds | int }} /bin/sh -c 'until ip -4 addr show | grep -q "{{ vps_unbound_docker_bridge_host }}/"; do sleep 1; done'
  notify: restart unbound
  when:
    - vps_unbound_enabled | bool
    - vps_unbound_docker_bridge_host | default('') | length > 0

- name: Remove Unbound Docker bridge startup guard when not needed
  ansible.builtin.file:
    path: /etc/systemd/system/unbound.service.d/ghostroute-docker-bridge.conf
    state: absent
  notify: restart unbound
  when: (not (vps_unbound_enabled | bool)) or (vps_unbound_docker_bridge_host | default('') | length == 0)

- name: Reload systemd after Unbound unit metadata updates
  ansible.builtin.systemd:
    daemon_reload: true

- name: Reset failed Unbound start-limit state before start
  ansible.builtin.command: systemctl reset-failed unbound
  changed_when: false
  failed_when: false
  when: vps_unbound_enabled | bool

- name: Enable Unbound loopback resolver
  ansible.builtin.service:
    name: unbound
    enabled: true
    state: started
  when: vps_unbound_enabled | bool

- name: Remove GhostRoute Unbound config when disabled
  ansible.builtin.file:
    path: "{{ vps_unbound_config_path }}"
    state: absent
  notify: restart unbound
  when: not (vps_unbound_enabled | bool)
