- name: Install dnscrypt-proxy2 via Entware
  ansible.builtin.raw: |
    /opt/bin/opkg list-installed | grep -q '^dnscrypt-proxy2 ' || /opt/bin/opkg install dnscrypt-proxy2

- name: Ensure dnscrypt cache dir exists
  ansible.builtin.file:
    path: /opt/var/cache/dnscrypt-proxy
    state: directory

- name: Ensure dnscrypt run/log dirs exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
  loop:
    - /opt/var/run
    - /opt/var/log

- name: Render dnscrypt-proxy.toml
  ansible.builtin.template:
    src: dnscrypt-proxy.toml.j2
    dest: "{{ dnscrypt_config_path }}"
    mode: "0644"
  notify: restart dnscrypt

- name: Install dnscrypt init script
  ansible.builtin.template:
    src: S09dnscrypt-proxy2.j2
    dest: "{{ dnscrypt_init_path }}"
    mode: "0755"
  notify: restart dnscrypt

- name: Enable dnscrypt-proxy service
  ansible.builtin.raw: |
    {{ dnscrypt_init_path }} restart
  changed_when: false

- name: Remove legacy dnscrypt services-start bootstrap
  ansible.builtin.raw: |
    [ -f {{ services_start_hook }} ] &&
      sed -i '\|# BEGIN stealth-dnscrypt-bootstrap|,\|# END stealth-dnscrypt-bootstrap|d' {{ services_start_hook }} || true
    [ -f {{ services_start_hook }} ] &&
      sed -i '\|{{ dnscrypt_init_path }} start|d' {{ services_start_hook }} || true
    [ -f {{ services_start_hook }} ] &&
      sed -i '\|DnscryptWatchdog|d' {{ services_start_hook }} || true
  changed_when: false

- name: Install dnscrypt listener watchdog
  ansible.builtin.template:
    src: dnscrypt-watchdog.sh.j2
    dest: /jffs/scripts/dnscrypt-watchdog.sh
    mode: "0755"

- name: Run dnscrypt listener watchdog once after install
  ansible.builtin.raw: |
    /jffs/scripts/dnscrypt-watchdog.sh
  changed_when: false

- name: Update dnsmasq upstream to use dnscrypt-proxy (for non-VPN / non-STEALTH)
  ansible.builtin.raw: |
    CONF=/jffs/configs/dnsmasq.conf.add
    touch $CONF
    sed -i '\|^server=127.0.0.1#5353$|d' $CONF
    sed -i '\|^server=127.0.0.1#{{ dnscrypt_port }}$|d' $CONF
    sed -i '\|^address=/{{ system_caddy_site_host }}/|d' $CONF
    echo 'server=127.0.0.1#{{ dnscrypt_port }}' >> $CONF
    {% if system_caddy_site_enabled | default(false) | bool %}
    echo 'address=/{{ system_caddy_site_host }}/{{ vps_ssh_host }}' >> $CONF
    {% endif %}
    grep -q '^no-resolv$' $CONF || echo 'no-resolv' >> $CONF
    service restart_dnsmasq >/tmp/ghostroute-restart-dnsmasq.log 2>&1 </dev/null &
    sleep 2
    netstat -nlp 2>/dev/null | grep -q ':53 '
  when: router_dns_egress_mode | default('policy_split') == 'dnscrypt_pool'

- name: Keep default dnsmasq upstream in policy-split DNS mode
  ansible.builtin.raw: |
    CONF=/jffs/configs/dnsmasq.conf.add
    touch $CONF
    sed -i '\|^server=127.0.0.1#5353$|d' $CONF
    sed -i '\|^server=127.0.0.1#{{ dnscrypt_port }}$|d' $CONF
    sed -i '\|^no-resolv$|d' $CONF
    sed -i '\|^address=/{{ system_caddy_site_host }}/|d' $CONF
    {% if system_caddy_site_enabled | default(false) | bool %}
    echo 'address=/{{ system_caddy_site_host }}/{{ vps_ssh_host }}' >> $CONF
    {% endif %}
    service restart_dnsmasq >/tmp/ghostroute-restart-dnsmasq.log 2>&1 </dev/null &
    sleep 2
    netstat -nlp 2>/dev/null | grep -q ':53 '
  when: router_dns_egress_mode | default('policy_split') == 'policy_split'
