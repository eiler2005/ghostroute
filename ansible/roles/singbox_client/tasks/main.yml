      - channel_m_maxtg_ingress_port | string != channel_b_home_ingress_port | default('') | string
      - channel_m_maxtg_ingress_port | string != channel_c_home_ingress_port | default('') | string
      - channel_m_maxtg_ingress_port | string != channel_c_shadowrocket_ingress_port | default('') | string
      - channel_m_maxtg_public_port | string != home_reality_ingress_port | string
