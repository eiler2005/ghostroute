      - channel_d_naiveproxy_ingress_port | string != channel_c_shadowrocket_ingress_port | default('') | string
      - channel_d_naiveproxy_upstream_socks_port | string != singbox_redirect_port | string
      - channel_d_naiveproxy_upstream_socks_port | string != singbox_dnscrypt_socks_port | string
      - channel_d_naiveproxy_upstream_socks_port | string != dnscrypt_port | string
      - channel_d_naiveproxy_upstream_socks_port | string != home_reality_ingress_port | string
      - channel_d_naiveproxy_upstream_socks_port | string != channel_b_home_ingress_port | default('') | string
      - channel_d_naiveproxy_upstream_socks_port | string != channel_b_home_upstream_socks_port | default('') | string
      - channel_d_naiveproxy_upstream_socks_port | string != channel_c_home_ingress_port | default('') | string
