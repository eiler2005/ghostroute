- name: Validate Channel M TLS certificate files exist
  ansible.builtin.raw: |
    [ -s "{{ channel_m_maxtg_tls_cert_path }}" ] &&
    [ -s "{{ channel_m_maxtg_tls_key_path }}" ]
  changed_when: false
  when: channel_m_maxtg_enabled | default(false) | bool
  no_log: true

- name: Install sing-box rule-set generator
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../modules/routing-core/router/update-singbox-rule-sets.sh"
    dest: /jffs/scripts/update-singbox-rule-sets.sh
    mode: "0755"

- name: Generate sing-box rule-sets for mobile split routing
  ansible.builtin.raw: >
    MANAGED_DNS_FORWARD_HOST='{{ router_managed_dns_forward_host | default("127.0.0.1") }}'
    MANAGED_DNS_FORWARD_PORT='{{ router_managed_dns_forward_port | default(dnscrypt_port) }}'
    /jffs/scripts/update-singbox-rule-sets.sh --no-restart
  changed_when: false

- name: Render sing-box config
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ singbox_config_path }}"
    mode: "0600"
  register: singbox_config_render
  notify: restart singbox

- name: Validate changed sing-box config before restart
  block:
    - name: Stop Channel D Caddy before sing-box config check when active
      ansible.builtin.raw: |
        if [ -x "{{ channel_d_naiveproxy_caddy_init_path | default('/opt/etc/init.d/S99caddy-channel-d-naiveproxy') }}" ]; then
          {{ channel_d_naiveproxy_caddy_init_path | default('/opt/etc/init.d/S99caddy-channel-d-naiveproxy') }} stop || true
        fi
      changed_when: false
      when: channel_d_naiveproxy_enabled | default(false) | bool

    - name: Validate sing-box config before restart
      ansible.builtin.raw: "{{ singbox_bin_path }} check -C {{ singbox_config_path | dirname }}"
      changed_when: false
  always:
    - name: Restart Channel D Caddy after sing-box config check
      ansible.builtin.raw: |
        if [ -x "{{ channel_d_naiveproxy_caddy_init_path | default('/opt/etc/init.d/S99caddy-channel-d-naiveproxy') }}" ]; then
          {{ channel_d_naiveproxy_caddy_init_path | default('/opt/etc/init.d/S99caddy-channel-d-naiveproxy') }} start || true
        fi
      changed_when: false
      when: channel_d_naiveproxy_enabled | default(false) | bool
  when: singbox_config_render.changed | default(true)

- name: Install stable sing-box init script
  ansible.builtin.template:
    src: S99singbox.j2
    dest: "{{ singbox_init_path }}"
    mode: "0755"

- name: Install sing-box watchdog
  ansible.builtin.template:
    src: singbox-watchdog.sh.j2
    dest: "{{ singbox_watchdog_path }}"
    mode: "0755"

- name: Install sing-box log rotation helper
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../modules/routing-core/router/rotate-singbox-log"
    dest: "{{ singbox_log_rotate_path }}"
    mode: "0755"

- name: Enable + start singbox
  ansible.builtin.raw: |
    {{ singbox_init_path }} enable >/dev/null 2>&1 || true
    {{ singbox_init_path }} restart
  register: sb_start
  changed_when: false
