- name: Ensure sing-box installed via Entware
  ansible.builtin.raw: |
    if ! /opt/bin/opkg list-installed | grep -Eq '^sing-box(-go)? '; then
      /opt/bin/opkg update
      /opt/bin/opkg install sing-box
    fi
  register: sb_install
  changed_when: "'Installing' in sb_install.stdout"

- name: Ensure sing-box version >= 1.9 (required for Reality utls)
  ansible.builtin.raw: |
    V=$({{ singbox_bin_path }} version 2>/dev/null | head -1 | awk '{print $3}')
    if [ -z "$V" ]; then
      V=$(/opt/bin/opkg list-installed 2>/dev/null | awk '/^sing-box(-go)? / {print $3; exit}')
    fi
    echo "${V}"
  register: sb_ver
  check_mode: false
  changed_when: false

- name: Warn if sing-box version outdated
  ansible.builtin.debug:
    msg: |
      sing-box version: {{ sb_ver.stdout }}.
      If < 1.9, manually fetch aarch64 binary from
      https://github.com/SagerNet/sing-box/releases and place at {{ singbox_bin_path }}.

- name: Require sing-box version with Naive inbound support for Channel C1
  ansible.builtin.raw: |
    V=$({{ singbox_bin_path }} version 2>/dev/null | head -1 | awk '{print $3}')
    if [ -z "$V" ]; then
      V=$(/opt/bin/opkg list-installed 2>/dev/null | awk '/^sing-box(-go)? / {print $3; exit}')
    fi
    V=${V#v}
    MAJOR=${V%%.*}
    REST=${V#*.}
    MINOR=${REST%%.*}
    [ -n "$MAJOR" ] && [ -n "$MINOR" ] || exit 1
    [ "$MAJOR" -gt 1 ] || { [ "$MAJOR" -eq 1 ] && [ "$MINOR" -ge 13 ]; }
  check_mode: false
  changed_when: false
  when: channel_c_home_enabled | default(false) | bool

- name: Ensure sing-box config dir
  ansible.builtin.file:
    path: "{{ singbox_config_path | dirname }}"
    state: directory

- name: Ensure /dev/net/tun exists for sing-box TUN inbound
  ansible.builtin.raw: |
    /sbin/modprobe tun 2>/dev/null || true
    mkdir -p /dev/net
    [ -c /dev/net/tun ] || mknod /dev/net/tun c 10 200
    chmod 666 /dev/net/tun
  changed_when: false

- name: Validate home Reality ingress identity separation
  ansible.builtin.assert:
    that:
      - home_reality_ingress_port | int not in [22, 80, 443, 1080, 1194, 51820, 8080, 8443]
      - home_clients is defined
      - home_clients | length == 7
      - home_reality_server_private_key is defined
      - home_reality_server_private_key | string | length > 0
      - home_reality_server_public_key is defined
      - home_reality_server_public_key | string | length > 0
      - home_reality_server_short_ids is defined
      - (home_reality_server_short_ids | length) >= (home_clients | length)
      - ((home_clients | map(attribute='uuid') | list) | intersect((clients | rejectattr('name', 'equalto', 'router') | map(attribute='uuid') | list))) | length == 0
    fail_msg: "home Reality ingress must use fresh home_clients/home key material and a non-legacy port."
  when: home_reality_enabled | default(false) | bool
  no_log: true

- name: Validate Channel A runtime ports before rendering config
  ansible.builtin.assert:
    that:
      - singbox_redirect_port | string | length > 0
      - singbox_dnscrypt_socks_port | string | length > 0
      - dnscrypt_port | string | length > 0
      - home_reality_ingress_port | string | length > 0
      - singbox_redirect_port | int > 0
      - singbox_dnscrypt_socks_port | int > 0
      - dnscrypt_port | int > 0
      - home_reality_ingress_port | int > 0
      - router_vps_dns_forward_port | int > 0
      - router_vps_dns_forward_port | int <= 65535
      - router_vps_dns_forward_port | string != singbox_redirect_port | string
      - router_vps_dns_forward_port | string != singbox_dnscrypt_socks_port | string
      - router_vps_dns_forward_port | string != dnscrypt_port | string
      - router_vps_dns_forward_port | string != home_reality_ingress_port | string
    fail_msg: "Channel A router ports must resolve before rendering sing-box config."

- name: Validate Channel A selected full-VPS settings
  ansible.builtin.assert:
    that:
      - not (channel_a_selected_full_vps_enabled | default(false) | bool) or ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0 or (channel_a_selected_full_vps_home_reality_users | default([]) | length) > 0)
      - (channel_a_selected_full_vps_lan_clients | default([]) | selectattr('name', 'defined') | list | length) == (channel_a_selected_full_vps_lan_clients | default([]) | length)
      - (channel_a_selected_full_vps_lan_clients | default([]) | selectattr('mac', 'defined') | list | length) == (channel_a_selected_full_vps_lan_clients | default([]) | length)
      - (channel_a_selected_full_vps_lan_clients | default([]) | selectattr('ip', 'defined') | list | length) == (channel_a_selected_full_vps_lan_clients | default([]) | length)
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_dns_servers | default([]) | length) > 0
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | int) > 0
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | int) <= 65535
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | string != singbox_redirect_port | string)
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | string != singbox_dnscrypt_socks_port | string)
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | string != dnscrypt_port | string)
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | string != home_reality_ingress_port | string)
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | string != channel_b_home_ingress_port | default('') | string)
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | string != channel_c_home_ingress_port | default('') | string)
      - not ((channel_a_selected_full_vps_enabled | default(false) | bool) and ((channel_a_selected_full_vps_lan_clients | default([]) | length) > 0)) or (channel_a_selected_full_vps_tproxy_port | string != channel_c_shadowrocket_ingress_port | default('') | string)
      - channel_a_selected_full_vps_fwmark | string not in ['0x1000', '0x2000']
      - channel_a_selected_full_vps_route_table | int not in [200]
      - ((channel_a_selected_full_vps_home_reality_users | default([])) | difference(home_clients | default([]) | map(attribute='name') | list)) | length == 0
    fail_msg: "Channel A selected full-VPS needs explicit selected sets, strict DNS for LAN clients, unique TPROXY port/mark/table, and valid Home Reality user names."
  no_log: true

- name: Validate managed egress mode before rendering config
  ansible.builtin.assert:
    that:
      - router_managed_egress_mode in ['primary_vps', 'backup_reality', 'hermes_vps']
      - channel_d_managed_egress_mode | default('follow') in ['follow', 'primary_vps', 'backup_reality', 'hermes_vps']
      - router_backup_dns_mode in ['cover_dns', 'managed_vps_dns']
      - router_hermes_dns_mode | default('managed_vps_dns') in ['cover_dns', 'managed_vps_dns']
    fail_msg: "router_managed_egress_mode must be primary_vps, backup_reality or hermes_vps; channel_d_managed_egress_mode must be follow, primary_vps, backup_reality or hermes_vps."

- name: Validate backup Reality managed egress settings
  ansible.builtin.assert:
    that:
      - router_backup_reality_server | string | length > 0
      - router_backup_reality_server_port | int > 0
      - router_backup_reality_server_port | int <= 65535
      - router_backup_reality_uuid | string | length > 0
      - router_backup_reality_flow | string | length > 0
      - router_backup_reality_packet_encoding | string | length > 0
      - router_backup_reality_server_name | string | length > 0
      - router_backup_reality_utls_fingerprint | string | length > 0
      - router_backup_reality_public_key | string | length > 0
      - router_backup_reality_short_id | string | length > 0
    fail_msg: "backup_reality mode needs a complete router-only VLESS/Reality reserve profile in Vault."
  when: router_managed_egress_mode == 'backup_reality' or channel_d_managed_egress_mode | default('follow') == 'backup_reality'
  no_log: true

- name: Validate Hermes owned managed egress settings
  ansible.builtin.assert:
    that:
      - router_hermes_vps_host | string | length > 0
      - router_hermes_vps_port | int > 0
      - router_hermes_vps_port | int <= 65535
      - router_hermes_vps_server_name | string | length > 0
      - router_hermes_vps_utls_fingerprint | string | length > 0
      - reality_server_public_key | string | length > 0
      - (clients | selectattr('name','equalto','router') | list | length) == 1
    fail_msg: "hermes_vps mode needs a complete owned VPS endpoint and the existing router Reality client identity."
  when: router_managed_egress_mode == 'hermes_vps' or channel_d_managed_egress_mode | default('follow') == 'hermes_vps'
  no_log: true

- name: Validate Channel C1 home Naive settings
  ansible.builtin.assert:
    that:
      - channel_c_home_public_host | string | length > 0
      - channel_c_home_public_port | int > 0
      - channel_c_home_public_port | int <= 65535
      - channel_c_home_ingress_port | int > 1024
      - channel_c_home_ingress_port | int <= 65535
      - channel_c_home_ingress_port | int not in [443, 1080, 1194, 51820, 8080, 8443]
      - channel_c_home_ingress_port | string != singbox_redirect_port | string
      - channel_c_home_ingress_port | string != singbox_dnscrypt_socks_port | string
      - channel_c_home_ingress_port | string != dnscrypt_port | string
      - channel_c_home_ingress_port | string != home_reality_ingress_port | string
