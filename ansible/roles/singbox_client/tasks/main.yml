- name: Ensure sing-box installed via Entware
  ansible.builtin.raw: |
    if ! /opt/bin/opkg list-installed | grep -Eq '^sing-box(-go)? '; then
      /opt/bin/opkg update
      /opt/bin/opkg install sing-box
    fi
  register: sb_install
  changed_when: "'Installing' in sb_install.stdout"

- name: Ensure sing-box version >= 1.9 (required for Reality utls)
  ansible.builtin.raw: |
    V=$({{ singbox_bin_path }} version 2>/dev/null | head -1 | awk '{print $3}')
    echo "${V}"
  register: sb_ver
  changed_when: false

- name: Warn if sing-box version outdated
  ansible.builtin.debug:
    msg: |
      sing-box version: {{ sb_ver.stdout }}.
      If < 1.9, manually fetch aarch64 binary from
      https://github.com/SagerNet/sing-box/releases and place at {{ singbox_bin_path }}.

- name: Require sing-box version with Naive inbound support for Channel C1
  ansible.builtin.raw: |
    V=$({{ singbox_bin_path }} version 2>/dev/null | head -1 | awk '{print $3}')
    V=${V#v}
    MAJOR=${V%%.*}
    REST=${V#*.}
    MINOR=${REST%%.*}
    [ -n "$MAJOR" ] && [ -n "$MINOR" ] || exit 1
    [ "$MAJOR" -gt 1 ] || { [ "$MAJOR" -eq 1 ] && [ "$MINOR" -ge 13 ]; }
  changed_when: false
  when: channel_c_home_enabled | default(false) | bool

- name: Ensure sing-box config dir
  ansible.builtin.file:
    path: "{{ singbox_config_path | dirname }}"
    state: directory

- name: Ensure /dev/net/tun exists for sing-box TUN inbound
  ansible.builtin.raw: |
    /sbin/modprobe tun 2>/dev/null || true
    mkdir -p /dev/net
    [ -c /dev/net/tun ] || mknod /dev/net/tun c 10 200
    chmod 666 /dev/net/tun
  changed_when: false

- name: Validate home Reality ingress identity separation
  ansible.builtin.assert:
    that:
      - home_reality_ingress_port | int not in [22, 80, 443, 1080, 1194, 51820, 8080, 8443]
      - home_clients is defined
      - home_clients | length == 7
      - home_reality_server_private_key is defined
      - home_reality_server_private_key | string | length > 0
      - home_reality_server_public_key is defined
      - home_reality_server_public_key | string | length > 0
      - home_reality_server_short_ids is defined
      - (home_reality_server_short_ids | length) >= (home_clients | length)
      - ((home_clients | map(attribute='uuid') | list) | intersect((clients | rejectattr('name', 'equalto', 'router') | map(attribute='uuid') | list))) | length == 0
    fail_msg: "home Reality ingress must use fresh home_clients/home key material and a non-legacy port."
  when: home_reality_enabled | default(false) | bool
  no_log: true

- name: Validate Channel A runtime ports before rendering config
  ansible.builtin.assert:
    that:
      - singbox_redirect_port | string | length > 0
      - singbox_dnscrypt_socks_port | string | length > 0
      - dnscrypt_port | string | length > 0
      - home_reality_ingress_port | string | length > 0
      - singbox_redirect_port | int > 0
      - singbox_dnscrypt_socks_port | int > 0
      - dnscrypt_port | int > 0
      - home_reality_ingress_port | int > 0
    fail_msg: "Channel A router ports must resolve before rendering sing-box config."

- name: Validate Channel C1 home Naive settings
  ansible.builtin.assert:
    that:
      - channel_c_home_public_host | string | length > 0
      - channel_c_home_public_port | int > 0
      - channel_c_home_public_port | int <= 65535
      - channel_c_home_ingress_port | int > 1024
      - channel_c_home_ingress_port | int <= 65535
      - channel_c_home_ingress_port | int not in [443, 1080, 1194, 51820, 8080, 8443]
      - channel_c_home_ingress_port | string != singbox_redirect_port | string
      - channel_c_home_ingress_port | string != singbox_dnscrypt_socks_port | string
      - channel_c_home_ingress_port | string != dnscrypt_port | string
      - channel_c_home_ingress_port | string != home_reality_ingress_port | string
      - channel_c_home_ingress_port | string != channel_b_home_ingress_port | default('') | string
      - channel_c_home_public_port | string != home_reality_ingress_port | string
      - channel_c_home_public_port | string != channel_b_home_ingress_port | default('') | string
      - channel_c_home_clients | length > 0
      - (channel_c_home_clients | selectattr('username', 'defined') | list | length) == (channel_c_home_clients | length)
      - (channel_c_home_clients | selectattr('password', 'defined') | list | length) == (channel_c_home_clients | length)
      - channel_c_home_tls_cert_path | string | length > 0
      - channel_c_home_tls_key_path | string | length > 0
      - channel_c_home_tls_cert_path != channel_c_home_tls_key_path
    fail_msg: "Channel C1 needs a home host, public/internal ports, TLS cert/key paths and Naive username/password clients."
  when: channel_c_home_enabled | default(false) | bool
  no_log: true

- name: Validate Channel C1 Shadowrocket compatibility settings
  ansible.builtin.assert:
    that:
      - channel_c_home_enabled | default(false) | bool
      - channel_c_shadowrocket_public_port | int > 0
      - channel_c_shadowrocket_public_port | int <= 65535
      - channel_c_shadowrocket_ingress_port | int > 1024
      - channel_c_shadowrocket_ingress_port | int <= 65535
      - channel_c_shadowrocket_ingress_port | int not in [443, 1080, 1194, 51820, 8080, 8443]
      - channel_c_shadowrocket_ingress_port | string != channel_c_home_ingress_port | string
      - channel_c_shadowrocket_ingress_port | string != singbox_redirect_port | string
      - channel_c_shadowrocket_ingress_port | string != singbox_dnscrypt_socks_port | string
      - channel_c_shadowrocket_ingress_port | string != dnscrypt_port | string
      - channel_c_shadowrocket_ingress_port | string != home_reality_ingress_port | string
      - channel_c_shadowrocket_ingress_port | string != channel_b_home_ingress_port | default('') | string
      - channel_c_shadowrocket_public_port | string != channel_c_home_public_port | string
      - channel_c_shadowrocket_public_port | string != home_reality_ingress_port | string
      - channel_c_shadowrocket_public_port | string != channel_b_home_ingress_port | default('') | string
      - channel_c_shadowrocket_clients | length > 0
      - (channel_c_shadowrocket_clients | selectattr('username', 'defined') | list | length) == (channel_c_shadowrocket_clients | length)
      - (channel_c_shadowrocket_clients | selectattr('password', 'defined') | list | length) == (channel_c_shadowrocket_clients | length)
    fail_msg: "C1-Shadowrocket needs distinct public/internal ports and username/password clients."
  when: channel_c_shadowrocket_enabled | default(false) | bool
  no_log: true

- name: Ensure Channel C1 TLS directory exists
  ansible.builtin.file:
    path: "{{ item | dirname }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ channel_c_home_tls_cert_path }}"
    - "{{ channel_c_home_tls_key_path }}"
  when: channel_c_home_enabled | default(false) | bool

- name: Install Channel C1 TLS certificate from vault content when supplied
  ansible.builtin.copy:
    dest: "{{ channel_c_home_tls_cert_path }}"
    content: "{{ channel_c_home_tls_cert_pem }}"
    mode: "0644"
  when:
    - channel_c_home_enabled | default(false) | bool
    - channel_c_home_tls_cert_pem | default('') | length > 0
  no_log: true

- name: Install Channel C1 TLS private key from vault content when supplied
  ansible.builtin.copy:
    dest: "{{ channel_c_home_tls_key_path }}"
    content: "{{ channel_c_home_tls_key_pem }}"
    mode: "0600"
  when:
    - channel_c_home_enabled | default(false) | bool
    - channel_c_home_tls_key_pem | default('') | length > 0
  no_log: true

- name: Validate Channel C1 TLS certificate files exist
  ansible.builtin.raw: |
    [ -s "{{ channel_c_home_tls_cert_path }}" ] &&
    [ -s "{{ channel_c_home_tls_key_path }}" ]
  changed_when: false
  when: channel_c_home_enabled | default(false) | bool
  no_log: true

- name: Install sing-box rule-set generator
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../modules/routing-core/router/update-singbox-rule-sets.sh"
    dest: /jffs/scripts/update-singbox-rule-sets.sh
    mode: "0755"

- name: Generate sing-box rule-sets for mobile split routing
  ansible.builtin.raw: /jffs/scripts/update-singbox-rule-sets.sh --no-restart
  changed_when: false

- name: Render sing-box config
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ singbox_config_path }}"
    mode: "0600"
  notify: restart singbox

- name: Validate sing-box config before restart
  ansible.builtin.raw: "{{ singbox_bin_path }} check -C {{ singbox_config_path | dirname }}"
  changed_when: false

- name: Install stable sing-box init script
  ansible.builtin.template:
    src: S99singbox.j2
    dest: "{{ singbox_init_path }}"
    mode: "0755"

- name: Install sing-box watchdog
  ansible.builtin.template:
    src: singbox-watchdog.sh.j2
    dest: "{{ singbox_watchdog_path }}"
    mode: "0755"

- name: Install sing-box log rotation helper
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../modules/routing-core/router/rotate-singbox-log"
    dest: "{{ singbox_log_rotate_path }}"
    mode: "0755"

- name: Add cron entry for sing-box watchdog
  ansible.builtin.raw: |
    if command -v cru >/dev/null 2>&1; then
      cru a SingBoxWatchdog "* * * * * {{ singbox_watchdog_path }}"
    else
      CRON=/var/spool/cron/crontabs/admin
      mkdir -p "$(dirname "$CRON")"
      touch "$CRON"
      grep -v '{{ singbox_watchdog_path }}' "$CRON" > "$CRON.tmp" || true
      mv "$CRON.tmp" "$CRON"
      echo "* * * * * {{ singbox_watchdog_path }}" >> "$CRON"
    fi
  changed_when: false

- name: Add cron entry for sing-box log rotation
  ansible.builtin.raw: |
    if command -v cru >/dev/null 2>&1; then
      cru d RotateSingBoxLog 2>/dev/null || true
      cru a RotateSingBoxLog "17 * * * * {{ singbox_log_rotate_path }}"
    else
      CRON=/var/spool/cron/crontabs/admin
      mkdir -p "$(dirname "$CRON")"
      touch "$CRON"
      grep -v '{{ singbox_log_rotate_path }}' "$CRON" > "$CRON.tmp" || true
      mv "$CRON.tmp" "$CRON"
      echo "17 * * * * {{ singbox_log_rotate_path }}" >> "$CRON"
    fi
  changed_when: false

- name: Enable + start singbox
  ansible.builtin.raw: |
    {{ singbox_init_path }} enable >/dev/null 2>&1 || true
    {{ singbox_init_path }} restart
  register: sb_start
  changed_when: false
