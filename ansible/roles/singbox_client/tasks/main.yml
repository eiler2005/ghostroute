- name: Ensure sing-box installed via Entware
  ansible.builtin.raw: |
    if ! /opt/bin/opkg list-installed | grep -Eq '^sing-box(-go)? '; then
      /opt/bin/opkg update
      /opt/bin/opkg install sing-box
    fi
  register: sb_install
  changed_when: "'Installing' in sb_install.stdout"

- name: Ensure sing-box version >= 1.9 (required for Reality utls)
  ansible.builtin.raw: |
    V=$({{ singbox_bin_path }} version 2>/dev/null | head -1 | awk '{print $3}')
    echo "${V}"
  register: sb_ver
  changed_when: false

- name: Warn if sing-box version outdated
  ansible.builtin.debug:
    msg: |
      sing-box version: {{ sb_ver.stdout }}.
      If < 1.9, manually fetch aarch64 binary from
      https://github.com/SagerNet/sing-box/releases and place at {{ singbox_bin_path }}.

- name: Ensure sing-box config dir
  ansible.builtin.file:
    path: "{{ singbox_config_path | dirname }}"
    state: directory

- name: Ensure /dev/net/tun exists for sing-box TUN inbound
  ansible.builtin.raw: |
    /sbin/modprobe tun 2>/dev/null || true
    mkdir -p /dev/net
    [ -c /dev/net/tun ] || mknod /dev/net/tun c 10 200
    chmod 666 /dev/net/tun
  changed_when: false

- name: Validate home Reality ingress identity separation
  ansible.builtin.assert:
    that:
      - home_reality_ingress_port | int not in [22, 80, 443, 1080, 1194, 51820, 8080, 8443]
      - home_clients is defined
      - home_clients | length == 7
      - home_reality_server_private_key is defined
      - home_reality_server_public_key is defined
      - home_reality_server_short_ids is defined
      - (home_reality_server_short_ids | length) >= (home_clients | length)
      - ((home_clients | map(attribute='uuid') | list) | intersect((clients | rejectattr('name', 'equalto', 'router') | map(attribute='uuid') | list))) | length == 0
    fail_msg: "home Reality ingress must use fresh home_clients/home key material and a non-legacy port."
  when: home_reality_enabled | default(false) | bool
  no_log: true

- name: Install sing-box rule-set generator
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../modules/routing-core/router/update-singbox-rule-sets.sh"
    dest: /jffs/scripts/update-singbox-rule-sets.sh
    mode: "0755"

- name: Generate sing-box rule-sets for mobile split routing
  ansible.builtin.raw: /jffs/scripts/update-singbox-rule-sets.sh --no-restart
  changed_when: false

- name: Render sing-box config
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ singbox_config_path }}"
    mode: "0600"
  notify: restart singbox

- name: Validate sing-box config before restart
  ansible.builtin.raw: "{{ singbox_bin_path }} check -C {{ singbox_config_path | dirname }}"
  changed_when: false

- name: Install stable sing-box init script
  ansible.builtin.template:
    src: S99singbox.j2
    dest: "{{ singbox_init_path }}"
    mode: "0755"

- name: Install sing-box watchdog
  ansible.builtin.template:
    src: singbox-watchdog.sh.j2
    dest: "{{ singbox_watchdog_path }}"
    mode: "0755"

- name: Add cron entry for sing-box watchdog
  ansible.builtin.raw: |
    if command -v cru >/dev/null 2>&1; then
      cru a SingBoxWatchdog "* * * * * {{ singbox_watchdog_path }}"
    else
      CRON=/var/spool/cron/crontabs/admin
      mkdir -p "$(dirname "$CRON")"
      touch "$CRON"
      grep -v '{{ singbox_watchdog_path }}' "$CRON" > "$CRON.tmp" || true
      mv "$CRON.tmp" "$CRON"
      echo "* * * * * {{ singbox_watchdog_path }}" >> "$CRON"
    fi
  changed_when: false

- name: Enable + start singbox
  ansible.builtin.raw: |
    {{ singbox_init_path }} enable >/dev/null 2>&1 || true
    {{ singbox_init_path }} restart
  register: sb_start
  changed_when: false
