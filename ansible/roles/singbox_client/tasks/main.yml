- name: Install Channel M TLS private key from vault content when supplied
  ansible.builtin.copy:
    dest: "{{ channel_m_maxtg_tls_key_path }}"
    content: "{{ channel_m_maxtg_tls_key_pem }}"
    mode: "0600"
  when:
