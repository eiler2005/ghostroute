      - channel_d_naiveproxy_ingress_port | string != singbox_dnscrypt_socks_port | string
      - channel_d_naiveproxy_ingress_port | string != dnscrypt_port | string
      - channel_d_naiveproxy_ingress_port | string != home_reality_ingress_port | string
