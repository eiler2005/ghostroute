---
# Router sing-box defaults. Real ports and keys are supplied by vault/group_vars.
singbox_tun_name: singbox0
singbox_bin_path: /opt/bin/sing-box
singbox_log_path: /opt/var/log/sing-box.log
singbox_log_rotate_path: /jffs/scripts/rotate-singbox-log
singbox_config_path: /opt/etc/sing-box/config.json
singbox_init_path: /opt/etc/init.d/S99sing-box
singbox_redirect_port: ""
singbox_dnscrypt_socks_port: ""
singbox_watchdog_path: /jffs/scripts/singbox-watchdog.sh
router_vps_dns_forward_host: 127.0.0.1
router_vps_dns_forward_port: 15353
home_reality_enabled: true
home_reality_listen: 0.0.0.0
home_reality_ingress_port: ""
home_reality_dest: gateway.icloud.com:443
home_reality_dest_host: gateway.icloud.com
home_reality_dest_port: 443
home_reality_handshake_host: "{{ home_reality_dest_host }}"
home_reality_server_names:
  - gateway.icloud.com
channel_c_home_enabled: false
channel_c_home_listen: 0.0.0.0
channel_c_home_public_host: ""
channel_c_home_public_port: 443
channel_c_home_ingress_port: ""
channel_c_home_clients: []
channel_c_home_tls_cert_path: /opt/etc/sing-box/channel-c-home-fullchain.pem
channel_c_home_tls_key_path: /opt/etc/sing-box/channel-c-home-privkey.pem
channel_c_home_tls_cert_pem: ""
channel_c_home_tls_key_pem: ""
channel_c_shadowrocket_enabled: false
channel_c_shadowrocket_public_port: 4443
channel_c_shadowrocket_ingress_port: ""
channel_c_shadowrocket_clients: []
channel_c_shadowrocket_connlimit_above: 300
channel_c_shadowrocket_mss: 1360
channel_d_naiveproxy_enabled: false
channel_d_naiveproxy_public_host: ""
channel_d_naiveproxy_public_port: 4444
channel_d_naiveproxy_ingress_port: ""
channel_d_naiveproxy_upstream_socks_port: ""
channel_d_naiveproxy_clients: []
clients: []
home_clients: []
emergency_clients: []
channel_a_selected_full_vps_enabled: false
channel_a_selected_full_vps_lan_clients: []
channel_a_selected_full_vps_home_reality_users: []
channel_a_selected_full_vps_dns_servers: []
channel_a_selected_full_vps_tproxy_port: ""
channel_a_selected_full_vps_fwmark: "0x4100"
channel_a_selected_full_vps_route_table: 410
channel_a_selected_full_vps_inbound_tag: channel-a-selected-lan-full-vps-in
