- name: Probe 3x-ui CSRF token endpoints for seed login
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ xui_admin_web_port }}{{ item }}/csrf-token"
    method: GET
    headers:
      X-Requested-With: XMLHttpRequest
    status_code: [200, 403, 404]
    return_content: true
  register: xui_seed_csrf_probe
  loop: "{{ _xui_api_base_path_candidates | default([xui_admin_web_path | regex_replace('/+$', ''), ''] | unique | list) }}"
  loop_control:
    label: redacted-api-base
  failed_when: false
  when: _xui_login_candidates is not defined
  no_log: true

- name: Build 3x-ui seed login candidates
  ansible.builtin.set_fact:
    _xui_login_candidates: "{{ (_xui_login_candidates | default([])) + [ _xui_login_candidate ] }}"
  vars:
    _xui_login_candidate:
      base_path: "{{ item.item }}"
      login_path: "{{ (item.item ~ '/login') | regex_replace('//+', '/') }}"
      csrf_token: "{{ item.json.obj | default('') }}"
      csrf_cookie: "{{ item.cookies_string | default('') }}"
  loop: "{{ xui_seed_csrf_probe.results | default([]) }}"
  loop_control:
    label: redacted-api-base
  when: _xui_login_candidates is not defined
  no_log: true

- name: Login to 3x-ui and capture session
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ xui_admin_web_port }}{{ item.login_path }}"
    method: POST
    headers:
      X-Requested-With: XMLHttpRequest
      X-CSRF-Token: "{{ item.csrf_token }}"
      Cookie: "{{ item.csrf_cookie }}"
    body_format: form-urlencoded
    body:
      username: "{{ xui_admin_username }}"
      password: "{{ xui_admin_password }}"
    return_content: true
    status_code: 200
  register: xui_login_attempts
  loop: "{{ _xui_login_candidates }}"
  loop_control:
    label: redacted-login-endpoint
  failed_when: false
  no_log: true

- name: Select 3x-ui login session
  ansible.builtin.set_fact:
    xui_login: "{{ _xui_successful_login }}"
    _xui_api_base_path: "{{ _xui_successful_login.item.base_path | default('') }}"
  vars:
    _xui_json_successes: "{{ xui_login_attempts.results | default([]) | selectattr('json', 'defined') | selectattr('json.success', 'equalto', true) | list }}"
    _xui_content_successes: "{{ xui_login_attempts.results | default([]) | selectattr('content', 'defined') | selectattr('content', 'search', '\"success\"\\s*:\\s*true') | list }}"
    _xui_successful_login: "{{ (_xui_json_successes + _xui_content_successes) | first | default({}) }}"
  failed_when: _xui_successful_login | length == 0
  no_log: true

- name: List existing 3x-ui inbounds
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ xui_admin_web_port }}{{ _xui_api_base_path }}/panel/api/inbounds/list"
    method: GET
    headers:
      X-Requested-With: XMLHttpRequest
      X-CSRF-Token: "{{ xui_login.item.csrf_token | default('') }}"
      Cookie: "{{ xui_login.cookies_string }}"
    return_content: true
    status_code: 200
  register: xui_inbounds
  failed_when: not (xui_inbounds.json.success | default(false))
  no_log: true

- name: Capture existing stealth Reality inbound if present
  ansible.builtin.set_fact:
    _existing_stealth_inbound: "{{ (xui_inbounds.json.obj | selectattr('remark', 'equalto', 'stealth-reality') | list | first) | default({}) }}"
    _has_existing_stealth_inbound: "{{ (xui_inbounds.json.obj | selectattr('remark', 'equalto', 'stealth-reality') | list | length) > 0 }}"

- name: Parse existing inbound stream settings
  ansible.builtin.set_fact:
    _existing_stream_settings: >-
      {{
        _existing_stealth_inbound.streamSettings
        if _existing_stealth_inbound.streamSettings is mapping
        else ((_existing_stealth_inbound.streamSettings | default('{}')) | from_json)
      }}
  when: _has_existing_stealth_inbound
  no_log: true

- name: Reuse configured Reality private key for a new clone inbound
  ansible.builtin.set_fact:
    _reality_priv: "{{ reality_server_private_key }}"
  when:
    - not _has_existing_stealth_inbound
    - reality_server_private_key | default('') | length > 0
  no_log: true

- name: Generate Reality x25519 keypair via Xray binary
  ansible.builtin.shell: |
    docker exec xray /app/bin/xray-linux-amd64 x25519
  register: xray_x25519
  changed_when: false
  when:
    - not _has_existing_stealth_inbound
    - reality_server_private_key | default('') | length == 0

- name: Parse public/private keys from xray output
  ansible.builtin.set_fact:
    _reality_priv: "{{ xray_x25519.stdout | regex_search('PrivateKey:\\s*(\\S+)', '\\1') | first }}"
    _reality_pub:  "{{ xray_x25519.stdout | regex_search('PublicKey\\):\\s*(\\S+)', '\\1') | first }}"
  when:
    - not _has_existing_stealth_inbound
    - reality_server_private_key | default('') | length == 0
  no_log: true

- name: Derive Reality public key from configured private key
  ansible.builtin.shell: |
    docker exec xray /app/bin/xray-linux-amd64 x25519 -i "{{ _reality_priv }}"
  register: xray_configured_x25519
  changed_when: false
  when:
    - not _has_existing_stealth_inbound
    - reality_server_private_key | default('') | length > 0
  no_log: true

- name: Parse public key from configured Reality private key
  ansible.builtin.set_fact:
    _reality_pub: "{{ xray_configured_x25519.stdout | regex_search('PublicKey\\):\\s*(\\S+)', '\\1') | first }}"
  when:
    - not _has_existing_stealth_inbound
    - reality_server_private_key | default('') | length > 0
  no_log: true

- name: Reuse configured Reality short IDs for a new clone inbound
  ansible.builtin.set_fact:
    _reality_sids: "{{ reality_short_ids }}"
  when:
    - not _has_existing_stealth_inbound
    - reality_short_ids | default([]) | length > 0
  no_log: true

- name: Generate 8 short IDs
  ansible.builtin.set_fact:
    _reality_sids: "{{ lookup('ansible.builtin.pipe', 'for i in $(seq 1 8); do openssl rand -hex 8; done').splitlines() }}"
  when:
    - not _has_existing_stealth_inbound
    - reality_short_ids | default([]) | length == 0

- name: Reuse configured Reality material for an existing clone inbound
  ansible.builtin.set_fact:
    _reality_priv: "{{ reality_server_private_key }}"
    _reality_sids: "{{ reality_short_ids }}"
  when:
    - _has_existing_stealth_inbound
    - xray_reality_seed_existing_material | default(false) | bool
    - reality_server_private_key | default('') | length > 0
    - reality_short_ids | default([]) | length > 0
  no_log: true

- name: Recover Reality private key and short IDs from existing inbound
  ansible.builtin.set_fact:
    _reality_priv: "{{ _existing_stream_settings.realitySettings.privateKey }}"
    _reality_sids: "{{ _existing_stream_settings.realitySettings.shortIds }}"
  when:
    - _has_existing_stealth_inbound
    - not (
        xray_reality_seed_existing_material | default(false) | bool
        and reality_server_private_key | default('') | length > 0
        and reality_short_ids | default([]) | length > 0
      )
  no_log: true

- name: Sync existing clone Reality private key and short IDs
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i \
      -e REALITY_KEY_MATERIAL={{ _reality_priv | quote }} \
      -e REALITY_SHORT_IDS={{ _reality_sids | to_json | quote }} \
      xray python3 - <<'PY'
    import json
    import os
    import sqlite3

    db = "/etc/x-ui/x-ui.db"
    key_material = os.environ["REALITY_KEY_MATERIAL"]
    short_ids = json.loads(os.environ["REALITY_SHORT_IDS"])

    con = sqlite3.connect(db)
    cols = {row[1] for row in con.execute("pragma table_info(inbounds)")}
    stream_col = "stream_settings" if "stream_settings" in cols else "streamSettings"

    row = con.execute(
        f"select id, {stream_col} from inbounds where remark = ?",
        ("stealth-reality",),
    ).fetchone()
    if not row:
        raise SystemExit("stealth-reality inbound not found")

    inbound_id, stream_raw = row
    stream = json.loads(stream_raw or "{}")
    reality = stream.setdefault("realitySettings", {})

    changed = False
    if reality.get("privateKey") != key_material:
        reality["privateKey"] = key_material
        changed = True
    if reality.get("shortIds") != short_ids:
        reality["shortIds"] = short_ids
        changed = True

    if changed:
        con.execute(
            f"update inbounds set {stream_col} = ? where id = ?",
            (json.dumps(stream, separators=(",", ":")), inbound_id),
        )
        con.commit()
        print("changed")
    else:
        print("ok")
    PY
  args:
    executable: /bin/bash
  register: xui_clone_material_sync
  changed_when: xui_clone_material_sync.stdout | trim == "changed"
  when:
    - _has_existing_stealth_inbound
    - xray_reality_seed_existing_material | default(false) | bool
  no_log: true

- name: Restart xray container after clone Reality material sync
  ansible.builtin.command:
    argv: [docker, restart, xray]
  when: xui_clone_material_sync is changed

- name: Normalize existing Reality inbound listen address for Docker publishing
  ansible.builtin.shell: |
    set -e
    docker exec xray python3 -c '
    import sqlite3
    db = "/etc/x-ui/x-ui.db"
    con = sqlite3.connect(db)
    cur = con.execute("update inbounds set listen = ? where remark = ? and listen != ?", ("0.0.0.0", "stealth-reality", "0.0.0.0"))
    con.commit()
    print(cur.rowcount)
    '
  register: xui_listen_normalize
  changed_when: xui_listen_normalize.stdout | trim != "0"
  when: _has_existing_stealth_inbound

- name: Restart xray container after Reality listen normalization
  ansible.builtin.command:
    argv: [docker, restart, xray]
  when: xui_listen_normalize is changed

- name: Derive Reality public key from existing private key
  ansible.builtin.shell: |
    docker exec xray /app/bin/xray-linux-amd64 x25519 -i "{{ _reality_priv }}"
  register: xray_existing_x25519
  changed_when: false
  when: _has_existing_stealth_inbound
  no_log: true

- name: Parse public key from existing Reality private key
  ansible.builtin.set_fact:
    _reality_pub: "{{ xray_existing_x25519.stdout | regex_search('PublicKey\\):\\s*(\\S+)', '\\1') | first }}"
  when: _has_existing_stealth_inbound
  no_log: true

- name: Build 3x-ui VLESS clients payload
  ansible.builtin.set_fact:
    _xui_clients_payload: >-
      {{
        (_xui_clients_payload | default([])) + [
          {
            'id': item.uuid,
            'email': item.email,
            'flow': 'xtls-rprx-vision',
            'enable': true,
            'limitIp': 0,
            'totalGB': 0,
            'expiryTime': 0,
            'reset': 0,
            'subId': item.uuid | regex_replace('-', '') | truncate(16, true, '')
          }
        ]
      }}
  loop: "{{ xray_reality_clients | default(clients) }}"
  when: not _has_existing_stealth_inbound
  no_log: true

- name: Create inbound via 3x-ui API
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ xui_admin_web_port }}{{ _xui_api_base_path }}/panel/api/inbounds/add"
    method: POST
    headers:
      X-Requested-With: XMLHttpRequest
      X-CSRF-Token: "{{ xui_login.item.csrf_token | default('') }}"
      Cookie: "{{ xui_login.cookies_string }}"
    body_format: json
    body:
      enable: true
      remark: "stealth-reality"
      listen: "0.0.0.0"
      port: "{{ xray_reality_listen_port | int }}"
      protocol: "vless"
      settings: "{{ _inbound_settings | to_json }}"
      streamSettings: "{{ _stream_settings | to_json }}"
      sniffing: '{"enabled": true, "destOverride": ["http","tls"]}'
    status_code: [200]
    return_content: true
  vars:
    _inbound_settings:
      clients: "{{ _xui_clients_payload }}"
      decryption: "none"
      fallbacks: []
    _stream_settings:
      network: "tcp"
      security: "reality"
      realitySettings:
        show: false
        dest: "{{ reality_dest }}"
        xver: 0
        serverNames: "{{ reality_server_names }}"
        privateKey: "{{ _reality_priv }}"
        shortIds: "{{ _reality_sids }}"
      tcpSettings:
        header:
          type: "none"
  register: xui_add_inbound
  failed_when: not (xui_add_inbound.json.success | default(false))
  when: not _has_existing_stealth_inbound
  no_log: true

- name: Ensure generated short IDs cover all clients
  ansible.builtin.assert:
    that:
      - (_reality_sids | length) >= ((xray_reality_clients | default(clients)) | length)
    fail_msg: "Reality short_ids are fewer than configured clients."

- name: Build clients list with assigned Reality short IDs
  ansible.builtin.set_fact:
    _clients_with_short_ids: "{{ (_clients_with_short_ids | default([])) + [ item | combine({'short_id': _reality_sids[ansible_loop.index0]}) ] }}"
  loop: "{{ xray_reality_clients | default(clients) }}"
  loop_control:
    extended: true
  no_log: true

- name: Render updated stealth secrets plaintext locally
  ansible.builtin.template:
    src: stealth-secrets.yml.j2
    dest: "{{ playbook_dir }}/../secrets/.stealth.generated.yml"
    mode: "0600"
  vars:
    template_reality_server_private_key: "{{ _reality_priv }}"
    template_reality_server_public_key: "{{ _reality_pub }}"
    template_reality_short_ids: "{{ _reality_sids }}"
    template_clients: "{{ _clients_with_short_ids }}"
    template_home_reality_public_host: "{{ home_reality_public_host | default(vault_home_reality_public_host | default('')) }}"
    template_home_reality_ingress_port: "{{ home_reality_ingress_port }}"
    template_home_reality_dest_host: "{{ home_reality_dest_host | default('gateway.icloud.com') }}"
    template_home_reality_dest_port: "{{ home_reality_dest_port | default(443) }}"
    template_home_reality_server_private_key: "{{ home_reality_server_private_key | default('') }}"
    template_home_reality_server_public_key: "{{ home_reality_server_public_key | default('') }}"
    template_home_reality_server_short_ids: "{{ home_reality_server_short_ids | default([]) }}"
    template_home_clients: "{{ home_clients | default([]) }}"
    template_emergency_clients: "{{ emergency_clients | default([]) }}"
  delegate_to: localhost
  become: false
  no_log: true
  when: xray_reality_persist_generated_secrets | default(true) | bool

- name: Encrypt updated stealth secrets locally
  ansible.builtin.shell: |
    set -euo pipefail
    plain="{{ playbook_dir }}/../secrets/.stealth.generated.yml"
    target="{{ playbook_dir }}/../secrets/stealth.yml"
    tmp="$(mktemp "{{ playbook_dir }}/../secrets/stealth.yml.XXXXXX")"
    trap 'rm -f "$plain" "$tmp"' EXIT
    ANSIBLE_CONFIG="{{ playbook_dir }}/../ansible.cfg" \
      ansible-vault encrypt \
      --vault-password-file ~/.vault_pass.txt \
      --encrypt-vault-id default \
      --output "$tmp" \
      "$plain"
    mv "$tmp" "$target"
    rm -f "$plain"
    trap - EXIT
  args:
    executable: /bin/bash
    chdir: "{{ playbook_dir }}/.."
  delegate_to: localhost
  become: false
  no_log: true
  when: xray_reality_persist_generated_secrets | default(true) | bool
