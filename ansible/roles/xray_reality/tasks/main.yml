- name: Validate 3x-ui credentials before mutating Reality stack
  ansible.builtin.assert:
    that:
      - xui_admin_username is defined
      - xui_admin_username | string | length > 0
      - xui_admin_password is defined
      - xui_admin_password | string | length > 0
    fail_msg: "xui_admin_username/xui_admin_password must be present in Vault before running the Reality VPS role."
  no_log: true

- name: Ensure xray volumes dir
  ansible.builtin.file:
    path: "{{ stealth_stack_dir }}/xray/{{ item }}"
    state: directory
    mode: "0755"
  loop: [db, cert]

- name: Render docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ stealth_stack_dir }}/docker-compose.yml"
    mode: "0644"
  notify: compose up

- name: Force bring stack up
  community.docker.docker_compose_v2:
    project_src: "{{ stealth_stack_dir }}"
    state: present
    pull: missing

- name: Read current 3x-ui panel settings
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - xray
      - /app/x-ui
      - setting
      - -show
      - "true"
  register: xui_settings
  changed_when: false

- name: Parse current 3x-ui settings
  ansible.builtin.set_fact:
    _xui_desired_base_path: "{{ xui_admin_web_path | regex_replace('^/+', '') | regex_replace('/+$', '') }}"
    _xui_desired_path: "{{ xui_admin_web_path | regex_replace('/+$', '') if xui_admin_web_path != '/' else '/' }}"
    _xui_current_port: "{{ (xui_settings.stdout | regex_search('port:\\s+(\\d+)', '\\1') | first | default('2053')) | int }}"
    _xui_current_path: "{{ ((xui_settings.stdout | regex_search('webBasePath:\\s+(\\S+)', '\\1') | first | default('/')) | regex_replace('/+$', '')) or '/' }}"
    _xui_has_default_credential: "{{ (xui_settings.stdout | regex_search('hasDefaultCredential:\\s+(\\S+)', '\\1') | first | default('false')) == 'true' }}"

- name: Apply desired 3x-ui settings when panel config drift is detected
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - xray
      - /app/x-ui
      - setting
      - -username
      - "{{ xui_admin_username }}"
      - -password
      - "{{ xui_admin_password }}"
      - -port
      - "{{ xui_admin_web_port | string }}"
      - -webBasePath
      - "{{ _xui_desired_base_path }}"
  register: xui_apply_settings_initial
  changed_when: true
  when:
    - _xui_current_port != (xui_admin_web_port | int)
      or _xui_current_path != _xui_desired_path
      or _xui_has_default_credential
  no_log: true

- name: Restart xray container after initial 3x-ui settings update
  ansible.builtin.command:
    argv: [docker, restart, xray]
  when: xui_apply_settings_initial is changed

- name: Wait for desired 3x-ui panel port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ xui_admin_web_port }}"
    timeout: 60

- name: Probe 3x-ui login with desired credentials
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ xui_admin_web_port }}{{ xui_admin_web_path }}/login"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ xui_admin_username }}"
      password: "{{ xui_admin_password }}"
    status_code: 200
    return_content: true
  register: xui_login_probe
  failed_when: false
  no_log: true

- name: Force desired 3x-ui credentials when login probe still fails
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - xray
      - /app/x-ui
      - setting
      - -username
      - "{{ xui_admin_username }}"
      - -password
      - "{{ xui_admin_password }}"
      - -port
      - "{{ xui_admin_web_port | string }}"
      - -webBasePath
      - "{{ _xui_desired_base_path }}"
  register: xui_apply_settings_forced
  changed_when: true
  when: not (xui_login_probe.json.success | default(false))
  no_log: true

- name: Restart xray container after forced 3x-ui credential reset
  ansible.builtin.command:
    argv: [docker, restart, xray]
  when: xui_apply_settings_forced is changed

- name: Wait for 3x-ui to be ready with desired credentials
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ xui_admin_web_port }}{{ xui_admin_web_path }}/login"
    method: POST
    body_format: form-urlencoded
    body:
      username: "{{ xui_admin_username }}"
      password: "{{ xui_admin_password }}"
    status_code: 200
    return_content: true
  register: xui_health
  retries: 30
  delay: 2
  until: xui_health.json.success | default(false)
  no_log: true

- name: Build VPS Reality client source of truth
  ansible.builtin.set_fact:
    xray_reality_clients: "{{ clients + (emergency_clients | default([])) }}"
  no_log: true

- name: Seed Reality inbound (first run)
  ansible.builtin.include_tasks: seed_reality.yml
  when: reality_server_public_key | length == 0

- name: Sync existing Reality inbound cover SNI
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i \
      -e REALITY_DEST={{ reality_dest | quote }} \
      -e REALITY_SERVER_NAMES={{ reality_server_names | to_json | quote }} \
      -e REALITY_SHORT_IDS={{ reality_short_ids | to_json | quote }} \
      xray python3 - <<'PY'
    import json
    import os
    import sqlite3

    db = "/etc/x-ui/x-ui.db"
    dest = os.environ["REALITY_DEST"]
    server_names = json.loads(os.environ["REALITY_SERVER_NAMES"])
    short_ids = json.loads(os.environ["REALITY_SHORT_IDS"])

    con = sqlite3.connect(db)
    cols = {row[1] for row in con.execute("pragma table_info(inbounds)")}
    stream_col = "stream_settings" if "stream_settings" in cols else "streamSettings"

    row = con.execute(
        f"select id, {stream_col} from inbounds where remark = ?",
        ("stealth-reality",),
    ).fetchone()
    if not row:
        raise SystemExit("stealth-reality inbound not found")

    inbound_id, stream_raw = row
    stream = json.loads(stream_raw or "{}")
    reality = stream.setdefault("realitySettings", {})

    changed = False
    if reality.get("dest") != dest:
        reality["dest"] = dest
        changed = True
    if reality.get("serverNames") != server_names:
        reality["serverNames"] = server_names
        changed = True
    if reality.get("shortIds") != short_ids:
        reality["shortIds"] = short_ids
        changed = True

    if changed:
        con.execute(
            f"update inbounds set {stream_col} = ? where id = ?",
            (json.dumps(stream, separators=(",", ":")), inbound_id),
        )
        con.commit()
        print("changed")
    else:
        print("ok")
    PY
  args:
    executable: /bin/bash
  register: xray_reality_sni_sync
  changed_when: xray_reality_sni_sync.stdout | trim == "changed"
  when: reality_server_public_key | length > 0

- name: Sync existing Reality inbound clients
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i \
      -e REALITY_CLIENTS={{ xray_reality_clients | to_json | quote }} \
      xray python3 - <<'PY'
    import json
    import os
    import sqlite3

    db = "/etc/x-ui/x-ui.db"
    clients = json.loads(os.environ["REALITY_CLIENTS"])
    desired = []
    for client in clients:
        uuid = client["uuid"]
        desired.append({
            "id": uuid,
            "email": client.get("email") or client["name"],
            "flow": "xtls-rprx-vision",
            "enable": True,
            "limitIp": 0,
            "totalGB": 0,
            "expiryTime": 0,
            "reset": 0,
            "subId": uuid.replace("-", "")[:16],
        })

    con = sqlite3.connect(db)
    cols = {row[1] for row in con.execute("pragma table_info(inbounds)")}
    settings_col = "settings"

    row = con.execute(
        f"select id, {settings_col} from inbounds where remark = ?",
        ("stealth-reality",),
    ).fetchone()
    if not row:
        raise SystemExit("stealth-reality inbound not found")

    inbound_id, settings_raw = row
    settings = json.loads(settings_raw or "{}")
    if settings.get("clients") == desired:
        print("ok")
        raise SystemExit(0)

    settings["clients"] = desired
    con.execute(
        f"update inbounds set {settings_col} = ? where id = ?",
        (json.dumps(settings, separators=(",", ":")), inbound_id),
    )
    con.commit()
    print("changed")
    PY
  args:
    executable: /bin/bash
  register: xray_reality_clients_sync
  changed_when: xray_reality_clients_sync.stdout | trim == "changed"
  when: reality_server_public_key | length > 0
  no_log: true

- name: Restart xray after existing Reality inbound sync
  ansible.builtin.command:
    argv: [docker, restart, xray]
  when: xray_reality_sni_sync is changed or xray_reality_clients_sync is changed

- name: Persist Xray template route for private VPS Unbound endpoint
  ansible.builtin.shell: |
    set -euo pipefail
    docker exec -i \
      -e UNBOUND_TARGET={{ vps_unbound_reality_target_host | quote }} \
      -e UNBOUND_PORT={{ vps_unbound_xray_allow_port | string | quote }} \
      xray python3 - <<'PY'
    import json
    import os
    import sqlite3

    config_path = "/app/bin/config.json"
    db_path = "/etc/x-ui/x-ui.db"
    target = os.environ["UNBOUND_TARGET"]
    port = os.environ["UNBOUND_PORT"]
    if not target:
        print("ok")
        raise SystemExit(0)

    desired = {
        "type": "field",
        "ip": [f"{target}/32"],
        "port": port,
        "outboundTag": "direct",
    }

    with open(config_path, "r", encoding="utf-8") as fh:
        cfg = json.load(fh)

    # 3x-ui persists a template and then injects DB-managed inbounds into the
    # runtime config. Keep only the API inbound in the template to avoid
    # duplicating managed Reality inbounds after restart.
    cfg["inbounds"] = [
        inbound for inbound in cfg.get("inbounds", [])
        if inbound.get("tag") == "api"
    ]

    routing = cfg.setdefault("routing", {})
    rules = routing.setdefault("rules", [])
    rules = [
        rule for rule in rules
        if not (
            rule.get("outboundTag") == "direct"
            and rule.get("port") == port
            and f"{target}/32" in rule.get("ip", [])
        )
    ]

    insert_at = len(rules)
    for idx, rule in enumerate(rules):
        if rule.get("outboundTag") == "blocked" and "geoip:private" in rule.get("ip", []):
            insert_at = idx
            break

    rules.insert(insert_at, desired)
    cfg["routing"]["rules"] = rules

    updated = json.dumps(cfg, sort_keys=True, separators=(",", ":"))
    con = sqlite3.connect(db_path)
    row = con.execute("select value from settings where key = ?", ("xrayTemplateConfig",)).fetchone()
    current = row[0] if row else ""
    if current:
        try:
            current = json.dumps(json.loads(current), sort_keys=True, separators=(",", ":"))
        except Exception:
            pass

    if current == updated:
        print("ok")
        raise SystemExit(0)

    pretty = json.dumps(cfg, indent=2)
    if row:
        con.execute("update settings set value = ? where key = ?", (pretty, "xrayTemplateConfig"))
    else:
        con.execute("insert into settings (key, value) values (?, ?)", ("xrayTemplateConfig", pretty))
    con.commit()
    print("changed")
    PY
  args:
    executable: /bin/bash
  register: xray_private_unbound_route
  changed_when: xray_private_unbound_route.stdout | trim == "changed"
  when:
    - vps_unbound_enabled | default(true) | bool
    - vps_unbound_reality_target_host | default('') | length > 0

- name: Validate Xray config after private Unbound allow route
  ansible.builtin.command:
    argv:
      - docker
      - exec
      - xray
      - /app/bin/xray-linux-amd64
      - run
      - -test
      - -c
      - /app/bin/config.json
  changed_when: false
  when: xray_private_unbound_route is changed

- name: Restart xray container after private Unbound template route
  ansible.builtin.command:
    argv: [docker, restart, xray]
  when: xray_private_unbound_route is changed
