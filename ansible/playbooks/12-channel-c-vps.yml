- name: Deploy Channel C planned compatibility lane on VPS
  hosts: vps_stealth
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vps_stealth.yml
    - ../secrets/stealth.yml
  roles:
    - caddy_l4
  tasks:
    - name: Channel C Caddy route is present when enabled
      ansible.builtin.shell: |
        set -euo pipefail
        grep -q '{{ channel_c_naive_public_host }}' {{ system_caddyfile_path }}
        {% if channel_c_naive_backend | default('caddy_forward_proxy') == 'squid_tls' %}
        grep -q '127.0.0.1:{{ channel_c_naive_squid_local_port }}' {{ system_caddyfile_path }}
        {% elif channel_c_naive_backend | default('caddy_forward_proxy') in ['stunnel_tinyproxy', 'stunnel_squid'] %}
        grep -q '127.0.0.1:{{ channel_c_naive_stunnel_local_port }}' {{ system_caddyfile_path }}
        {% elif channel_c_naive_backend | default('caddy_forward_proxy') == 'tinyproxy' %}
        grep -q '127.0.0.1:{{ channel_c_naive_tinyproxy_local_port }}' {{ system_caddyfile_path }}
        {% else %}
        grep -q 'forward_proxy' {{ system_caddyfile_path }}
        {% endif %}
      args:
        executable: /bin/bash
      changed_when: false
      when: channel_c_naive_enabled | default(false) | bool
