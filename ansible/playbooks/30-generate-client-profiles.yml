              h1 { margin: 0 0 8px; font-size: 34px; }
              p { margin: 0 0 24px; color: #566; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
              article { border: 1px solid #d8d8cf; border-radius: 8px; background: white; padding: 16px; }
              h2 { margin: 0 0 12px; font-size: 18px; }
              a { color: #145c7c; font-weight: 650; }
              .links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
              img { width: 100%; max-width: 320px; aspect-ratio: 1; display: block; margin: 0 auto; image-rendering: pixelated; }
            </style>
          </head>
          <body>
            <main>
              <h1>Channel D NaiveProxy Lab Clients</h1>
              <p><a href="README.md">Read the local Channel D import checklist before importing.</a></p>
              <p>Scan QR with the iOS Camera/Safari deep-link flow to prefill Karing Remark. If using Karing's in-app scanner, copy the raw URL and the Remark shown on the card.</p>
              <section class="grid">
          {% for client in channel_d_profile_clients %}
                <article>
                  <h2>{{ client.name }} Channel D</h2>
                  <p>Remark: <code>{{ client.name }}-channel-d</code></p>
                  <img src="{{ client.name }}-channel-d-naiveproxy.png" alt="{{ client.name }} Channel D QR">
                  <div class="links">
                    <a href="{{ client.name }}-channel-d-karing.txt">Karing install link</a>
                    <a href="{{ client.name }}-channel-d-naiveproxy.txt">raw NaiveProxy URL</a>
                  </div>
                </article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      when: channel_d_profile_generation_enabled | bool
      no_log: true
      tags:
        - channel_d_clients_only

    - name: Render Channel M maxtg MAX egress env fragment for each service client
      ansible.builtin.copy:
        dest: "{{ channel_m_out_dir }}/{{ item.name }}.env"
        mode: "0600"
        content: |
          # Source/copy MAX_EGRESS_PROXY_URL into maxtg_bridge .env.secrets on Hetzner.
          # Source/copy MAX_EGRESS_PROXY_HOST into maxtg_bridge .env.host for compose extra_hosts.
          # Optional app-side recovery: keep router SSH target/key in VPS runtime secrets.
          # Run the router command below through that restricted SSH profile when MAX egress needs repair.
          MAX_EGRESS_RECOVERY_SUPERVISOR_COMMAND=/jffs/scripts/ghostroute-runtime-supervisor.sh channel-m-recover
          MAX_EGRESS_RECOVERY_STATUS_COMMAND=/jffs/scripts/ghostroute-runtime-supervisor.sh channel-m-status
          # Do not commit this file.
          {% if channel_m_maxtg_reverse_enabled | default(false) | bool %}
          # Reverse Channel M: router opens outbound SSH -R to the VPS docker bridge.
          # The proxy leg is plain HTTP because it is carried inside that SSH tunnel.
          MAX_EGRESS_PROXY_URL=http://{{ item.username | urlencode }}:{{ item.password | urlencode }}@{{ channel_m_maxtg_public_host }}:{{ channel_m_maxtg_reverse_listen_port }}
          MAX_EGRESS_PROXY_HOST={{ channel_m_maxtg_public_host }}
          # Set MAX_EGRESS_PROXY_GATEWAY on the bridge VPS to the compose docker gateway.
          {% else %}
          MAX_EGRESS_PROXY_URL=https://{{ item.username | urlencode }}:{{ item.password | urlencode }}@{{ channel_m_maxtg_public_host }}:{{ channel_m_maxtg_public_port }}
          MAX_EGRESS_PROXY_HOST={{ channel_m_maxtg_public_host }}
          {% endif %}
      loop: "{{ channel_m_maxtg_clients | default([]) }}"
      when: channel_m_maxtg_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_m_artifacts_only

    - name: Render Channel M local operator checklist
      ansible.builtin.copy:
        dest: "{{ channel_m_out_dir }}/README.md"
        mode: "0600"
        content: |
          # Channel M maxtg MAX Egress Artifact

          Channel M is a service-only MAX egress lane:

          ```text
          maxtg_bridge container -> HTTP CONNECT -> VPS docker bridge :{{ channel_m_maxtg_reverse_listen_port }}
          home router -> outbound SSH remote-forward -> VPS docker bridge :{{ channel_m_maxtg_reverse_listen_port }}
          tunnel target -> router loopback Channel M -> direct-out -> home WAN -> MAX API/CDN
          ```

          Use the generated `<client>.env` fragment only on the maxtg_bridge
          Hetzner host as `.env.secrets` / `.env.host` input. It contains
          `MAX_EGRESS_PROXY_URL` and must stay out of git, tickets and chat
          logs. `MAX_EGRESS_PROXY_GATEWAY` is deployment-specific and should be
          set on the VPS to the compose docker gateway address.

          Expected bridge config:

          ```yaml
          max:
            egress:
              active: "home_ru_proxy"
              fallback_policy: "manual"
          ```

          Router invariants:

          - inbound tag: `channel-m-maxtg-max-egress`
          - route: `channel-m-maxtg-max-egress -> direct-out`
          - reverse inbound tag: `channel-m-maxtg-reverse-egress`
          - route: `channel-m-maxtg-reverse-egress -> direct-out`
          - reverse SSH listener: VPS docker bridge port `{{ channel_m_maxtg_reverse_listen_port }}`
          - source allowlist: Vault-configured Hetzner/VPS CIDR only
          - not Channel A/B/C failover
          - not `reality-out`, `STEALTH_DOMAINS`, `VPN_STATIC_NETS` or policy DNS
          - no home inbound public port is required for the reverse lane
          - router boot recovery uses `ghostroute-runtime-supervisor.sh boot`
          - VPS/app on-demand recovery may request only
            `ghostroute-runtime-supervisor.sh channel-m-recover`
          - VPS/app status checks may request only
            `ghostroute-runtime-supervisor.sh channel-m-status`

          After deploy, run `ansible-playbook playbooks/23-channel-m-reverse.yml`,
          `ansible-playbook playbooks/99-verify.yml`, and check maxtg_bridge
          `/status` for `MAX egress: home_ru_proxy`.
      when: channel_m_maxtg_enabled | default(false) | bool
      tags:
        - channel_m_artifacts_only

    - name: Inform user
      ansible.builtin.debug:
        msg: |
          Router profile generated in {{ out_dir }}.
          HOME Reality mobile profiles generated in {{ home_out_dir }}.
          Emergency direct-VPS mobile profiles generated in {{ emergency_out_dir }}.
          Channel B selected-client production artifacts generated in {{ channel_b_out_dir }} when enabled.
          Channel C1 home-first artifacts generated in {{ channel_c_out_dir }} when enabled.
          Channel M maxtg service artifact generated in {{ channel_m_out_dir }} when enabled.
          Emergency profiles must stay disabled in client apps except during a home relay outage.
