      ansible.builtin.copy:
        dest: "{{ channel_d_out_dir }}/README.md"
        mode: "0600"
        content: |
          # Channel D Router-Native NaiveProxy Lab

          Channel D is an experimental selected-client home-first lane:

          {% if channel_d_karing_trial_enabled | bool %}
          This bundle was rendered in Karing import trial mode. It uses
          placeholder endpoint/credentials and is for client import testing only;
          it will not connect to GhostRoute runtime.

          {% endif %}

          ```text
          Karing / NaiveProxy-style client
            -> home public host :{{ channel_d_profile_public_port }}
            -> router Caddy forward_proxy@naive
            -> router sing-box SOCKS `channel-d-naiveproxy-socks-in`
            -> managed split
          ```

          Import `*-channel-d-naiveproxy.png` with the iOS Camera/Safari deep
          link flow. The QR contains a Karing `install-config` link with
          `name=<client-name>-channel-d`, so Karing pre-fills the required
          Remark field. If using Karing's in-app QR scanner or manual paste,
          copy the matching `*-channel-d-naiveproxy.txt` raw URI and set Remark
          to `<client-name>-channel-d` manually.
          Keep the Naive URL host aligned with the router TLS certificate name.
          A raw public IPv4 with the existing hostname certificate causes Karing
          to fail with `cert common name invalid` unless the client supports a
          separate SNI/server-name override.
          Channel D is not proof for Channel C native Naive and does not
          replace Channel A/B/C.

          Acceptance signal:

          - Managed destinations produce `channel-d-naiveproxy-socks-in -> reality-out`.
          - Non-managed destinations produce `channel-d-naiveproxy-socks-in -> direct-out`.
          - Mobile first hop is the home endpoint, not the VPS.

          Rollback is disabling `vault_channel_d_naiveproxy_enabled` and rerunning
          `ansible-playbook playbooks/24-channel-d-router.yml`.
      when: channel_d_profile_generation_enabled | bool
      tags:
        - channel_d_clients_only

