- name: Generate VLESS client profiles and QR PNG files
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vps_stealth.yml
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  vars:
    out_dir: "{{ playbook_dir }}/../out/clients"
    home_out_dir: "{{ playbook_dir }}/../out/clients-home"
    emergency_out_dir: "{{ playbook_dir }}/../out/clients-emergency"
    channel_b_out_dir: "{{ playbook_dir }}/../out/clients-channel-b"
    channel_c_out_dir: "{{ playbook_dir }}/../out/clients-channel-c"
    channel_c_sfi_out_dir: "{{ channel_c_out_dir }}/c1-SFI"
    channel_c_shadowrocket_out_dir: "{{ channel_c_out_dir }}/1-SR"
    channel_d_out_dir: "{{ playbook_dir }}/../out/clients-channel-d"
    channel_m_out_dir: "{{ playbook_dir }}/../out/channel-m-maxtg"
    shadowrocket_proof_out_dir: "{{ playbook_dir }}/../out/shadowrocket-proof"
    reality_sni: "{{ reality_server_names[0] }}"
    home_reality_sni: "{{ home_reality_server_names[0] }}"
    channel_b_profile_clients: "{{ (channel_b_home_clients | default(channel_b_xhttp_clients | default([]))) if (channel_b_home_relay_enabled | default(false) | bool) else (channel_b_xhttp_clients | default([])) }}"
    channel_c_shadowrocket_profile_clients: "{{ channel_c_shadowrocket_clients | default(channel_c_home_clients | default([]), true) }}"
    channel_d_karing_trial_enabled: "{{ channel_d_naiveproxy_karing_trial_enabled | default(vault_channel_d_naiveproxy_karing_trial_enabled | default(false), true) }}"
    channel_d_karing_trial_clients: "{{ [{'name': 'karing-trial', 'username': 'karing-trial', 'password': 'karing-trial-change-me'}] }}"
    channel_d_profile_generation_enabled: "{{ (channel_d_karing_trial_enabled | bool) or (channel_d_naiveproxy_profiles_enabled | default(channel_d_naiveproxy_enabled | default(false), true) | bool) }}"
    channel_d_profile_public_host: "{{ channel_d_naiveproxy_karing_trial_public_host | default(vault_channel_d_naiveproxy_karing_trial_public_host | default('example.invalid'), true) if (channel_d_karing_trial_enabled | bool) else channel_d_naiveproxy_public_host }}"
    channel_d_profile_public_port: "{{ channel_d_naiveproxy_karing_trial_public_port | default(vault_channel_d_naiveproxy_karing_trial_public_port | default(channel_d_naiveproxy_public_port), true) if (channel_d_karing_trial_enabled | bool) else channel_d_naiveproxy_public_port }}"
    channel_d_profile_clients: "{{ channel_d_naiveproxy_karing_trial_clients | default(vault_channel_d_naiveproxy_karing_trial_clients | default(channel_d_karing_trial_clients), true) if (channel_d_karing_trial_enabled | bool) else (channel_d_naiveproxy_clients | default([])) }}"
  tasks:
    - name: Ensure router output dir
      ansible.builtin.file:
        path: "{{ out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure home mobile output dir
      ansible.builtin.file:
        path: "{{ home_out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure emergency mobile output dir
      ansible.builtin.file:
        path: "{{ emergency_out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure Channel B/C output dirs
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ channel_b_out_dir }}"
        - "{{ channel_c_out_dir }}"
        - "{{ channel_c_sfi_out_dir }}"
        - "{{ channel_c_shadowrocket_out_dir }}"
        - "{{ channel_d_out_dir }}"
        - "{{ channel_m_out_dir }}"
      tags:
        - channel_b_clients_only
        - channel_c_clients_only
        - channel_d_clients_only
        - channel_m_artifacts_only

    - name: Ensure Shadowrocket proof output dir
      ansible.builtin.file:
        path: "{{ shadowrocket_proof_out_dir }}"
        state: directory
        mode: "0700"
      tags:
        - shadowrocket_proof

    - name: Validate Channel D live Karing profile host is a TLS hostname
      ansible.builtin.assert:
        that:
          - channel_d_profile_public_host | string | length > 0
          - channel_d_profile_public_host is not match('^(?:[0-9]{1,3}\.){3}[0-9]{1,3}$')
          - channel_d_profile_public_host is not match('^\[?[0-9A-Fa-f:]*:[0-9A-Fa-f:]+\]?$')
        fail_msg: "Live Channel D Karing artifacts require a TLS hostname, not a numeric IP. Use karing-trial mode for placeholder import tests."
      when:
        - channel_d_profile_generation_enabled | bool
        - not (channel_d_karing_trial_enabled | bool)
      no_log: true
      tags:
        - channel_d_clients_only

    - name: Validate Channel C1 client profile fields
      ansible.builtin.assert:
        that:
          - channel_c_home_public_host | string | length > 0
          - channel_c_home_public_port | int > 0
          - channel_c_home_clients | length > 0
          - (channel_c_home_clients | selectattr('name', 'defined') | list | length) == (channel_c_home_clients | length)
          - (channel_c_home_clients | selectattr('username', 'defined') | list | length) == (channel_c_home_clients | length)
          - (channel_c_home_clients | selectattr('password', 'defined') | list | length) == (channel_c_home_clients | length)
        fail_msg: "Channel C1 profile generation needs home host/port and clients with name, username and password."
      when: channel_c_home_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Validate Channel M maxtg MAX egress artifact fields
      ansible.builtin.assert:
        that:
          - channel_m_maxtg_public_host | string | length > 0
          - channel_m_maxtg_public_port | int > 0
          - channel_m_maxtg_clients | length > 0
          - (channel_m_maxtg_clients | selectattr('name', 'defined') | list | length) == (channel_m_maxtg_clients | length)
          - (channel_m_maxtg_clients | selectattr('username', 'defined') | list | length) == (channel_m_maxtg_clients | length)
          - (channel_m_maxtg_clients | selectattr('password', 'defined') | list | length) == (channel_m_maxtg_clients | length)
        fail_msg: "Channel M artifact generation needs home host/public port and clients with name, username and password."
      when: channel_m_maxtg_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_m_artifacts_only

    - name: Validate C1-Shadowrocket profile fields
      ansible.builtin.assert:
        that:
          - channel_c_home_public_host | string | length > 0
          - channel_c_shadowrocket_public_port | int > 0
          - channel_c_shadowrocket_profile_clients | length > 0
          - (channel_c_shadowrocket_profile_clients | selectattr('name', 'defined') | list | length) == (channel_c_shadowrocket_profile_clients | length)
          - (channel_c_shadowrocket_profile_clients | selectattr('username', 'defined') | list | length) == (channel_c_shadowrocket_profile_clients | length)
          - (channel_c_shadowrocket_profile_clients | selectattr('password', 'defined') | list | length) == (channel_c_shadowrocket_profile_clients | length)
        fail_msg: "C1-Shadowrocket profile generation needs home host/public port and clients with name, username and password."
      when: channel_c_shadowrocket_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Validate Channel D NaiveProxy profile fields
      ansible.builtin.assert:
        that:
          - channel_d_profile_public_host | string | length > 0
          - channel_d_profile_public_port | int > 0
          - channel_d_profile_clients | length > 0
          - (channel_d_profile_clients | selectattr('name', 'defined') | list | length) == (channel_d_profile_clients | length)
          - (channel_d_profile_clients | selectattr('username', 'defined') | list | length) == (channel_d_profile_clients | length)
          - (channel_d_profile_clients | selectattr('password', 'defined') | list | length) == (channel_d_profile_clients | length)
        fail_msg: "Channel D profile generation needs public host/port and clients with name, username and password."
      when: channel_d_profile_generation_enabled | bool
      no_log: true
      tags:
        - channel_d_clients_only

    - name: Render VLESS URI for router VPS identity
      ansible.builtin.copy:
        dest: "{{ out_dir }}/router.conf"
        mode: "0600"
        content: |
          vless://{{ router_client.uuid }}@{{ vps_ssh_host }}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp=chrome&pbk={{ reality_server_public_key }}&sid={{ router_client.short_id }}&type=tcp&headerType=none#router
      vars:
        router_client: "{{ clients | selectattr('name', 'equalto', 'router') | list | first }}"
      no_log: true

    - name: Render HOME Reality URI for each mobile client
      ansible.builtin.copy:
        dest: "{{ home_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          vless://{{ item.uuid }}@{{ home_reality_public_host }}:{{ home_reality_ingress_port }}?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ home_reality_sni }}&fp=chrome&pbk={{ home_reality_server_public_key }}&sid={{ item.short_id }}&type=tcp&headerType=none#{{ item.name }}-home
      loop: "{{ home_clients }}"
      no_log: true
      tags:
        - home_clients_only

    - name: Render HOME Reality QR PNG for each mobile client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ home_out_dir }}/{{ item.name }}.png" -r "{{ home_out_dir }}/{{ item.name }}.conf"
      loop: "{{ home_clients }}"
      no_log: true
      tags:
        - home_clients_only

    - name: Render HOME Reality QR index
      ansible.builtin.copy:
        dest: "{{ home_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Home Reality Client QR Codes</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #f4efe6;
                --card: #fffaf0;
                --ink: #1f2528;
                --muted: #67706f;
                --line: #dacdb7;
              }
              body {
                margin: 0;
                font-family: ui-rounded, "Avenir Next", "Trebuchet MS", sans-serif;
                background: radial-gradient(circle at top left, #fff7d6, transparent 34rem), var(--bg);
                color: var(--ink);
              }
              main {
                max-width: 1120px;
                margin: 0 auto;
                padding: 40px 24px 64px;
              }
              h1 {
                margin: 0 0 8px;
                font-size: clamp(32px, 5vw, 56px);
                letter-spacing: -0.04em;
              }
              p {
                margin: 0 0 28px;
                color: var(--muted);
                font-size: 18px;
              }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 18px;
              }
              article {
                border: 1px solid var(--line);
                border-radius: 22px;
                background: color-mix(in srgb, var(--card) 92%, white);
                padding: 18px;
                box-shadow: 0 14px 34px rgba(68, 53, 28, 0.12);
              }
              h2 {
                margin: 0 0 14px;
                font-size: 20px;
                letter-spacing: -0.02em;
              }
              img {
                width: 100%;
                max-width: 320px;
                aspect-ratio: 1;
                display: block;
                margin: 0 auto;
                image-rendering: pixelated;
                border-radius: 12px;
                background: white;
              }
            </style>
              </head>
              <body>
                <main>
                  <h1>Home Reality Client QR Codes</h1>
              <p>Open this file locally and scan each QR from the target device app. Read <a href="README.md">README.md</a> before LTE proof tests.</p>
              <section class="grid">
          {% for client in home_clients %}
                <article><h2>{{ client.name }}-home</h2><img src="{{ client.name }}.png" alt="{{ client.name }} home QR"></article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      no_log: true
      tags:
        - home_clients_only

    - name: Render HOME Reality LTE proof checklist
      ansible.builtin.copy:
        dest: "{{ home_out_dir }}/README.md"
        mode: "0600"
        content: |
          # Home Reality / Channel A LTE proof checklist

          These files are the normal Home Reality profiles. The `.conf` files
          remain simple VLESS Reality import URIs; this checklist does not change
          client profile content.

          Before judging Channel A on LTE:

          1. Disable Wi-Fi.
          2. Disable iCloud Private Relay.
          3. Disable Limit IP Address Tracking for Cellular/LTE.
          4. Enable exactly one GhostRoute profile.
          5. In the client app, make sure DNS is owned by the tunnel/profile.
          6. In the client app, make sure IPv6 cannot bypass the profile.

          Expected managed-split canaries:

          ```text
          http://api.ipify.org      -> VPS egress for managed split
          https://api.ipify.org     -> VPS egress for managed split
          https://api64.ipify.org   -> must not show LTE/mobile-provider IP
          ```

          If `http://api.ipify.org` shows the VPS but
          `https://api64.ipify.org` shows the LTE/mobile-provider IP, the router
          path is not the primary suspect. That pattern means the iPhone client
          app did not own every Layer-0/IPv6 flow before Channel A, because a
          router-side `direct-out` fallback would exit through the home WAN, not
          through the mobile carrier.

          For OneXray/FoXray/V2Box-style clients, check the app equivalents of:

          ```text
          Fake DNS / tunnel DNS: ON
          Override system DNS: ON
          Bypass system DNS: ON when exposed
          Sniffing: ON
          Domain Strategy: AsIs
          Mux / Fragment / TFO: OFF
          IPv6 direct bypass: OFF
          ```

          Keep these canaries separate from router-side IPv6 proof. The router
          intentionally runs IPv4-only with dnsmasq `filter-AAAA`; LTE
          `api64` showing the carrier IP is a client/app ownership issue until
          router logs prove otherwise.
      tags:
        - home_clients_only

    - name: Render shared Shadowrocket proof config
      ansible.builtin.copy:
        dest: "{{ shadowrocket_proof_out_dir }}/ghostroute-shadowrocket-proof.conf"
        mode: "0600"
        content: |
          [General]
          bypass-system = false
          ipv6 = false
          prefer-ipv6 = false
          dns-server = https://1.1.1.1/dns-query, https://cloudflare-dns.com/dns-query
          fallback-dns-server = https://1.1.1.1/dns-query, https://cloudflare-dns.com/dns-query
          dns-fallback-system = false
          dns-direct = false
          hijack-dns = :53
          udp-policy-not-supported-behaviour = REJECT

          [Rule]
          FINAL,PROXY
      tags:
        - shadowrocket_proof

    - name: Render shared Shadowrocket proof README
      ansible.builtin.copy:
        dest: "{{ shadowrocket_proof_out_dir }}/README.md"
        mode: "0600"
        content: |
          # GhostRoute Shadowrocket Proof Config

          This is the shared Shadowrocket proof config for Channel A, Channel B
          and C1-Shadowrocket. It is a Layer 0 endpoint policy, not a server
          profile.

          Import the config as a Shadowrocket Config file, not as a server
          subscription QR. QR subscription import expects server URLs and can
          fail with `cannot fetch subs servers` for full config files.

          ```ini
          [General]
          bypass-system = false
          ipv6 = false
          prefer-ipv6 = false
          dns-server = https://1.1.1.1/dns-query, https://cloudflare-dns.com/dns-query
          fallback-dns-server = https://1.1.1.1/dns-query, https://cloudflare-dns.com/dns-query
          dns-fallback-system = false
          dns-direct = false
          hijack-dns = :53
          udp-policy-not-supported-behaviour = REJECT

          [Rule]
          FINAL,PROXY
          ```

          During proof tests, select this config and set the active server to
          the channel being tested:

          ```text
          Channel A Reality server       -> PROXY
          Channel B XHTTP server         -> PROXY
          Channel C1-Shadowrocket server -> PROXY
          ```

          Expected managed canaries:

          ```text
          https://api.ipify.org   -> VPS IP
          http://api.ipify.org    -> VPS IP
          https://api64.ipify.org -> VPS IP or blocked/timeout, but not LTE provider IP
          ```

          This config is deliberately universal and fail-closed for proof
          tests. It does not need per-site rules for BrowserLeaks, ipify, or
          another checker: every non-system flow reaches the active GhostRoute
          server, DNS does not fall back to the hotel/LTE resolver, and the
          router owns direct-vs-managed decisions after the endpoint reaches
          Channel A/B/C.

          Do not use a client-side Geo/RU split proof config for GhostRoute
          channel tests. Rules such as `GEOIP,RU,DIRECT`,
          `DOMAIN-SUFFIX,sslip.io,DIRECT`, `fallback-dns-server = system`, no
          explicit `dns-server`, or `always-real-ip = *` can move DNS/routing
          decisions back to the endpoint before GhostRoute sees the flow.

          For everyday use, start from
          `ghostroute-shadowrocket-daily-template.conf` instead. It keeps system
          DNS for domestic/banking compatibility and has narrow direct rules for
          banking, Gmail SMTP/IMAP, and local/private services. Gmail SMTP/IMAP
          also stays out of the router managed catalog because those ports can
          time out through the VPS/Reality egress. Add real corporate/private
          direct exceptions only in your local imported Config, not in tracked
          repository docs.
      tags:
        - shadowrocket_proof

    - name: Render shared Shadowrocket daily template
      ansible.builtin.copy:
        dest: "{{ shadowrocket_proof_out_dir }}/ghostroute-shadowrocket-daily-template.conf"
        mode: "0600"
        content: |
          [General]
          bypass-system = false
          ipv6 = false
          prefer-ipv6 = false
          dns-server = system
          fallback-dns-server = system
          dns-fallback-system = false
          hijack-dns = :53
          udp-policy-not-supported-behaviour = REJECT

          [Rule]
          DOMAIN-SUFFIX,vtb.ru,DIRECT
          DOMAIN,ip-check-perf.radar.cloudflare.com,DIRECT
          DOMAIN-SUFFIX,radar.cloudflare.com,DIRECT
          DOMAIN-SUFFIX,app-analytics-services-att.com,DIRECT
          DOMAIN-SUFFIX,app-measurement.com,DIRECT
          DOMAIN-SUFFIX,firebaseinstallations.googleapis.com,DIRECT
          DOMAIN-SUFFIX,sentry.io,DIRECT
          DOMAIN-SUFFIX,app-site-association.cdn-apple.com,DIRECT
          DOMAIN-SUFFIX,mzstorekit.itunes.apple.com,DIRECT
          DOMAIN-SUFFIX,iosapps.itunes.apple.com,DIRECT

          DOMAIN,smtp.gmail.com,DIRECT
          DOMAIN,imap.gmail.com,DIRECT

          # Keep real corporate/private direct exceptions in the local imported
          # Shadowrocket config only. Do not commit them to tracked docs.
          # DOMAIN-SUFFIX,corp.example.invalid,DIRECT
          # DOMAIN-KEYWORD,corp-keyword,DIRECT

          FINAL,PROXY
      tags:
        - shadowrocket_daily
        - shadowrocket_proof

    - name: Render emergency direct-VPS URI for each mobile client
      ansible.builtin.copy:
        dest: "{{ emergency_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          vless://{{ item.uuid }}@{{ vps_ssh_host }}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp=chrome&pbk={{ reality_server_public_key }}&sid={{ item.short_id }}&type=tcp&headerType=none#{{ item.name }}-emergency-direct
      loop: "{{ emergency_clients | default([]) }}"
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render emergency direct-VPS QR PNG for each mobile client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ emergency_out_dir }}/{{ item.name }}.png" -r "{{ emergency_out_dir }}/{{ item.name }}.conf"
      loop: "{{ emergency_clients | default([]) }}"
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render emergency direct-VPS QR index
      ansible.builtin.copy:
        dest: "{{ emergency_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Emergency Direct-VPS QR Codes</title>
            <style>
              body { margin: 0; font-family: system-ui, sans-serif; background: #f7f7f4; color: #1f2528; }
              main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
              h1 { margin: 0 0 8px; font-size: 36px; }
              p { margin: 0 0 24px; color: #566; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
              article { border: 1px solid #d8d8cf; border-radius: 8px; background: white; padding: 16px; }
              h2 { margin: 0 0 12px; font-size: 18px; }
              img { width: 100%; max-width: 320px; aspect-ratio: 1; display: block; margin: 0 auto; image-rendering: pixelated; }
            </style>
          </head>
          <body>
            <main>
              <h1>Emergency Direct-VPS QR Codes</h1>
              <p>Import as disabled/off profiles. Use only when the home relay is unavailable and the VPS is healthy.</p>
              <section class="grid">
          {% for client in emergency_clients | default([]) %}
                <article><h2>{{ client.name }}-emergency-direct</h2><img src="{{ client.name }}.png" alt="{{ client.name }} emergency QR"></article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render Channel B primary URI for each client
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          {% if channel_b_home_relay_enabled | default(false) | bool %}
          vless://{{ item.uuid }}@{{ channel_b_home_xhttp_host }}:{{ channel_b_home_ingress_port }}?encryption=none&security=tls&sni={{ channel_b_home_xhttp_host }}&host={{ channel_b_home_xhttp_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_home_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_home_xhttp_mode | default('packet-up') }}&allowInsecure=1#{{ item.name }}-channel-b-home
          {% else %}
          vless://{{ item.uuid }}@{{ channel_b_xhttp_public_host }}:443?encryption=none&security=tls&sni={{ channel_b_xhttp_public_host }}&host={{ channel_b_xhttp_public_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_xhttp_mode | default('packet-up') }}#{{ item.name }}-xhttp
          {% endif %}
      loop: "{{ channel_b_profile_clients }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B primary text URI for iOS import
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}.txt"
        mode: "0600"
        content: |
          {% if channel_b_home_relay_enabled | default(false) | bool %}
          vless://{{ item.uuid }}@{{ channel_b_home_xhttp_host }}:{{ channel_b_home_ingress_port }}?encryption=none&security=tls&sni={{ channel_b_home_xhttp_host }}&host={{ channel_b_home_xhttp_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_home_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_home_xhttp_mode | default('packet-up') }}&allowInsecure=1#{{ item.name }}-channel-b-home
          {% else %}
