- name: Generate VLESS client profiles and QR PNG files
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vps_stealth.yml
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  vars:
    out_dir: "{{ playbook_dir }}/../out/clients"
    home_out_dir: "{{ playbook_dir }}/../out/clients-home"
    emergency_out_dir: "{{ playbook_dir }}/../out/clients-emergency"
    channel_b_out_dir: "{{ playbook_dir }}/../out/clients-channel-b"
    channel_c_out_dir: "{{ playbook_dir }}/../out/clients-channel-c"
    channel_c_sfi_out_dir: "{{ channel_c_out_dir }}/c1-SFI"
    channel_c_shadowrocket_out_dir: "{{ channel_c_out_dir }}/1-SR"
    shadowrocket_proof_out_dir: "{{ playbook_dir }}/../out/shadowrocket-proof"
    reality_sni: "{{ reality_server_names[0] }}"
    home_reality_sni: "{{ home_reality_server_names[0] }}"
    channel_b_profile_clients: "{{ (channel_b_home_clients | default(channel_b_xhttp_clients | default([]))) if (channel_b_home_relay_enabled | default(false) | bool) else (channel_b_xhttp_clients | default([])) }}"
    channel_c_shadowrocket_profile_clients: "{{ channel_c_shadowrocket_clients | default(channel_c_home_clients | default([]), true) }}"
  tasks:
    - name: Ensure router output dir
      ansible.builtin.file:
        path: "{{ out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure home mobile output dir
      ansible.builtin.file:
        path: "{{ home_out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure emergency mobile output dir
      ansible.builtin.file:
        path: "{{ emergency_out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure Channel B/C output dirs
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ channel_b_out_dir }}"
        - "{{ channel_c_out_dir }}"
        - "{{ channel_c_sfi_out_dir }}"
        - "{{ channel_c_shadowrocket_out_dir }}"
      tags:
        - channel_b_clients_only
        - channel_c_clients_only

    - name: Ensure Shadowrocket proof output dir
      ansible.builtin.file:
        path: "{{ shadowrocket_proof_out_dir }}"
        state: directory
        mode: "0700"
      tags:
        - shadowrocket_proof

    - name: Validate Channel C1 client profile fields
      ansible.builtin.assert:
        that:
          - channel_c_home_public_host | string | length > 0
          - channel_c_home_public_port | int > 0
          - channel_c_home_clients | length > 0
          - (channel_c_home_clients | selectattr('name', 'defined') | list | length) == (channel_c_home_clients | length)
          - (channel_c_home_clients | selectattr('username', 'defined') | list | length) == (channel_c_home_clients | length)
          - (channel_c_home_clients | selectattr('password', 'defined') | list | length) == (channel_c_home_clients | length)
        fail_msg: "Channel C1 profile generation needs home host/port and clients with name, username and password."
      when: channel_c_home_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Validate C1-Shadowrocket profile fields
      ansible.builtin.assert:
        that:
          - channel_c_home_public_host | string | length > 0
          - channel_c_shadowrocket_public_port | int > 0
          - channel_c_shadowrocket_profile_clients | length > 0
          - (channel_c_shadowrocket_profile_clients | selectattr('name', 'defined') | list | length) == (channel_c_shadowrocket_profile_clients | length)
          - (channel_c_shadowrocket_profile_clients | selectattr('username', 'defined') | list | length) == (channel_c_shadowrocket_profile_clients | length)
          - (channel_c_shadowrocket_profile_clients | selectattr('password', 'defined') | list | length) == (channel_c_shadowrocket_profile_clients | length)
        fail_msg: "C1-Shadowrocket profile generation needs home host/public port and clients with name, username and password."
      when: channel_c_shadowrocket_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render VLESS URI for router VPS identity
      ansible.builtin.copy:
        dest: "{{ out_dir }}/router.conf"
        mode: "0600"
        content: |
          vless://{{ router_client.uuid }}@{{ vps_ssh_host }}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp=chrome&pbk={{ reality_server_public_key }}&sid={{ router_client.short_id }}&type=tcp&headerType=none#router
      vars:
        router_client: "{{ clients | selectattr('name', 'equalto', 'router') | list | first }}"
      no_log: true

    - name: Render HOME Reality URI for each mobile client
      ansible.builtin.copy:
        dest: "{{ home_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          vless://{{ item.uuid }}@{{ home_reality_public_host }}:{{ home_reality_ingress_port }}?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ home_reality_sni }}&fp=chrome&pbk={{ home_reality_server_public_key }}&sid={{ item.short_id }}&type=tcp&headerType=none#{{ item.name }}-home
      loop: "{{ home_clients }}"
      no_log: true
      tags:
        - home_clients_only

    - name: Render HOME Reality QR PNG for each mobile client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ home_out_dir }}/{{ item.name }}.png" -r "{{ home_out_dir }}/{{ item.name }}.conf"
      loop: "{{ home_clients }}"
      no_log: true
      tags:
        - home_clients_only

    - name: Render HOME Reality QR index
      ansible.builtin.copy:
        dest: "{{ home_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Home Reality Client QR Codes</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #f4efe6;
                --card: #fffaf0;
                --ink: #1f2528;
                --muted: #67706f;
                --line: #dacdb7;
              }
              body {
                margin: 0;
                font-family: ui-rounded, "Avenir Next", "Trebuchet MS", sans-serif;
                background: radial-gradient(circle at top left, #fff7d6, transparent 34rem), var(--bg);
                color: var(--ink);
              }
              main {
                max-width: 1120px;
                margin: 0 auto;
                padding: 40px 24px 64px;
              }
              h1 {
                margin: 0 0 8px;
                font-size: clamp(32px, 5vw, 56px);
                letter-spacing: -0.04em;
              }
              p {
                margin: 0 0 28px;
                color: var(--muted);
                font-size: 18px;
              }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 18px;
              }
              article {
                border: 1px solid var(--line);
                border-radius: 22px;
                background: color-mix(in srgb, var(--card) 92%, white);
                padding: 18px;
                box-shadow: 0 14px 34px rgba(68, 53, 28, 0.12);
              }
              h2 {
                margin: 0 0 14px;
                font-size: 20px;
                letter-spacing: -0.02em;
              }
              img {
                width: 100%;
                max-width: 320px;
                aspect-ratio: 1;
                display: block;
                margin: 0 auto;
                image-rendering: pixelated;
                border-radius: 12px;
                background: white;
              }
            </style>
              </head>
              <body>
                <main>
                  <h1>Home Reality Client QR Codes</h1>
              <p>Open this file locally and scan each QR from the target device app. Read <a href="README.md">README.md</a> before LTE proof tests.</p>
              <section class="grid">
          {% for client in home_clients %}
                <article><h2>{{ client.name }}-home</h2><img src="{{ client.name }}.png" alt="{{ client.name }} home QR"></article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      no_log: true
      tags:
        - home_clients_only

    - name: Render HOME Reality LTE proof checklist
      ansible.builtin.copy:
        dest: "{{ home_out_dir }}/README.md"
        mode: "0600"
        content: |
          # Home Reality / Channel A LTE proof checklist

          These files are the normal Home Reality profiles. The `.conf` files
          remain simple VLESS Reality import URIs; this checklist does not change
          client profile content.

          Before judging Channel A on LTE:

          1. Disable Wi-Fi.
          2. Disable iCloud Private Relay.
          3. Disable Limit IP Address Tracking for Cellular/LTE.
          4. Enable exactly one GhostRoute profile.
          5. In the client app, make sure DNS is owned by the tunnel/profile.
          6. In the client app, make sure IPv6 cannot bypass the profile.

          Expected managed-split canaries:

          ```text
          http://api.ipify.org      -> VPS egress for managed split
          https://api.ipify.org     -> VPS egress for managed split
          https://api64.ipify.org   -> must not show LTE/mobile-provider IP
          ```

          If `http://api.ipify.org` shows the VPS but
          `https://api64.ipify.org` shows the LTE/mobile-provider IP, the router
          path is not the primary suspect. That pattern means the iPhone client
          app did not own every Layer-0/IPv6 flow before Channel A, because a
          router-side `direct-out` fallback would exit through the home WAN, not
          through the mobile carrier.

          For OneXray/FoXray/V2Box-style clients, check the app equivalents of:

          ```text
          Fake DNS / tunnel DNS: ON
          Override system DNS: ON
          Bypass system DNS: ON when exposed
          Sniffing: ON
          Domain Strategy: AsIs
          Mux / Fragment / TFO: OFF
          IPv6 direct bypass: OFF
          ```

          Keep these canaries separate from router-side IPv6 proof. The router
          intentionally runs IPv4-only with dnsmasq `filter-AAAA`; LTE
          `api64` showing the carrier IP is a client/app ownership issue until
          router logs prove otherwise.
      tags:
        - home_clients_only

    - name: Render shared Shadowrocket proof config
      ansible.builtin.copy:
        dest: "{{ shadowrocket_proof_out_dir }}/ghostroute-shadowrocket-proof.conf"
        mode: "0600"
        content: |
          [General]
          bypass-system = false
          ipv6 = false
          prefer-ipv6 = false

          [Rule]
          FINAL,PROXY
      tags:
        - shadowrocket_proof

    - name: Render shared Shadowrocket proof README
      ansible.builtin.copy:
        dest: "{{ shadowrocket_proof_out_dir }}/README.md"
        mode: "0600"
        content: |
          # GhostRoute Shadowrocket Proof Config

          This is the shared Shadowrocket proof config for Channel A, Channel B
          and C1-Shadowrocket. It is a Layer 0 endpoint policy, not a server
          profile.

          Import the config as a Shadowrocket Config file, not as a server
          subscription QR. QR subscription import expects server URLs and can
          fail with `cannot fetch subs servers` for full config files.

          ```ini
          [General]
          bypass-system = false
          ipv6 = false
          prefer-ipv6 = false

          [Rule]
          FINAL,PROXY
          ```

          During proof tests, select this config and set the active server to
          the channel being tested:

          ```text
          Channel A Reality server       -> PROXY
          Channel B XHTTP server         -> PROXY
          Channel C1-Shadowrocket server -> PROXY
          ```

          Expected managed canaries:

          ```text
          https://api.ipify.org   -> VPS IP
          http://api.ipify.org    -> VPS IP
          https://api64.ipify.org -> VPS IP or blocked/timeout, but not LTE provider IP
          ```

          Do not use a client-side Geo/RU split proof config for GhostRoute
          channel tests. The router owns direct-vs-managed decisions after the
          endpoint reaches Channel A/B/C.
      tags:
        - shadowrocket_proof

    - name: Render emergency direct-VPS URI for each mobile client
      ansible.builtin.copy:
        dest: "{{ emergency_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          vless://{{ item.uuid }}@{{ vps_ssh_host }}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp=chrome&pbk={{ reality_server_public_key }}&sid={{ item.short_id }}&type=tcp&headerType=none#{{ item.name }}-emergency-direct
      loop: "{{ emergency_clients | default([]) }}"
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render emergency direct-VPS QR PNG for each mobile client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ emergency_out_dir }}/{{ item.name }}.png" -r "{{ emergency_out_dir }}/{{ item.name }}.conf"
      loop: "{{ emergency_clients | default([]) }}"
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render emergency direct-VPS QR index
      ansible.builtin.copy:
        dest: "{{ emergency_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Emergency Direct-VPS QR Codes</title>
            <style>
              body { margin: 0; font-family: system-ui, sans-serif; background: #f7f7f4; color: #1f2528; }
              main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
              h1 { margin: 0 0 8px; font-size: 36px; }
              p { margin: 0 0 24px; color: #566; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
              article { border: 1px solid #d8d8cf; border-radius: 8px; background: white; padding: 16px; }
              h2 { margin: 0 0 12px; font-size: 18px; }
              img { width: 100%; max-width: 320px; aspect-ratio: 1; display: block; margin: 0 auto; image-rendering: pixelated; }
            </style>
          </head>
          <body>
            <main>
              <h1>Emergency Direct-VPS QR Codes</h1>
              <p>Import as disabled/off profiles. Use only when the home relay is unavailable and the VPS is healthy.</p>
              <section class="grid">
          {% for client in emergency_clients | default([]) %}
                <article><h2>{{ client.name }}-emergency-direct</h2><img src="{{ client.name }}.png" alt="{{ client.name }} emergency QR"></article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render Channel B primary URI for each client
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          {% if channel_b_home_relay_enabled | default(false) | bool %}
          vless://{{ item.uuid }}@{{ channel_b_home_xhttp_host }}:{{ channel_b_home_ingress_port }}?encryption=none&security=tls&sni={{ channel_b_home_xhttp_host }}&host={{ channel_b_home_xhttp_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_home_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_home_xhttp_mode | default('packet-up') }}&allowInsecure=1#{{ item.name }}-channel-b-home
          {% else %}
          vless://{{ item.uuid }}@{{ channel_b_xhttp_public_host }}:443?encryption=none&security=tls&sni={{ channel_b_xhttp_public_host }}&host={{ channel_b_xhttp_public_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_xhttp_mode | default('packet-up') }}#{{ item.name }}-xhttp
          {% endif %}
      loop: "{{ channel_b_profile_clients }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B primary text URI for iOS import
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}.txt"
        mode: "0600"
        content: |
          {% if channel_b_home_relay_enabled | default(false) | bool %}
          vless://{{ item.uuid }}@{{ channel_b_home_xhttp_host }}:{{ channel_b_home_ingress_port }}?encryption=none&security=tls&sni={{ channel_b_home_xhttp_host }}&host={{ channel_b_home_xhttp_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_home_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_home_xhttp_mode | default('packet-up') }}&allowInsecure=1#{{ item.name }}-channel-b-home
          {% else %}
          vless://{{ item.uuid }}@{{ channel_b_xhttp_public_host }}:443?encryption=none&security=tls&sni={{ channel_b_xhttp_public_host }}&host={{ channel_b_xhttp_public_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_xhttp_mode | default('packet-up') }}#{{ item.name }}-xhttp
          {% endif %}
      loop: "{{ channel_b_profile_clients }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B direct-XHTTP compatibility URI variants
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.0.name }}-{{ item.1.name }}.txt"
        mode: "0600"
        content: |
          vless://{{ item.0.uuid }}@{{ channel_b_xhttp_public_host }}:443?encryption=none&security=tls&sni={{ channel_b_xhttp_public_host }}&host={{ channel_b_xhttp_public_host }}{{ item.1.alpn }}&fp=chrome&type=xhttp&path={{ item.1.path }}{{ item.1.mode }}#{{ item.0.name }}-xhttp-{{ item.1.name }}
      loop: "{{ channel_b_xhttp_clients | default([]) | product(channel_b_xhttp_uri_variants) | list }}"
      when:
        - channel_b_xhttp_enabled | default(false) | bool
        - not (channel_b_home_relay_enabled | default(false) | bool)
      no_log: true
      tags:
        - channel_b_clients_only
      vars:
        channel_b_xhttp_uri_variants:
          - name: noalpn
            alpn: ""
            path: "{{ channel_b_xhttp_path | replace('/', '%2F') }}"
            mode: ""
          - name: h1
            alpn: "&alpn=http%2F1.1"
            path: "{{ channel_b_xhttp_path | replace('/', '%2F') }}"
            mode: ""
          - name: rawpath
            alpn: ""
            path: "{{ channel_b_xhttp_path }}"
            mode: ""
          - name: packet-up
            alpn: "&alpn=h2"
            path: "{{ channel_b_xhttp_path | replace('/', '%2F') }}"
            mode: "&mode={{ channel_b_xhttp_mode | default('packet-up') }}"

    - name: Render Channel B direct-XHTTP raw Xray JSON for each client
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}.json"
        mode: "0600"
        content: |
          {
            "log": {
              "loglevel": "warning"
            },
            "inbounds": [
              {
                "tag": "socks-in",
                "listen": "127.0.0.1",
                "port": 10808,
                "protocol": "socks",
                "settings": {
                  "udp": true
                }
              }
            ],
            "outbounds": [
              {
                "tag": "channel-b-xhttp",
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": {{ channel_b_xhttp_public_host | to_json }},
                      "port": 443,
                      "users": [
                        {
                          "id": {{ item.uuid | to_json }},
                          "encryption": "none",
                          "flow": ""
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "xhttp",
                  "security": "tls",
                  "tlsSettings": {
                    "serverName": {{ channel_b_xhttp_public_host | to_json }},
                    "alpn": ["h2", "http/1.1"],
                    "fingerprint": "chrome"
                  },
                  "xhttpSettings": {
                    "host": {{ channel_b_xhttp_public_host | to_json }},
                    "path": {{ channel_b_xhttp_path | to_json }},
                    "mode": {{ channel_b_xhttp_mode | default('packet-up') | to_json }}
                  }
                }
              },
              {
                "tag": "direct",
                "protocol": "freedom"
              }
            ],
            "routing": {
              "domainStrategy": "AsIs",
              "rules": []
            }
          }
      loop: "{{ channel_b_xhttp_clients | default([]) }}"
      when:
        - channel_b_xhttp_enabled | default(false) | bool
        - not (channel_b_home_relay_enabled | default(false) | bool)
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B direct-XHTTP outbound-only JSON for app import
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}-outbound.json"
        mode: "0600"
        content: |
          {
            "tag": "{{ item.name }}-channel-b-xhttp",
            "protocol": "vless",
            "settings": {
              "vnext": [
                {
                  "address": {{ channel_b_xhttp_public_host | to_json }},
                  "port": 443,
                  "users": [
                    {
                      "id": {{ item.uuid | to_json }},
                      "encryption": "none",
                      "flow": ""
                    }
                  ]
                }
              ]
            },
            "streamSettings": {
              "network": "xhttp",
              "security": "tls",
              "tlsSettings": {
                "serverName": {{ channel_b_xhttp_public_host | to_json }},
                "alpn": ["h2", "http/1.1"],
                "fingerprint": "chrome"
              },
              "xhttpSettings": {
                "host": {{ channel_b_xhttp_public_host | to_json }},
                "path": {{ channel_b_xhttp_path | to_json }},
                "mode": {{ channel_b_xhttp_mode | default('packet-up') | to_json }}
              }
            }
          }
      loop: "{{ channel_b_xhttp_clients | default([]) }}"
      when:
        - channel_b_xhttp_enabled | default(false) | bool
        - not (channel_b_home_relay_enabled | default(false) | bool)
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B XHTTP QR PNG for each client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_b_out_dir }}/{{ item.name }}.png" -r "{{ channel_b_out_dir }}/{{ item.name }}.conf"
      loop: "{{ channel_b_profile_clients }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B local operator checklist
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/README.md"
        mode: "0600"
        content: |
          # Channel B Local Import Checklist

          Channel B is a selected-client production home-first lane. Import
          these profiles only for explicit selected clients; they are not
          automatic production failover.

          ## Layer 0 Endpoint Policy

          If the endpoint client supports rule-based routing, keep the local
          device policy aligned with the layered architecture:

          ```text
          local/private/captive/trusted domestic -> DIRECT
          foreign/non-local/unknown/selected     -> MANAGED/PROXY
          FINAL                                  -> MANAGED/PROXY
          ```

          Shadowrocket on iPhone/iPad/MacBook is one example of this Layer 0
          policy. The Shadowrocket config is a routing layer, not just a VPN
          toggle.

          ## Shadowrocket Channel B

          - Import the `*-channel-b-home` QR/text URI for the selected device.
          - Keep `UDP Relay` disabled by default.
          - Enable `UDP Relay` only for explicit UDP behavior tests.
          - Re-check `FINAL -> MANAGED/PROXY` after importing or editing config
            files.

          ## Expected First Hop

          Channel B managed traffic should use this shape:

          ```text
          endpoint -> VLESS+XHTTP+TLS -> home endpoint -> router relay
                   -> managed split -> Reality/Vision -> VPS
          ```

          Generic IP checkers report the final website-facing exit, not the
          first hop seen by the endpoint's current network.
      when: channel_b_xhttp_enabled | default(false) | bool
      tags:
        - channel_b_clients_only

    - name: Render Channel B QR index
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Channel B Client Artifacts</title>
            <style>
              body { margin: 0; font-family: system-ui, sans-serif; background: #f7f7f4; color: #1f2528; }
              main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
              h1 { margin: 0 0 8px; font-size: 34px; }
              p { margin: 0 0 24px; color: #566; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
              article { border: 1px solid #d8d8cf; border-radius: 8px; background: white; padding: 16px; }
              h2 { margin: 0 0 12px; font-size: 18px; }
              a { color: #145c7c; font-weight: 650; }
              .links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
              img { width: 100%; max-width: 320px; aspect-ratio: 1; display: block; margin: 0 auto; image-rendering: pixelated; }
            </style>
          </head>
          <body>
            <main>
              {% if channel_b_home_relay_enabled | default(false) | bool %}
              <h1>Channel B Home-First XHTTP Clients</h1>
              <p>Primary Channel B import path: device -> home router XHTTP/TLS ingress -> router Reality upstream -> VPS.</p>
              {% else %}
              <h1>Channel B XHTTP Client Artifacts</h1>
              <p>Manual fallback profiles only. Do not import as the primary Channel A profile.</p>
              {% endif %}
              <p><a href="README.md">Read the local Layer 0 / Shadowrocket import checklist before importing.</a></p>
              <section class="grid">
          {% for client in channel_b_profile_clients %}
                <article>
                  <h2>{{ client.name }}</h2>
                  <img src="{{ client.name }}.png" alt="{{ client.name }} Channel B QR">
                  <div class="links">
                    <a href="{{ client.name }}.txt">text URI</a>
          {% if not (channel_b_home_relay_enabled | default(false) | bool) %}
                    <a href="{{ client.name }}-outbound.json">outbound JSON</a>
                    <a href="{{ client.name }}.json">raw JSON</a>
                    <a href="{{ client.name }}-noalpn.txt">no ALPN URI</a>
                    <a href="{{ client.name }}-h1.txt">h1 URI</a>
                    <a href="{{ client.name }}-rawpath.txt">raw path URI</a>
          {% endif %}
                  </div>
                </article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel C1 SFI sing-box full config for each selected client
      ansible.builtin.copy:
        dest: "{{ channel_c_sfi_out_dir }}/{{ item.name }}-sfi-sing-box.json"
        mode: "0600"
        content: |
          {
            "log": {
              "level": "info",
              "timestamp": true
            },
            "inbounds": [
              {
                "type": "tun",
                "tag": "tun-in",
                "interface_name": "tun0",
                "address": ["172.19.10.1/30"],
                "auto_route": true,
                "strict_route": true
              }
            ],
            "outbounds": [
              {
                "type": "naive",
                "tag": "channel-c",
                "server": {{ channel_c_home_public_host | to_json }},
                "server_port": {{ channel_c_home_public_port }},
                "username": {{ item.username | to_json }},
                "password": {{ item.password | to_json }},
                "tls": {
                  "enabled": true,
                  "server_name": {{ channel_c_home_public_host | to_json }}
                }
              },
              {
                "type": "direct",
                "tag": "direct"
              }
            ],
            "route": {
              "auto_detect_interface": true,
              "final": "channel-c"
            }
          }
      loop: "{{ channel_c_home_clients | default([]) }}"
      when:
        - channel_c_home_enabled | default(false) | bool
        - channel_c_sfi_native_profiles_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render C1-Shadowrocket HTTPS CONNECT URL for each selected client
      ansible.builtin.copy:
        dest: "{{ channel_c_shadowrocket_out_dir }}/{{ item.name }}-c1-shadowrocket-https.txt"
        mode: "0600"
        content: |
          https://{{ item.username | urlencode }}:{{ item.password | urlencode }}@{{ channel_c_home_public_host }}:{{ channel_c_shadowrocket_public_port }}#{{ item.name }}-c1-shadowrocket
      loop: "{{ channel_c_shadowrocket_profile_clients }}"
      when: channel_c_shadowrocket_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render C1-Shadowrocket URL QR PNG for each selected client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_c_shadowrocket_out_dir }}/{{ item.name }}-c1-shadowrocket-https.png" -r "{{ channel_c_shadowrocket_out_dir }}/{{ item.name }}-c1-shadowrocket-https.txt"
      loop: "{{ channel_c_shadowrocket_profile_clients }}"
      when: channel_c_shadowrocket_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C1 local operator checklist
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/README.md"
        mode: "0600"
        content: |
          # Channel C1 Home-First Import Checklist

          Channel C has two selected-client home-first variants:

          - C1-sing-box: native sing-box Naive, experimental client artifact
            `c1-SFI/*-sfi-sing-box.json` when
            `channel_c_sfi_native_profiles_enabled=true`.
            The tested iPhone SFI packet-tunnel build rejected this profile
            with `unknown outbound type: naive`, so these profiles are disabled
            by default until the selected iPhone client build supports sing-box
            Naive outbound.
          - C1-Shadowrocket: HTTPS CONNECT compatibility, primary QR
            `1-SR/*-c1-shadowrocket-https.png`.
            Do not use `*-shadowrocket-conf.png`; that older full-config QR did
            not import reliably in Shadowrocket. The working proof was the
            short HTTPS CONNECT URL QR on port `{{ channel_c_shadowrocket_public_port }}`.

          ```text
          C1-sing-box:
          endpoint SFI/sing-box JSON -> Naive/TLS :{{ channel_c_home_public_port }}
                   -> router `channel-c-naive-in`
                   -> managed split -> reality-out -> VPS -> Internet

          C1-Shadowrocket:
          endpoint -> HTTPS CONNECT/TLS :{{ channel_c_shadowrocket_public_port }}
                   -> router `channel-c-shadowrocket-http-in`
                   -> managed split -> reality-out -> VPS -> Internet
          ```

          C1-Shadowrocket is not native Naive. It is a compatibility path.
          C1-sing-box is the native Naive proof target, but it is blocked on
          iPhone until the chosen SFI/sing-box build supports outbound
          `"type": "naive"`. In the imported JSON, the outbound must contain
          `"type": "naive"` with TLS enabled. If SFI reports `unknown outbound
          type: naive`, the client build is not usable for native Naive. If the
          profile becomes `"type": "http"` or Shadowrocket-style HTTPS CONNECT,
          that is the compatibility lane, not native Naive.

          Requirements before import:

          - `{{ channel_c_home_public_host }}:{{ channel_c_home_public_port }}` presents a valid public TLS certificate.
          - iOS Private Relay / Limit IP Address Tracking is disabled during proof tests.
          - The selected client is listed in `vault_channel_c_home_clients`.
          - C1-sing-box proof logs show `channel-c-naive-in -> reality-out`.
          - If testing SFI native, set
            `vault_channel_c_sfi_native_profiles_enabled=true` only for a client
            build known to support `naive` outbound.
          - SFI dashboard counters may stay at zero until traffic is generated
            through the enabled profile.
          - C1-Shadowrocket proof logs show `channel-c-shadowrocket-http-in -> reality-out`.
      when: channel_c_home_enabled | default(false) | bool
      tags:
        - channel_c_clients_only

    - name: Render Channel C1 QR index
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Channel C1 Home-First Client Artifacts</title>
            <style>
              body { margin: 0; font-family: system-ui, sans-serif; background: #f7f7f4; color: #1f2528; }
              main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
              h1 { margin: 0 0 8px; font-size: 34px; }
              p { margin: 0 0 24px; color: #566; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
              article { border: 1px solid #d8d8cf; border-radius: 8px; background: white; padding: 16px; }
              h2 { margin: 0 0 12px; font-size: 18px; }
              a { color: #145c7c; font-weight: 650; }
              .links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
              img { width: 100%; max-width: 320px; aspect-ratio: 1; display: block; margin: 0 auto; image-rendering: pixelated; }
            </style>
          </head>
          <body>
            <main>
              <h1>Channel C1 Home-First Clients</h1>
              <p><a href="README.md">Read the local C1 import checklist before importing.</a></p>
              <section class="grid">
          {% if channel_c_sfi_native_profiles_enabled | default(false) | bool %}
          {% for client in channel_c_home_clients | default([]) %}
                <article>
                  <h2>{{ client.name }} C1-sing-box</h2>
                  <div class="links">
                    <a href="c1-SFI/{{ client.name }}-sfi-sing-box.json">SFI JSON</a>
                  </div>
                </article>
          {% endfor %}
          {% else %}
                <article>
                  <h2>C1-sing-box</h2>
                  <p>SFI native Naive profiles are disabled until the selected iPhone client supports outbound type naive.</p>
                </article>
          {% endif %}
          {% for client in channel_c_shadowrocket_profile_clients if channel_c_shadowrocket_enabled | default(false) | bool %}
                <article>
                  <h2>{{ client.name }} C1-Shadowrocket</h2>
                  <img src="1-SR/{{ client.name }}-c1-shadowrocket-https.png" alt="{{ client.name }} C1-Shadowrocket QR">
                  <div class="links">
                    <a href="1-SR/{{ client.name }}-c1-shadowrocket-https.txt">Shadowrocket URL</a>
                  </div>
                </article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      when: channel_c_home_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Inform user
      ansible.builtin.debug:
        msg: |
          Router profile generated in {{ out_dir }}.
          HOME Reality mobile profiles generated in {{ home_out_dir }}.
          Emergency direct-VPS mobile profiles generated in {{ emergency_out_dir }}.
          Channel B selected-client production artifacts generated in {{ channel_b_out_dir }} when enabled.
          Channel C1 home-first artifacts generated in {{ channel_c_out_dir }} when enabled.
          Emergency profiles must stay disabled in client apps except during a home relay outage.
