- name: Generate VLESS client profiles and QR PNG files
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vps_stealth.yml
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  vars:
    out_dir: "{{ playbook_dir }}/../out/clients"
    home_out_dir: "{{ playbook_dir }}/../out/clients-home"
    emergency_out_dir: "{{ playbook_dir }}/../out/clients-emergency"
    channel_b_out_dir: "{{ playbook_dir }}/../out/clients-channel-b"
    channel_c_out_dir: "{{ playbook_dir }}/../out/clients-channel-c"
    channel_c_naive_out_dir: "{{ channel_c_out_dir }}/naive"
    reality_sni: "{{ reality_server_names[0] }}"
    home_reality_sni: "{{ home_reality_server_names[0] }}"
    channel_c_https_proxy_url: "https://{{ channel_c_naive_username | default('') | urlencode }}:{{ channel_c_naive_password | default('') | urlencode }}@{{ channel_c_naive_public_host | default('') }}:443"
    channel_c_shadowrocket_https_proxy_url: "{{ channel_c_https_proxy_url }}?method=connect&tls=true&plugin=none"
    channel_c_naive_proxy_url: "naive+{{ channel_c_https_proxy_url }}"
  tasks:
    - name: Ensure router output dir
      ansible.builtin.file:
        path: "{{ out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure home mobile output dir
      ansible.builtin.file:
        path: "{{ home_out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure emergency mobile output dir
      ansible.builtin.file:
        path: "{{ emergency_out_dir }}"
        state: directory
        mode: "0700"

    - name: Ensure Channel B/C output dirs
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0700"
      loop:
        - "{{ channel_b_out_dir }}"
        - "{{ channel_c_out_dir }}"
        - "{{ channel_c_naive_out_dir }}"
      tags:
        - channel_b_clients_only
        - channel_c_clients_only

    - name: Render VLESS URI for router VPS identity
      ansible.builtin.copy:
        dest: "{{ out_dir }}/router.conf"
        mode: "0600"
        content: |
          vless://{{ router_client.uuid }}@{{ vps_ssh_host }}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp=chrome&pbk={{ reality_server_public_key }}&sid={{ router_client.short_id }}&type=tcp&headerType=none#router
      vars:
        router_client: "{{ clients | selectattr('name', 'equalto', 'router') | list | first }}"
      no_log: true

    - name: Render HOME Reality URI for each mobile client
      ansible.builtin.copy:
        dest: "{{ home_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          vless://{{ item.uuid }}@{{ home_reality_public_host }}:{{ home_reality_ingress_port }}?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ home_reality_sni }}&fp=chrome&pbk={{ home_reality_server_public_key }}&sid={{ item.short_id }}&type=tcp&headerType=none#{{ item.name }}-home
      loop: "{{ home_clients }}"
      no_log: true
      tags:
        - home_clients_only

    - name: Render HOME Reality QR PNG for each mobile client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ home_out_dir }}/{{ item.name }}.png" -r "{{ home_out_dir }}/{{ item.name }}.conf"
      loop: "{{ home_clients }}"
      no_log: true
      tags:
        - home_clients_only

    - name: Render HOME Reality QR index
      ansible.builtin.copy:
        dest: "{{ home_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Home Reality Client QR Codes</title>
            <style>
              :root {
                color-scheme: light;
                --bg: #f4efe6;
                --card: #fffaf0;
                --ink: #1f2528;
                --muted: #67706f;
                --line: #dacdb7;
              }
              body {
                margin: 0;
                font-family: ui-rounded, "Avenir Next", "Trebuchet MS", sans-serif;
                background: radial-gradient(circle at top left, #fff7d6, transparent 34rem), var(--bg);
                color: var(--ink);
              }
              main {
                max-width: 1120px;
                margin: 0 auto;
                padding: 40px 24px 64px;
              }
              h1 {
                margin: 0 0 8px;
                font-size: clamp(32px, 5vw, 56px);
                letter-spacing: -0.04em;
              }
              p {
                margin: 0 0 28px;
                color: var(--muted);
                font-size: 18px;
              }
              .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
                gap: 18px;
              }
              article {
                border: 1px solid var(--line);
                border-radius: 22px;
                background: color-mix(in srgb, var(--card) 92%, white);
                padding: 18px;
                box-shadow: 0 14px 34px rgba(68, 53, 28, 0.12);
              }
              h2 {
                margin: 0 0 14px;
                font-size: 20px;
                letter-spacing: -0.02em;
              }
              img {
                width: 100%;
                max-width: 320px;
                aspect-ratio: 1;
                display: block;
                margin: 0 auto;
                image-rendering: pixelated;
                border-radius: 12px;
                background: white;
              }
            </style>
          </head>
          <body>
            <main>
              <h1>Home Reality Client QR Codes</h1>
              <p>Open this file locally and scan each QR from the target device app.</p>
              <section class="grid">
          {% for client in home_clients %}
                <article><h2>{{ client.name }}-home</h2><img src="{{ client.name }}.png" alt="{{ client.name }} home QR"></article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      no_log: true
      tags:
        - home_clients_only

    - name: Render emergency direct-VPS URI for each mobile client
      ansible.builtin.copy:
        dest: "{{ emergency_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          vless://{{ item.uuid }}@{{ vps_ssh_host }}:443?encryption=none&flow=xtls-rprx-vision&security=reality&sni={{ reality_sni }}&fp=chrome&pbk={{ reality_server_public_key }}&sid={{ item.short_id }}&type=tcp&headerType=none#{{ item.name }}-emergency-direct
      loop: "{{ emergency_clients | default([]) }}"
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render emergency direct-VPS QR PNG for each mobile client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ emergency_out_dir }}/{{ item.name }}.png" -r "{{ emergency_out_dir }}/{{ item.name }}.conf"
      loop: "{{ emergency_clients | default([]) }}"
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render emergency direct-VPS QR index
      ansible.builtin.copy:
        dest: "{{ emergency_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Emergency Direct-VPS QR Codes</title>
            <style>
              body { margin: 0; font-family: system-ui, sans-serif; background: #f7f7f4; color: #1f2528; }
              main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
              h1 { margin: 0 0 8px; font-size: 36px; }
              p { margin: 0 0 24px; color: #566; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
              article { border: 1px solid #d8d8cf; border-radius: 8px; background: white; padding: 16px; }
              h2 { margin: 0 0 12px; font-size: 18px; }
              img { width: 100%; max-width: 320px; aspect-ratio: 1; display: block; margin: 0 auto; image-rendering: pixelated; }
            </style>
          </head>
          <body>
            <main>
              <h1>Emergency Direct-VPS QR Codes</h1>
              <p>Import as disabled/off profiles. Use only when the home relay is unavailable and the VPS is healthy.</p>
              <section class="grid">
          {% for client in emergency_clients | default([]) %}
                <article><h2>{{ client.name }}-emergency-direct</h2><img src="{{ client.name }}.png" alt="{{ client.name }} emergency QR"></article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      no_log: true
      tags:
        - emergency_clients_only

    - name: Render Channel B XHTTP URI for each client
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}.conf"
        mode: "0600"
        content: |
          vless://{{ item.uuid }}@{{ channel_b_xhttp_public_host }}:443?encryption=none&security=tls&sni={{ channel_b_xhttp_public_host }}&host={{ channel_b_xhttp_public_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_xhttp_mode | default('packet-up') }}#{{ item.name }}-xhttp
      loop: "{{ channel_b_xhttp_clients | default([]) }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B XHTTP text URI for iOS text import
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}.txt"
        mode: "0600"
        content: |
          vless://{{ item.uuid }}@{{ channel_b_xhttp_public_host }}:443?encryption=none&security=tls&sni={{ channel_b_xhttp_public_host }}&host={{ channel_b_xhttp_public_host }}&alpn=h2&fp=chrome&type=xhttp&path={{ channel_b_xhttp_path | replace('/', '%2F') }}&mode={{ channel_b_xhttp_mode | default('packet-up') }}#{{ item.name }}-xhttp
      loop: "{{ channel_b_xhttp_clients | default([]) }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B XHTTP compatibility URI variants
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.0.name }}-{{ item.1.name }}.txt"
        mode: "0600"
        content: |
          vless://{{ item.0.uuid }}@{{ channel_b_xhttp_public_host }}:443?encryption=none&security=tls&sni={{ channel_b_xhttp_public_host }}&host={{ channel_b_xhttp_public_host }}{{ item.1.alpn }}&fp=chrome&type=xhttp&path={{ item.1.path }}{{ item.1.mode }}#{{ item.0.name }}-xhttp-{{ item.1.name }}
      loop: "{{ channel_b_xhttp_clients | default([]) | product(channel_b_xhttp_uri_variants) | list }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only
      vars:
        channel_b_xhttp_uri_variants:
          - name: noalpn
            alpn: ""
            path: "{{ channel_b_xhttp_path | replace('/', '%2F') }}"
            mode: ""
          - name: h1
            alpn: "&alpn=http%2F1.1"
            path: "{{ channel_b_xhttp_path | replace('/', '%2F') }}"
            mode: ""
          - name: rawpath
            alpn: ""
            path: "{{ channel_b_xhttp_path }}"
            mode: ""
          - name: packet-up
            alpn: "&alpn=h2"
            path: "{{ channel_b_xhttp_path | replace('/', '%2F') }}"
            mode: "&mode={{ channel_b_xhttp_mode | default('packet-up') }}"

    - name: Render Channel B XHTTP raw Xray JSON for each client
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}.json"
        mode: "0600"
        content: |
          {
            "log": {
              "loglevel": "warning"
            },
            "inbounds": [
              {
                "tag": "socks-in",
                "listen": "127.0.0.1",
                "port": 10808,
                "protocol": "socks",
                "settings": {
                  "udp": true
                }
              }
            ],
            "outbounds": [
              {
                "tag": "channel-b-xhttp",
                "protocol": "vless",
                "settings": {
                  "vnext": [
                    {
                      "address": {{ channel_b_xhttp_public_host | to_json }},
                      "port": 443,
                      "users": [
                        {
                          "id": {{ item.uuid | to_json }},
                          "encryption": "none",
                          "flow": ""
                        }
                      ]
                    }
                  ]
                },
                "streamSettings": {
                  "network": "xhttp",
                  "security": "tls",
                  "tlsSettings": {
                    "serverName": {{ channel_b_xhttp_public_host | to_json }},
                    "alpn": ["h2", "http/1.1"],
                    "fingerprint": "chrome"
                  },
                  "xhttpSettings": {
                    "host": {{ channel_b_xhttp_public_host | to_json }},
                    "path": {{ channel_b_xhttp_path | to_json }},
                    "mode": {{ channel_b_xhttp_mode | default('packet-up') | to_json }}
                  }
                }
              },
              {
                "tag": "direct",
                "protocol": "freedom"
              }
            ],
            "routing": {
              "domainStrategy": "AsIs",
              "rules": []
            }
          }
      loop: "{{ channel_b_xhttp_clients | default([]) }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B XHTTP outbound-only JSON for app import
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/{{ item.name }}-outbound.json"
        mode: "0600"
        content: |
          {
            "tag": "{{ item.name }}-channel-b-xhttp",
            "protocol": "vless",
            "settings": {
              "vnext": [
                {
                  "address": {{ channel_b_xhttp_public_host | to_json }},
                  "port": 443,
                  "users": [
                    {
                      "id": {{ item.uuid | to_json }},
                      "encryption": "none",
                      "flow": ""
                    }
                  ]
                }
              ]
            },
            "streamSettings": {
              "network": "xhttp",
              "security": "tls",
              "tlsSettings": {
                "serverName": {{ channel_b_xhttp_public_host | to_json }},
                "alpn": ["h2", "http/1.1"],
                "fingerprint": "chrome"
              },
              "xhttpSettings": {
                "host": {{ channel_b_xhttp_public_host | to_json }},
                "path": {{ channel_b_xhttp_path | to_json }},
                "mode": {{ channel_b_xhttp_mode | default('packet-up') | to_json }}
              }
            }
          }
      loop: "{{ channel_b_xhttp_clients | default([]) }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B XHTTP QR PNG for each client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_b_out_dir }}/{{ item.name }}.png" -r "{{ channel_b_out_dir }}/{{ item.name }}.conf"
      loop: "{{ channel_b_xhttp_clients | default([]) }}"
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel B XHTTP QR index
      ansible.builtin.copy:
        dest: "{{ channel_b_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Channel B XHTTP Client Artifacts</title>
            <style>
              body { margin: 0; font-family: system-ui, sans-serif; background: #f7f7f4; color: #1f2528; }
              main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
              h1 { margin: 0 0 8px; font-size: 34px; }
              p { margin: 0 0 24px; color: #566; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
              article { border: 1px solid #d8d8cf; border-radius: 8px; background: white; padding: 16px; }
              h2 { margin: 0 0 12px; font-size: 18px; }
              a { color: #145c7c; font-weight: 650; }
              .links { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
              img { width: 100%; max-width: 320px; aspect-ratio: 1; display: block; margin: 0 auto; image-rendering: pixelated; }
            </style>
          </head>
          <body>
            <main>
              <h1>Channel B XHTTP Client Artifacts</h1>
              <p>Manual fallback profiles only. Do not import as the primary Channel A profile.</p>
              <section class="grid">
          {% for client in channel_b_xhttp_clients | default([]) %}
                <article>
                  <h2>{{ client.name }}-xhttp</h2>
                  <img src="{{ client.name }}.png" alt="{{ client.name }} XHTTP QR">
                  <div class="links">
                    <a href="{{ client.name }}.txt">text URI</a>
                    <a href="{{ client.name }}-outbound.json">outbound JSON</a>
                    <a href="{{ client.name }}.json">raw JSON</a>
                    <a href="{{ client.name }}-noalpn.txt">no ALPN URI</a>
                    <a href="{{ client.name }}-h1.txt">h1 URI</a>
                    <a href="{{ client.name }}-rawpath.txt">raw path URI</a>
                  </div>
                </article>
          {% endfor %}
              </section>
            </main>
          </body>
          </html>
      when: channel_b_xhttp_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_b_clients_only

    - name: Render Channel C generic NaiveProxy client URL
      ansible.builtin.copy:
        dest: "{{ channel_c_naive_out_dir }}/proxy.txt"
        mode: "0600"
        content: |
          {{ channel_c_naive_proxy_url }}
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C NaiveProxy JSON config
      ansible.builtin.copy:
        dest: "{{ channel_c_naive_out_dir }}/config.json"
        mode: "0600"
        content: |
          {
            "listen": "socks://127.0.0.1:1080",
            "proxy": {{ channel_c_https_proxy_url | to_json }}
          }
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C NaiveProxy QR PNG
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_c_naive_out_dir }}/proxy.png" -r "{{ channel_c_naive_out_dir }}/proxy.txt"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C NaiveProxy URL for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.name }}.txt"
        mode: "0600"
        content: |
          {{ channel_c_naive_proxy_url }}#{{ item.name }}-naive
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C HTTPS proxy compatibility URL for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.name }}-https.txt"
        mode: "0600"
        content: |
          {{ channel_c_https_proxy_url }}#{{ item.name }}-https-proxy
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C Shadowrocket HTTPS proxy URL for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-https.txt"
        mode: "0600"
        content: |
          {{ channel_c_shadowrocket_https_proxy_url }}#{{ item.name }}-https-proxy
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C Shadowrocket add-node URL for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-add.txt"
        mode: "0600"
        content: |
          shadowrocket://add/{{ (channel_c_shadowrocket_https_proxy_url ~ '#' ~ item.name ~ '-https-proxy') | urlencode }}
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C Shadowrocket field import variants for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.0.name }}-shadowrocket-{{ item.1.name }}.txt"
        mode: "0600"
        content: |
          {{ item.1.value }}
      loop: "{{ channel_c_naive_clients | default([]) | product(channel_c_shadowrocket_field_variants) | list }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only
      vars:
        channel_c_shadowrocket_field_variants:
          - name: fields-host-port-user-pass
            value: "{{ channel_c_naive_public_host }}:443:{{ channel_c_naive_username }}:{{ channel_c_naive_password }}"
          - name: fields-user-pass-host-port
            value: "{{ channel_c_naive_username }}:{{ channel_c_naive_password }}@{{ channel_c_naive_public_host }}:443"

    - name: Render Channel C Shadowrocket HTTPS proxy config for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket.conf"
        mode: "0600"
        content: |
          [General]
          bypass-system = true
          ipv6 = false
          dns-server = system
          fallback-dns-server = system

          [Proxy]
          {{ item.name }}-https-proxy = https, {{ channel_c_naive_public_host }}, 443, username={{ channel_c_naive_username }}, password={{ channel_c_naive_password }}, method=connect, tls=true, tfo=false

          [Proxy Group]
          PROXY = select, {{ item.name }}-https-proxy

          [Rule]
          FINAL,PROXY
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C Shadowrocket positional HTTPS proxy config for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-positional.conf"
        mode: "0600"
        content: |
          [General]
          bypass-system = true
          ipv6 = false
          dns-server = system
          fallback-dns-server = system

          [Proxy]
          {{ item.name }}-https-proxy = https, {{ channel_c_naive_public_host }}, 443, {{ channel_c_naive_username }}, {{ channel_c_naive_password }}, method=connect, tls=true, tfo=false

          [Proxy Group]
          PROXY = select, {{ item.name }}-https-proxy

          [Rule]
          FINAL,PROXY
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C NaiveProxy JSON config for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.name }}.json"
        mode: "0600"
        content: |
          {
            "listen": "socks://127.0.0.1:1080",
            "proxy": {{ channel_c_https_proxy_url | to_json }}
          }
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C sing-box Naive outbound JSON for each named client
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/{{ item.name }}-sing-box-outbound.json"
        mode: "0600"
        content: |
          {
            "type": "naive",
            "tag": "{{ item.name }}-channel-c-naive",
            "server": {{ channel_c_naive_public_host | to_json }},
            "server_port": 443,
            "username": {{ channel_c_naive_username | to_json }},
            "password": {{ channel_c_naive_password | to_json }},
            "tls": {
              "enabled": true,
              "server_name": {{ channel_c_naive_public_host | to_json }}
            }
          }
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C NaiveProxy QR PNG for each named client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_c_out_dir }}/{{ item.name }}.png" -r "{{ channel_c_out_dir }}/{{ item.name }}.txt"
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C Shadowrocket HTTPS QR PNG for each named client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-https.png" -r "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-https.txt"
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C Shadowrocket add-node QR PNG for each named client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-add.png" -r "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-add.txt"
      loop: "{{ channel_c_naive_clients | default([]) }}"
