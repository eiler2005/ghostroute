    - name: Render Channel C Shadowrocket field import QR PNG variants
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_c_out_dir }}/{{ item.0.name }}-shadowrocket-{{ item.1.name }}.png" -r "{{ channel_c_out_dir }}/{{ item.0.name }}-shadowrocket-{{ item.1.name }}.txt"
      loop: "{{ channel_c_naive_clients | default([]) | product(channel_c_shadowrocket_field_variant_names) | list }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only
      vars:
        channel_c_shadowrocket_field_variant_names:
          - name: fields-host-port-user-pass
          - name: fields-user-pass-host-port

    - name: Render Channel C Shadowrocket config QR PNG for each named client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-conf.png" -r "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket.conf"
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Render Channel C Shadowrocket positional config QR PNG for each named client
      ansible.builtin.shell: |
        PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
        qrencode -t PNG -o "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-positional-conf.png" -r "{{ channel_c_out_dir }}/{{ item.name }}-shadowrocket-positional.conf"
      loop: "{{ channel_c_naive_clients | default([]) }}"
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
