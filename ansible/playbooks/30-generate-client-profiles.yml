    - name: Render Channel C NaiveProxy QR index
      ansible.builtin.copy:
        dest: "{{ channel_c_out_dir }}/qr-index.html"
        mode: "0600"
        content: |
          <!doctype html>
          <html lang="ru">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Channel C NaiveProxy Client Artifacts</title>
            <style>
              body { margin: 0; font-family: system-ui, sans-serif; background: #f7f7f4; color: #1f2528; }
              main { max-width: 1120px; margin: 0 auto; padding: 32px 20px 56px; }
              h1 { margin: 0 0 8px; font-size: 34px; }
              p { margin: 0 0 24px; color: #566; }
              h2 { margin: 28px 0 12px; font-size: 22px; }
              .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; }
              article { border: 1px solid #d8d8cf; border-radius: 8px; background: white; padding: 16px; }
              h3 { margin: 0 0 12px; font-size: 18px; }
              img { width: 100%; max-width: 320px; aspect-ratio: 1; display: block; margin: 0 auto; image-rendering: pixelated; }
            </style>
          </head>
          <body>
            <main>
              <h1>Channel C NaiveProxy Client Artifacts</h1>
              <p>Manual experimental profile only. Do not import as the primary Channel A profile.</p>
          {% if channel_c_naive_enabled | default(false) | bool %}
              <h2>NaiveProxy</h2>
              <section class="grid">
          {% for client in channel_c_naive_clients | default([]) %}
                <article>
                  <h3>{{ client.name }}-naive</h3>
                  <img src="{{ client.name }}.png" alt="{{ client.name }} NaiveProxy QR">
                  <p>
                    <a href="{{ client.name }}.txt">naive URI</a> ·
                    <a href="{{ client.name }}-https.txt">HTTPS proxy URI</a> ·
                    <a href="{{ client.name }}-shadowrocket-https.txt">Shadowrocket HTTPS URI</a> ·
                    <a href="{{ client.name }}-shadowrocket-add.txt">Shadowrocket add-node URI</a> ·
                    <a href="{{ client.name }}-shadowrocket-fields-host-port-user-pass.txt">Shadowrocket fields host:port:user:pass</a> ·
                    <a href="{{ client.name }}-shadowrocket-fields-user-pass-host-port.txt">Shadowrocket fields user:pass@host:port</a> ·
                    <a href="{{ client.name }}-shadowrocket.conf">Shadowrocket config</a> ·
                    <a href="{{ client.name }}-shadowrocket-positional.conf">Shadowrocket positional config</a> ·
                    <a href="{{ client.name }}.json">naiveproxy JSON</a> ·
                    <a href="{{ client.name }}-sing-box-outbound.json">sing-box outbound</a>
                  </p>
                  <p><img src="{{ client.name }}-shadowrocket-add.png" alt="{{ client.name }} Shadowrocket add-node QR"></p>
                  <p><img src="{{ client.name }}-shadowrocket-fields-host-port-user-pass.png" alt="{{ client.name }} Shadowrocket fields host port user pass QR"></p>
                  <p><img src="{{ client.name }}-shadowrocket-fields-user-pass-host-port.png" alt="{{ client.name }} Shadowrocket fields user pass host port QR"></p>
                  <p><img src="{{ client.name }}-shadowrocket-https.png" alt="{{ client.name }} Shadowrocket HTTPS QR"></p>
                  <p><img src="{{ client.name }}-shadowrocket-conf.png" alt="{{ client.name }} Shadowrocket config QR"></p>
                  <p><img src="{{ client.name }}-shadowrocket-positional-conf.png" alt="{{ client.name }} Shadowrocket positional config QR"></p>
                </article>
          {% endfor %}
                <article><h3>naive-generic</h3><img src="naive/proxy.png" alt="NaiveProxy QR"></article>
              </section>
          {% endif %}
            </main>
          </body>
          </html>
      when: channel_c_naive_enabled | default(false) | bool
      no_log: true
      tags:
        - channel_c_clients_only

    - name: Inform user
      ansible.builtin.debug:
        msg: |
          Router profile generated in {{ out_dir }}.
          HOME Reality mobile profiles generated in {{ home_out_dir }}.
          Emergency direct-VPS mobile profiles generated in {{ emergency_out_dir }}.
          Channel B XHTTP manual fallback artifacts generated in {{ channel_b_out_dir }} when enabled.
          Channel C NaiveProxy manual fallback artifacts generated in {{ channel_c_out_dir }} when enabled.
          Emergency profiles must stay disabled in client apps except during a home relay outage.
