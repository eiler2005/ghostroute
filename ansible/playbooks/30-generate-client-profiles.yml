        mode: "0600"
        content: |
          # Channel C1 Home-First Import Checklist

          Channel C has two selected-client home-first variants:

          - C1-sing-box: native sing-box Naive, experimental client artifact
            `c1-SFI/*-sfi-sing-box.json` when
            `channel_c_sfi_native_profiles_enabled=true`.
            The tested iPhone SFI packet-tunnel build rejected this profile
            with `unknown outbound type: naive`, so these profiles are disabled
            by default until the selected iPhone client build supports sing-box
            Naive outbound.
          - C1-Shadowrocket: HTTPS CONNECT compatibility, primary QR
            `1-SR/*-c1-shadowrocket-https.png`.
            Do not use `*-shadowrocket-conf.png`; that older full-config QR did
            not import reliably in Shadowrocket. The working proof was the
            short HTTPS CONNECT URL QR on port `{{ channel_c_shadowrocket_public_port }}`.

          ```text
          C1-sing-box:
          endpoint SFI/sing-box JSON -> Naive/TLS :{{ channel_c_home_public_port }}
                   -> router `channel-c-naive-in`
                   -> managed split -> reality-out -> VPS -> Internet

          C1-Shadowrocket:
          endpoint -> HTTPS CONNECT/TLS :{{ channel_c_shadowrocket_public_port }}
                   -> router `channel-c-shadowrocket-http-in`
                   -> managed split -> reality-out -> VPS -> Internet
          ```

          C1-Shadowrocket is not native Naive. It is a compatibility path.
          C1-sing-box is the native Naive proof target, but it is blocked on
          iPhone until the chosen SFI/sing-box build supports outbound
          `"type": "naive"`. In the imported JSON, the outbound must contain
          `"type": "naive"` with TLS enabled. If SFI reports `unknown outbound
          type: naive`, the client build is not usable for native Naive. If the
          profile becomes `"type": "http"` or Shadowrocket-style HTTPS CONNECT,
          that is the compatibility lane, not native Naive.

          Requirements before import:

          - `{{ channel_c_home_public_host }}:{{ channel_c_home_public_port }}` presents a valid public TLS certificate.
          - iOS Private Relay / Limit IP Address Tracking is disabled during proof tests.
          - The selected client is listed in `vault_channel_c_home_clients`.
          - C1-sing-box proof logs show `channel-c-naive-in -> reality-out`.
          - If testing SFI native, set
            `vault_channel_c_sfi_native_profiles_enabled=true` only for a client
            build known to support `naive` outbound.
          - SFI dashboard counters may stay at zero until traffic is generated
            through the enabled profile.
          - C1-Shadowrocket proof logs show `channel-c-shadowrocket-http-in -> reality-out`.
      when: channel_c_home_enabled | default(false) | bool
      tags:
        - channel_c_clients_only

