- name: Deploy stealth stack on VPS
  hosts: vps_stealth
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vps_stealth.yml
    - ../secrets/stealth.yml
  pre_tasks:
    - name: GhostRoute deploy gate before VPS mutation
      ansible.builtin.include_tasks: ../tasks/deploy-gate.yml

    - name: Capture last-known-good VPS edge before deploy
      ansible.builtin.include_tasks: ../tasks/vps-last-good-backup.yml
  roles:
    - caddy_l4
    - xray_reality
    - vps_unbound
    - ufw_stealth
    - role: vps_health_monitor
      tags:
        - vps_health_monitor
  post_tasks:
    - name: GhostRoute deploy gate after VPS mutation
      ansible.builtin.include_tasks: ../tasks/deploy-gate.yml
