---
- name: Prepare Channel M reverse SSH key on router
  hosts: routers
  gather_facts: false
  vars_files:
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  tasks:
    - name: Ensure Channel M reverse key directory exists
      ansible.builtin.raw: mkdir -p /jffs/keys && chmod 700 /jffs/keys
      changed_when: true

    - name: Generate Channel M reverse Dropbear key if missing
      ansible.builtin.raw: >-
        [ -s {{ channel_m_maxtg_reverse_key_path }} ] ||
        /usr/bin/dropbearkey -t ed25519 -f {{ channel_m_maxtg_reverse_key_path }}
      no_log: true
      changed_when: true

    - name: Read Channel M reverse public key
      ansible.builtin.raw: /usr/bin/dropbearkey -y -f {{ channel_m_maxtg_reverse_key_path }} | awk '/^ssh-/ {print}'
      register: channel_m_reverse_public_key
      changed_when: false
      no_log: true

    - name: Share Channel M reverse public key
      ansible.builtin.add_host:
        name: channel-m-reverse-key
        channel_m_reverse_public_key: "{{ channel_m_reverse_public_key.stdout | trim }}"
      no_log: true

- name: Prepare Channel M reverse listener on VPS
  hosts: vps_stealth
  gather_facts: false
  vars_files:
    - ../group_vars/vps_stealth.yml
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  tasks:
    - name: Read docker bridge IPv4 for Channel M reverse listener
      ansible.builtin.shell: |
        python3 - <<'PY'
        import json
        import subprocess

        network = "{{ channel_m_maxtg_reverse_docker_network }}"
        try:
            raw = subprocess.check_output(["docker", "network", "inspect", network], text=True)
            gateway = json.loads(raw)[0]["IPAM"]["Config"][0]["Gateway"]
            if gateway:
                print(gateway)
                raise SystemExit(0)
        except Exception:
            pass
        subprocess.run(
            "ip -4 addr show docker0 | awk '/inet / { split($2, a, \"/\"); print a[1]; exit }'",
            shell=True,
            check=True,
        )
        PY
      register: channel_m_reverse_docker0_ip
      changed_when: false
      no_log: true

    - name: Enable client-specified GatewayPorts for deploy reverse Channel M
      ansible.builtin.copy:
        dest: /tmp/51-channel-m-reverse.conf
        mode: "0644"
        content: |
          Match User {{ vps_ssh_user }}
              GatewayPorts clientspecified

    - name: Install deploy GatewayPorts drop-in
      ansible.builtin.shell: >-
        sudo install -m 0644 /tmp/51-channel-m-reverse.conf
        /etc/ssh/sshd_config.d/51-channel-m-reverse.conf &&
        sudo sshd -t &&
        sudo systemctl reload ssh
      changed_when: true

    - name: Stage Channel M reverse docker bridge firewall helper
      ansible.builtin.copy:
        dest: /tmp/channel-m-reverse-firewall.sh
        mode: "0755"
        content: |
          #!/bin/sh
          set -eu

          network="${1:-deploy_default}"
          port="${2:-18057}"
          gateway=""
          subnet=""

          if docker network inspect "$network" >/tmp/channel-m-reverse-network.json 2>/dev/null; then
            values="$(python3 - /tmp/channel-m-reverse-network.json <<'PY'
          import json
          import sys

          data = json.load(open(sys.argv[1], encoding="utf-8"))
          config = data[0].get("IPAM", {}).get("Config", [{}])[0]
          print(config.get("Gateway", ""))
          print(config.get("Subnet", ""))
          PY
          )"
            gateway="$(printf '%s\n' "$values" | sed -n '1p')"
            subnet="$(printf '%s\n' "$values" | sed -n '2p')"
          fi

          if [ -z "$gateway" ]; then
            gateway="$(ip -4 addr show docker0 | awk '/inet / { split($2, a, "/"); print a[1]; exit }')"
          fi
          if [ -z "$subnet" ]; then
            subnet="$(ip -4 addr show docker0 | awk '/inet / { print $2; exit }')"
          fi

          [ -n "$gateway" ]
          [ -n "$subnet" ]

          while iptables -D INPUT -p tcp -s "$subnet" -d "$gateway" --dport "$port" -j ACCEPT 2>/dev/null; do :; done
          iptables -I INPUT 1 -p tcp -s "$subnet" -d "$gateway" --dport "$port" -j ACCEPT

    - name: Install Channel M reverse docker bridge firewall helper
      ansible.builtin.shell: >-
        sudo install -m 0755 /tmp/channel-m-reverse-firewall.sh
        /usr/local/sbin/channel-m-reverse-firewall.sh
      changed_when: true

    - name: Stage Channel M reverse docker bridge firewall systemd unit
      ansible.builtin.copy:
        dest: /tmp/channel-m-reverse-firewall.service
        mode: "0644"
        content: |
          [Unit]
          Description=Channel M reverse Docker bridge firewall
          After=docker.service network-online.target
          Wants=docker.service network-online.target

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/channel-m-reverse-firewall.sh {{ channel_m_maxtg_reverse_docker_network }} {{ channel_m_maxtg_reverse_listen_port }}
          RemainAfterExit=yes

          [Install]
          WantedBy=multi-user.target

    - name: Stage Channel M reverse docker bridge firewall systemd timer
      ansible.builtin.copy:
        dest: /tmp/channel-m-reverse-firewall.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Refresh Channel M reverse Docker bridge firewall

          [Timer]
          OnBootSec=30
          OnUnitActiveSec=60
          Unit=channel-m-reverse-firewall.service

          [Install]
          WantedBy=timers.target

    - name: Enable Channel M reverse docker bridge firewall persistence
      ansible.builtin.shell: >-
        sudo install -m 0644 /tmp/channel-m-reverse-firewall.service
        /etc/systemd/system/channel-m-reverse-firewall.service &&
        sudo install -m 0644 /tmp/channel-m-reverse-firewall.timer
        /etc/systemd/system/channel-m-reverse-firewall.timer &&
        sudo systemctl daemon-reload &&
        sudo systemctl enable --now channel-m-reverse-firewall.service &&
        sudo systemctl enable --now channel-m-reverse-firewall.timer
      changed_when: true

    - name: Stage Channel M reverse listener watchdog helper
      ansible.builtin.copy:
        dest: /tmp/channel-m-reverse-listener-watchdog.sh
        mode: "0755"
        content: |
          #!/bin/sh
          set -eu

          network="${1:-deploy_default}"
          port="${2:-18057}"
          target_host="${3:-api.oneme.ru}"
          target_port="${4:-443}"

          log() {
            logger -t channel-m-reverse-listener "$*"
          }

          gateway="$(docker network inspect "$network" 2>/dev/null | python3 -c '
          import json
          import sys
          try:
              data = json.load(sys.stdin)
              print(data[0]["IPAM"]["Config"][0].get("Gateway", ""))
          except Exception:
              print("")
          ')"
          if [ -z "$gateway" ]; then
            gateway="$(ip -4 addr show docker0 | awk '/inet / { split($2, a, "/"); print a[1]; exit }')"
          fi
          [ -n "$gateway" ] || exit 0

          if ! ss -ltn | grep -q "${gateway}:${port}"; then
            exit 0
          fi

          first_line="$(
            printf 'CONNECT %s:%s HTTP/1.1\r\nHost: %s:%s\r\n\r\n' \
              "$target_host" "$target_port" "$target_host" "$target_port" |
              timeout 7 nc -w 6 "$gateway" "$port" 2>/dev/null |
              sed -n '1p' || true
          )"
          if printf '%s' "$first_line" | grep -q '^HTTP/'; then
            exit 0
          fi

          pids="$(ss -ltnp "( sport = :$port )" 2>/dev/null |
            sed -n 's/.*pid=\([0-9][0-9]*\).*/\1/p' | sort -u)"
          [ -n "$pids" ] || exit 0
          log "stale Channel M reverse listener on ${gateway}:${port}; killing sshd pid(s)"
          printf '%s\n' "$pids" |
            while read pid; do
              [ -n "$pid" ] && kill "$pid" 2>/dev/null || true
            done

    - name: Install Channel M reverse listener watchdog helper
      ansible.builtin.shell: >-
        sudo install -m 0755 /tmp/channel-m-reverse-listener-watchdog.sh
        /usr/local/sbin/channel-m-reverse-listener-watchdog.sh
      changed_when: true

    - name: Stage Channel M reverse listener watchdog systemd unit
      ansible.builtin.copy:
        dest: /tmp/channel-m-reverse-listener-watchdog.service
        mode: "0644"
        content: |
          [Unit]
          Description=Channel M reverse listener stale-state watchdog
          After=network-online.target docker.service ssh.service
          Wants=network-online.target docker.service

          [Service]
          Type=oneshot
          ExecStart=/usr/local/sbin/channel-m-reverse-listener-watchdog.sh {{ channel_m_maxtg_reverse_docker_network }} {{ channel_m_maxtg_reverse_listen_port }}

    - name: Stage Channel M reverse listener watchdog systemd timer
      ansible.builtin.copy:
        dest: /tmp/channel-m-reverse-listener-watchdog.timer
        mode: "0644"
        content: |
          [Unit]
          Description=Refresh Channel M reverse listener stale-state watchdog

          [Timer]
          OnBootSec=45
          OnUnitActiveSec=60
          Unit=channel-m-reverse-listener-watchdog.service

          [Install]
          WantedBy=timers.target

    - name: Enable Channel M reverse listener watchdog persistence
      ansible.builtin.shell: >-
        sudo install -m 0644 /tmp/channel-m-reverse-listener-watchdog.service
        /etc/systemd/system/channel-m-reverse-listener-watchdog.service &&
        sudo install -m 0644 /tmp/channel-m-reverse-listener-watchdog.timer
        /etc/systemd/system/channel-m-reverse-listener-watchdog.timer &&
        sudo systemctl daemon-reload &&
        sudo systemctl enable --now channel-m-reverse-listener-watchdog.timer &&
        sudo systemctl start channel-m-reverse-listener-watchdog.service
      changed_when: true

    - name: Ensure deploy SSH directory exists
      ansible.builtin.file:
        path: "/home/{{ vps_ssh_user }}/.ssh"
        state: directory
        mode: "0700"

    - name: Remove old loopback-only Channel M reverse key authorizations
      ansible.builtin.lineinfile:
        path: "/home/{{ vps_ssh_user }}/.ssh/authorized_keys"
        regexp: '^restrict,port-forwarding,permitlisten=".*:{{ channel_m_maxtg_reverse_listen_port }}".*'
        state: absent

    - name: Authorize Channel M reverse key for docker bridge listener only
      ansible.builtin.lineinfile:
        path: "/home/{{ vps_ssh_user }}/.ssh/authorized_keys"
        create: true
        mode: "0600"
        line: >-
          restrict,port-forwarding,permitlisten="{{ channel_m_reverse_docker0_ip.stdout }}:{{ channel_m_maxtg_reverse_listen_port }}"
          {{ hostvars['channel-m-reverse-key'].channel_m_reverse_public_key }}
      no_log: true

    - name: Write compose-level .env for Channel M reverse variable substitution
      ansible.builtin.copy:
        dest: "{{ channel_m_maxtg_bridge_project_root }}/deploy/.env"
        mode: "0600"
        content: |
          # Written by 23-channel-m-reverse.yml — do not edit manually.
          # Provides MAX_EGRESS_PROXY_HOST/GATEWAY for Docker Compose extra_hosts.
          # host-gateway is intentionally NOT used: the tunnel binds on the
          # deploy_default network gateway, not on docker0 (172.17.0.1).
          MAX_EGRESS_PROXY_HOST={{ ghostroute_router_remote_host }}
          MAX_EGRESS_PROXY_GATEWAY={{ channel_m_reverse_docker0_ip.stdout }}

    - name: Share Channel M reverse docker bridge IPv4
      ansible.builtin.add_host:
        name: channel-m-reverse-vps
        channel_m_reverse_docker0_ip: "{{ channel_m_reverse_docker0_ip.stdout }}"
      no_log: true

- name: Install and start Channel M reverse tunnel on router
  hosts: routers
  gather_facts: false
  vars_files:
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  tasks:
    - name: Install Channel M reverse tunnel script
      ansible.builtin.copy:
        dest: "{{ channel_m_maxtg_reverse_script_path }}"
        mode: "0755"
        content: |
          #!/bin/sh
          set -eu

          KEY="{{ channel_m_maxtg_reverse_key_path }}"
          VPS="{{ vps_ssh_user }}@{{ vps_ssh_host }}"
          LISTEN_HOST="{{ hostvars['channel-m-reverse-vps'].channel_m_reverse_docker0_ip }}"
          LISTEN_PORT="{{ channel_m_maxtg_reverse_listen_port }}"
          TARGET_HOST="127.0.0.1"
          TARGET_PORT="{{ channel_m_maxtg_reverse_ingress_port }}"
          LOCK_DIR="/tmp/channel-m-reverse-tunnel.lock"
          SSH_MARKER="channel_m_reverse_drop"
          SSH_BIN="/usr/bin/ssh"
          LOG_TAG="channel-m-reverse"

          log() {
            logger -t "$LOG_TAG" "$*"
          }

          acquire_lock() {
            now="$(date +%s)"
            if mkdir "$LOCK_DIR" 2>/dev/null; then
              printf '%s\n' "$$" > "$LOCK_DIR/pid"
              printf '%s\n' "$now" > "$LOCK_DIR/started_at"
              trap 'rm -rf "$LOCK_DIR"' EXIT
              return 0
            fi

            old_pid="$(cat "$LOCK_DIR/pid" 2>/dev/null || true)"
            started_at="$(cat "$LOCK_DIR/started_at" 2>/dev/null || true)"
            case "$started_at" in
              ''|*[!0-9]*) started_at=0 ;;
            esac
            lock_age=$((now - started_at))
            if [ -z "$old_pid" ] || [ "$lock_age" -gt 300 ]; then
              log "stale Channel M reverse lock detected; clearing"
              if [ -n "$old_pid" ]; then
                ps w | grep "^[ ]*$old_pid " | grep -q "channel-m-reverse-tunnel.sh" &&
                  kill "$old_pid" 2>/dev/null || true
              fi
              rm -rf "$LOCK_DIR"
              if mkdir "$LOCK_DIR" 2>/dev/null; then
                printf '%s\n' "$$" > "$LOCK_DIR/pid"
                printf '%s\n' "$now" > "$LOCK_DIR/started_at"
                trap 'rm -rf "$LOCK_DIR"' EXIT
                return 0
              fi
            fi
            exit 0
          }

          acquire_lock

          nc_probe() {
            if [ -x /opt/bin/nc ]; then
              /opt/bin/nc -z -w 3 "$1" "$2" >/dev/null 2>&1
            else
              nc -w 3 "$1" "$2" < /dev/null >/dev/null 2>&1
            fi
          }

          wait_for_vps_ssh() {
            attempts=0
            while [ "$attempts" -lt 30 ]; do
              if nc_probe "{{ vps_ssh_host }}" 22; then
                return 0
              fi
              attempts=$((attempts + 1))
              sleep 2
            done
            return 1
          }

          local_ingress_ok() {
            nc_probe "$TARGET_HOST" "$TARGET_PORT"
          }

          remote_listener_ok() {
            "$SSH_BIN" -y -i "$KEY" -T "$VPS" \
              "ss -ltn 2>/dev/null | grep -q '${LISTEN_HOST}:${LISTEN_PORT}'" \
              >/dev/null 2>&1
          }

          remote_proxy_ok() {
            "$SSH_BIN" -y -i "$KEY" -T "$VPS" \
              "printf 'CONNECT api.oneme.ru:443 HTTP/1.1\r\nHost: api.oneme.ru:443\r\n\r\n' | timeout 7 nc -w 6 '${LISTEN_HOST}' '${LISTEN_PORT}' 2>/dev/null | sed -n '1p' | grep -q '^HTTP/'" \
              >/dev/null 2>&1
          }

          tunnel_pids() {
            ps | grep "$SSH_MARKER" | grep ssh | grep -v grep |
              sed "s/^ *//" | cut -d" " -f1 || true
          }

          tunnel_running() {
            [ -n "$(tunnel_pids)" ]
          }

          kill_tunnel() {
            pids="$(tunnel_pids)"
            [ -n "$pids" ] || return 0
            printf '%s\n' "$pids" |
              while read pid; do
                [ -n "$pid" ] && kill "$pid" 2>/dev/null || true
              done
            sleep 2
          }

          iptables -C INPUT -i lo -p tcp --dport "$TARGET_PORT" -j ACCEPT 2>/dev/null \
            || iptables -I INPUT 1 -i lo -p tcp --dport "$TARGET_PORT" -j ACCEPT

          if ! wait_for_vps_ssh; then
            log "VPS SSH is not reachable; tunnel start deferred"
            exit 1
          fi

          if ! local_ingress_ok; then
            log "local reverse ingress is down; restarting sing-box"
            if [ -x /opt/etc/init.d/S99sing-box ]; then
              /opt/etc/init.d/S99sing-box restart >/dev/null 2>&1 || true
              sleep 5
            fi
          fi

          if ! local_ingress_ok; then
            log "local reverse ingress still down on ${TARGET_HOST}:${TARGET_PORT}"
            kill_tunnel
            exit 1
          fi

          if tunnel_running; then
            if remote_listener_ok && remote_proxy_ok; then
              exit 0
            fi
            log "stale Channel M reverse tunnel detected; remote listener/proxy validation failed"
            kill_tunnel
          fi

          "$SSH_BIN" -y -i "$KEY" -N -T -f -K 30 -I 0 \
            -R "$LISTEN_HOST:$LISTEN_PORT:$TARGET_HOST:$TARGET_PORT" \
            "$VPS"

          sleep 3
          if ! tunnel_running; then
            log "Channel M reverse tunnel process did not stay running"
            exit 1
          fi
          if ! remote_listener_ok; then
            log "Channel M reverse remote listener validation failed"
            kill_tunnel
            exit 1
          fi
          if ! remote_proxy_ok; then
            log "Channel M reverse remote proxy validation failed"
            kill_tunnel
            exit 1
          fi
          log "Channel M reverse tunnel healthy"

    - name: Remove legacy Channel M services-start bootstrap
      ansible.builtin.raw: |
        hook="/jffs/scripts/services-start"
        if [ -f "$hook" ]; then
          sed -i '/# BEGIN ChannelMReverse managed by ansible/,/# END ChannelMReverse managed by ansible/d' "$hook"
          sed -i '\|{{ channel_m_maxtg_reverse_script_path }}|d' "$hook"
        fi
      changed_when: false

    - name: Register runtime supervisor cron ownership for Channel M
      ansible.builtin.raw: |
        [ -x {{ ghostroute_runtime_supervisor_path }} ] || {
          echo "GhostRoute runtime supervisor is missing; run the router runtime playbook first." >&2
          exit 1
        }
        {{ ghostroute_runtime_supervisor_path }} recover
      changed_when: false

    - name: Stop existing Channel M reverse tunnel before restart
      ansible.builtin.raw: >-
        ps | grep channel_m_reverse_drop | grep ssh | grep -v grep |
        sed "s/^ *//" | cut -d" " -f1 |
        while read pid; do kill "$pid" 2>/dev/null || true; done
      changed_when: true

    - name: Start Channel M reverse tunnel
      ansible.builtin.raw: "{{ channel_m_maxtg_reverse_script_path }}"
      changed_when: true

- name: Verify Channel M reverse listener on VPS
  hosts: vps_stealth
  gather_facts: false
  vars_files:
    - ../group_vars/vps_stealth.yml
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  tasks:
    - name: Channel M reverse listener is bound on docker bridge
      ansible.builtin.shell: |
        listen_ip="$(python3 - <<'PY'
        import json
        import subprocess

        network = "{{ channel_m_maxtg_reverse_docker_network }}"
        try:
            raw = subprocess.check_output(["docker", "network", "inspect", network], text=True)
            gateway = json.loads(raw)[0]["IPAM"]["Config"][0]["Gateway"]
            if gateway:
                print(gateway)
                raise SystemExit(0)
        except Exception:
            pass
        subprocess.run(
            "ip -4 addr show docker0 | awk '/inet / { split($2, a, \"/\"); print a[1]; exit }'",
            shell=True,
            check=True,
        )
        PY
        )"
        ss -ltn | grep -q "${listen_ip}:{{ channel_m_maxtg_reverse_listen_port }}"
      changed_when: false

    - name: Channel M reverse firewall persistence is active
      ansible.builtin.shell: |
        systemctl is-enabled --quiet channel-m-reverse-firewall.service
        systemctl is-enabled --quiet channel-m-reverse-firewall.timer
        systemctl is-active --quiet channel-m-reverse-firewall.timer
      changed_when: false

    - name: Channel M reverse docker bridge firewall permits bridge clients
      ansible.builtin.shell: |
        values="$(python3 - <<'PY'
        import json
        import subprocess

        network = "{{ channel_m_maxtg_reverse_docker_network }}"
        try:
            raw = subprocess.check_output(["docker", "network", "inspect", network], text=True)
            config = json.loads(raw)[0]["IPAM"]["Config"][0]
            print(config.get("Gateway", ""))
            print(config.get("Subnet", ""))
            raise SystemExit(0)
        except Exception:
            pass
        gateway = subprocess.check_output(
            "ip -4 addr show docker0 | awk '/inet / { split($2, a, \"/\"); print a[1]; exit }'",
            shell=True,
            text=True,
        ).strip()
        subnet = subprocess.check_output(
            "ip -4 addr show docker0 | awk '/inet / { print $2; exit }'",
            shell=True,
            text=True,
        ).strip()
        print(gateway)
        print(subnet)
        PY
        )"
        gateway="$(printf '%s\n' "$values" | sed -n '1p')"
        subnet="$(printf '%s\n' "$values" | sed -n '2p')"
        sudo iptables -C INPUT -p tcp -s "$subnet" -d "$gateway" --dport "{{ channel_m_maxtg_reverse_listen_port }}" -j ACCEPT
      changed_when: false
