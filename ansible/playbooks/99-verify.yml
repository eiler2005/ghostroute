- name: Verify stealth channel — VPS side
  hosts: vps_stealth
  become: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/vps_stealth.yml
    - ../secrets/stealth.yml
  tasks:
    - name: Host Caddy has layer4 module
      ansible.builtin.shell: "caddy list-modules | grep -q '^layer4$'"
      changed_when: false
      when: stealth_caddy_mode == 'system_listener_wrapper'

    - name: Caddy listening on :443
      ansible.builtin.shell: "ss -tlnp '( sport = :443 )' | grep -q caddy"
      changed_when: false

    - name: Xray listening on configured localhost Reality port
      ansible.builtin.shell: "ss -tlnp '( sport = :{{ xray_reality_listen_port }} )' | grep -q '127.0.0.1:{{ xray_reality_listen_port }}'"
      changed_when: false

    - name: maxtg_bridge container still running
      ansible.builtin.shell: "docker ps --format '{{ '{{' }}.Names{{ '}}' }}' | grep -q deploy-bridge-1"
      changed_when: false

    - name: Shared OpenClaw site still requires mTLS after Caddy restart
      when: system_caddy_site_enabled | default(false) | bool
      ansible.builtin.shell: |
        (curl -k -I -sS --max-time 10 \
          --resolve {{ system_caddy_site_host }}:443:127.0.0.1 \
          https://{{ system_caddy_site_host }}/ || true) 2>&1
      register: probe
      changed_when: false
    - ansible.builtin.assert:
        that:
          - "'HTTP/' not in (probe.stdout + probe.stderr)"
          - >-
            'certificate required' in (probe.stdout + probe.stderr)
            or 'tlsv1 alert' in (probe.stdout + probe.stderr)
            or 'alert certificate' in (probe.stdout + probe.stderr)
        fail_msg: "OpenClaw mTLS probe no longer behaves as expected: {{ probe.stdout }} {{ probe.stderr }}"
      when: system_caddy_site_enabled | default(false) | bool

    - name: OpenClaw upstream remains localhost-only for SSH tunnel access
      when: not (system_caddy_site_enabled | default(false) | bool)
      ansible.builtin.uri:
        url: "http://{{ system_caddy_site_upstream }}/"
        method: HEAD
        status_code: 200
      changed_when: false

    - name: 3x-ui login page reachable on localhost-only admin port
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ xui_admin_web_port }}{{ xui_admin_web_path }}/"
        method: GET
        status_code: 200
      changed_when: false

    - name: VPS Reality client identities are router plus emergency only
      ansible.builtin.shell: |
        set -euo pipefail
        docker exec -i \
          -e EXPECTED_CLIENTS={{ ((clients + (emergency_clients | default([]))) | length) | quote }} \
          xray python3 - <<'PY'
        import json
        import os
        import sqlite3

        expected = int(os.environ["EXPECTED_CLIENTS"])
        con = sqlite3.connect("/etc/x-ui/x-ui.db")
        row = con.execute("select settings from inbounds where remark = ?", ("stealth-reality",)).fetchone()
        if not row:
            raise SystemExit("stealth-reality inbound not found")
        settings = json.loads(row[0] or "{}")
        actual = len(settings.get("clients", []))
        if actual != expected:
            raise SystemExit(f"expected {expected} VPS Reality clients, got {actual}")
        PY
      args:
        executable: /bin/bash
      changed_when: false
      no_log: true

    - name: Router-side home clients do not overlap VPS-side identities
      ansible.builtin.assert:
        that:
          - ((home_clients | map(attribute='uuid') | list) | intersect(((clients + (emergency_clients | default([]))) | map(attribute='uuid') | list))) | length == 0
          - (clients | selectattr('name', 'equalto', 'router') | list | length) == 1
        fail_msg: "home_clients must stay router-side only; VPS inbound must contain router plus emergency_clients."
      no_log: true

- name: Verify stealth channel — router side
  hosts: routers
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  tasks:
    - name: Run stealth-route-init before assertions
      ansible.builtin.raw: "{{ stealth_route_init_script }}"
      changed_when: false

    - name: Read router runtime ports for verification
      ansible.builtin.raw: |
        if [ -r /jffs/scripts/ghostroute-runtime.env ]; then
          . /jffs/scripts/ghostroute-runtime.env
        fi
        port_by_tag() {
          awk -v wanted="$1" '
            /"tag"[[:space:]]*:/ {
              line = $0
              sub(/^.*"tag"[[:space:]]*:[[:space:]]*"/, "", line)
              sub(/".*$/, "", line)
              tag = line
            }
            /"listen_port"[[:space:]]*:/ && tag == wanted {
              line = $0
              gsub(/[^0-9]/, "", line)
              print line
              exit
            }
          ' /opt/etc/sing-box/config.json 2>/dev/null
        }
        GHOSTROUTE_REDIRECT_PORT="${GHOSTROUTE_REDIRECT_PORT:-$(port_by_tag redirect-in)}"
        GHOSTROUTE_DNSCRYPT_SOCKS_PORT="${GHOSTROUTE_DNSCRYPT_SOCKS_PORT:-$(port_by_tag dnscrypt-socks-in)}"
        GHOSTROUTE_HOME_REALITY_PORT="${GHOSTROUTE_HOME_REALITY_PORT:-$(port_by_tag reality-in)}"
        GHOSTROUTE_DNSCRYPT_PORT="${GHOSTROUTE_DNSCRYPT_PORT:-$(awk -F'#' '/^server=127[.]0[.]0[.]1#/ { gsub(/[^0-9].*/, "", $2); print $2; exit }' /jffs/configs/dnsmasq.conf.add 2>/dev/null)}"
        printf 'GHOSTROUTE_REDIRECT_PORT=%s\n' "$GHOSTROUTE_REDIRECT_PORT"
        printf 'GHOSTROUTE_DNSCRYPT_SOCKS_PORT=%s\n' "$GHOSTROUTE_DNSCRYPT_SOCKS_PORT"
        printf 'GHOSTROUTE_HOME_REALITY_PORT=%s\n' "$GHOSTROUTE_HOME_REALITY_PORT"
        printf 'GHOSTROUTE_DNSCRYPT_PORT=%s\n' "$GHOSTROUTE_DNSCRYPT_PORT"
      register: router_runtime_ports
      changed_when: false
      no_log: true

    - name: Use router runtime ports for verification
      ansible.builtin.set_fact:
        singbox_redirect_port: "{{ router_runtime_ports.stdout_lines | select('match', '^GHOSTROUTE_REDIRECT_PORT=') | first | default('') | regex_replace('^GHOSTROUTE_REDIRECT_PORT=', '') }}"
        singbox_dnscrypt_socks_port: "{{ router_runtime_ports.stdout_lines | select('match', '^GHOSTROUTE_DNSCRYPT_SOCKS_PORT=') | first | default('') | regex_replace('^GHOSTROUTE_DNSCRYPT_SOCKS_PORT=', '') }}"
        home_reality_ingress_port: "{{ router_runtime_ports.stdout_lines | select('match', '^GHOSTROUTE_HOME_REALITY_PORT=') | first | default('') | regex_replace('^GHOSTROUTE_HOME_REALITY_PORT=', '') }}"
        dnscrypt_port: "{{ router_runtime_ports.stdout_lines | select('match', '^GHOSTROUTE_DNSCRYPT_PORT=') | first | default('') | regex_replace('^GHOSTROUTE_DNSCRYPT_PORT=', '') }}"
      no_log: true

    - name: IPv6 is disabled in Merlin
      ansible.builtin.shell: |
        [ "$(nvram get ipv6_service)" = "disabled" ]
      changed_when: false

    - name: LAN bridge has no global IPv6 address
      ansible.builtin.shell: |
        ! ip -6 addr show dev br0 2>/dev/null | grep -qE 'inet6 (2|3)[0-9a-f]{1,3}:'
      changed_when: false

    - name: sing-box redirect listener is running
      ansible.builtin.shell: "netstat -nlp 2>/dev/null | grep -q ':{{ singbox_redirect_port }} '"
      changed_when: false

    - name: sing-box uses REDIRECT inbound for stable LAN TCP through Channel B
      ansible.builtin.shell: |
        grep -q '"type": "redirect"' {{ singbox_config_path }} &&
        grep -q '"listen_port": {{ singbox_redirect_port }}' {{ singbox_config_path }}
      changed_when: false

    - name: reverse path filtering is disabled for LAN redirect routing
      ansible.builtin.shell: |
        [ "$(cat /proc/sys/net/ipv4/conf/all/rp_filter)" = "0" ] &&
        [ "$(cat /proc/sys/net/ipv4/conf/default/rp_filter)" = "0" ] &&
        [ "$(cat /proc/sys/net/ipv4/conf/br0/rp_filter)" = "0" ]
      changed_when: false

    - name: ipset STEALTH_DOMAINS exists
      ansible.builtin.shell: "ipset list -n | grep -q '^{{ stealth_ipset_name }}$'"
      changed_when: false

    - name: legacy VPN_DOMAINS ipset is absent after Channel A cleanup
      ansible.builtin.shell: "! ipset list -n | grep -q '^VPN_DOMAINS$'"
      changed_when: false

    - name: LAN TCP redirect routes STEALTH_DOMAINS to Channel B
      ansible.builtin.shell: "iptables -t nat -S PREROUTING | grep -q -- '-i br0 -p tcp .*match-set {{ stealth_ipset_name }} dst -j REDIRECT --to-ports {{ singbox_redirect_port }}'"
      changed_when: false

    - name: LAN TCP redirect routes shared static nets to Channel B
      ansible.builtin.shell: "iptables -t nat -S PREROUTING | grep -q -- '-i br0 -p tcp .*match-set {{ stealth_static_source_ipset }} dst -j REDIRECT --to-ports {{ singbox_redirect_port }}'"
      changed_when: false

    - name: Channel A wgs1 interface is absent after decommission
      ansible.builtin.shell: "! ip link show wgs1 >/dev/null 2>&1"
      changed_when: false

    - name: old Channel B TUN policy route is absent
      ansible.builtin.shell: |
        ! ip rule show | grep -q 'fwmark {{ stealth_fwmark }} .*lookup' &&
        ! ip route show table {{ stealth_route_table }} | grep -q '{{ singbox_tun_name }}'
      changed_when: false

    - name: LAN QUIC fallback is silently enforced for Channel B destinations
      ansible.builtin.shell: |
        iptables -S FORWARD | grep -q -- '-i br0 -p udp .*--dport 443 .*match-set {{ stealth_ipset_name }} dst .*DROP' &&
        iptables -S FORWARD | grep -q -- '-i br0 -p udp .*--dport 443 .*match-set {{ stealth_static_source_ipset }} dst .*DROP' &&
        ! iptables -S FORWARD | grep -q -- '-i br0 -p udp .*--dport 443 .*match-set {{ stealth_ipset_name }} dst .*REJECT' &&
        ! iptables -S FORWARD | grep -q -- '-i br0 -p udp .*--dport 443 .*match-set {{ stealth_static_source_ipset }} dst .*REJECT'
      changed_when: false

    - name: stale singbox0 TUN interface is absent
      ansible.builtin.shell: "! ip -br a show {{ singbox_tun_name }} >/dev/null 2>&1"
      changed_when: false

    - name: Resolve test stealth domain to populate ipset
      ansible.builtin.raw: "nslookup {{ stealth_test_domain }} 127.0.0.1 >/dev/null 2>&1 || true"
      changed_when: false

    - name: STEALTH_DOMAINS ipset has at least one populated entry
      ansible.builtin.shell: "ipset list {{ stealth_ipset_name }} | awk '/Number of entries:/ {print $4}' | grep -Eq '^[1-9][0-9]*$'"
      changed_when: false

    - name: Channel A NVRAM services are disabled
      ansible.builtin.shell: |
        [ "$(nvram get wgs1_enable)" = "0" ] &&
        [ "$(nvram get wgc1_enable)" = "0" ]
      changed_when: false

    - name: wgc1 cold-fallback NVRAM is preserved
      ansible.builtin.shell: |
        for field in wgc1_priv wgc1_addr wgc1_aips wgc1_ep_addr wgc1_ep_port wgc1_ppub wgc1_dns wgc1_mtu wgc1_alive; do
          [ -n "$(nvram get "$field")" ] || exit 1
        done
      changed_when: false

    - name: dnscrypt-proxy listening on configured port
      ansible.builtin.shell: "netstat -nlp 2>/dev/null | grep -q ':{{ dnscrypt_port }} '"
      changed_when: false

    - name: sing-box SOCKS listener for dnscrypt-proxy is running
      ansible.builtin.shell: "netstat -nlp 2>/dev/null | grep -q '127.0.0.1:{{ singbox_dnscrypt_socks_port }} '"
      changed_when: false

    - name: Router-side Reality ingress is listening for remote mobile clients
      ansible.builtin.shell: "netstat -nlp 2>/dev/null | grep -q '0.0.0.0:{{ home_reality_ingress_port }}'"
      changed_when: false
      when: home_reality_enabled | default(false) | bool

    - name: Router-side Reality ingress is IPv4-only, not IPv6 wildcard
      ansible.builtin.shell: |
        netstat -nlp 2>/dev/null | awk '
          $4 == "0.0.0.0:{{ home_reality_ingress_port }}" { has4 = 1 }
          $4 == ":::{{ home_reality_ingress_port }}" || $4 == "[::]:{{ home_reality_ingress_port }}" || $4 == "*:{{ home_reality_ingress_port }}" { has6 = 1 }
          END { exit(has4 == 1 && has6 != 1 ? 0 : 1) }
        '
      changed_when: false
      when: home_reality_enabled | default(false) | bool

    - name: Router-side Reality ingress is allowed by INPUT firewall
      ansible.builtin.shell: "iptables -S INPUT | grep -q -- '-p tcp .*--dport {{ home_reality_ingress_port }} .*ACCEPT'"
      changed_when: false
      when: home_reality_enabled | default(false) | bool

    - name: Router-side Reality ingress connlimit DROP precedes ACCEPT
      ansible.builtin.shell: |
        iptables -S INPUT | awk '
          /--dport {{ home_reality_ingress_port }}/ {
            if ($0 ~ /connlimit/ && $0 ~ /--connlimit-above {{ home_reality_connlimit_above | default(300) }}/ && $0 ~ /-j DROP/) drop = NR
            if ($0 ~ /-j ACCEPT/ && first_accept == 0) first_accept = NR
          }
          END { exit !(drop > 0 && first_accept > 0 && drop < first_accept) }
        '
      changed_when: false
      when: home_reality_enabled | default(false) | bool

    - name: Router-side Reality ingress has LTE-safe MSS clamp
      ansible.builtin.shell: |
        iptables -t mangle -S PREROUTING |
          grep -q -- '--dport {{ home_reality_ingress_port }} .*TCPMSS --set-mss {{ home_reality_mss | default(1360) }}' &&
        iptables -t mangle -S OUTPUT |
          grep -q -- '--sport {{ home_reality_ingress_port }} .*TCPMSS --set-mss {{ home_reality_mss | default(1360) }}'
      changed_when: false
      when: home_reality_enabled | default(false) | bool

    - name: Router TCP high-BDP tuning is applied
      ansible.builtin.shell: |
        tcp_rmem="$(awk '{$1=$1; print}' /proc/sys/net/ipv4/tcp_rmem 2>/dev/null)"
        tcp_wmem="$(awk '{$1=$1; print}' /proc/sys/net/ipv4/tcp_wmem 2>/dev/null)"
        [ "$(cat /proc/sys/net/core/rmem_max 2>/dev/null)" = "{{ router_tcp_rmem_max | default(16777216) }}" ] &&
        [ "$(cat /proc/sys/net/core/wmem_max 2>/dev/null)" = "{{ router_tcp_wmem_max | default(16777216) }}" ] &&
        [ "$tcp_rmem" = "{{ router_tcp_rmem | default('4096 262144 16777216') }}" ] &&
        [ "$tcp_wmem" = "{{ router_tcp_wmem | default('4096 65536 16777216') }}" ] &&
        [ "$(cat /proc/sys/net/ipv4/tcp_mtu_probing 2>/dev/null)" = "{{ router_tcp_mtu_probing | default(1) }}" ] &&
        [ "$(cat /proc/sys/net/ipv4/tcp_slow_start_after_idle 2>/dev/null)" = "{{ router_tcp_slow_start_after_idle | default(0) }}" ] &&
        [ "$(cat /proc/sys/net/ipv4/tcp_window_scaling 2>/dev/null)" = "{{ router_tcp_window_scaling | default(1) }}" ] &&
        [ "$(cat /proc/sys/net/ipv4/tcp_sack 2>/dev/null)" = "{{ router_tcp_sack | default(1) }}" ] &&
        [ "$(cat /proc/sys/net/ipv4/tcp_timestamps 2>/dev/null)" = "{{ router_tcp_timestamps | default(1) }}" ]
      changed_when: false
      when: router_tcp_perf_tuning_enabled | default(true) | bool

    - name: Router-side Reality ingress uses managed split routing
      ansible.builtin.shell: |
        cfg="$(awk '{ gsub(/[[:space:]]/, ""); printf "%s", $0 }' {{ singbox_config_path }})"
        printf '%s' "$cfg" | grep -Fq '"inbound":"reality-in","rule_set":["stealth-domains","stealth-static"],"outbound":"reality-out"' &&
        printf '%s' "$cfg" | grep -Fq '"inbound":"reality-in","outbound":"direct-out"' &&
        ! printf '%s' "$cfg" | grep -Fq '"inbound":"reality-in","outbound":"reality-out"'
      changed_when: false
      when: home_reality_enabled | default(false) | bool

    - name: Router-side Reality ingress sends tunneled DNS through Reality outbound
      ansible.builtin.shell: |
        cfg="$(awk '{ gsub(/[[:space:]]/, ""); printf "%s", $0 }' {{ singbox_config_path }})"
        printf '%s' "$cfg" | grep -Fq '"inbound":"reality-in","port":[53,853],"outbound":"reality-out"'
      changed_when: false
      when: home_reality_enabled | default(false) | bool

    - name: dnscrypt-proxy routes DoH through sing-box SOCKS
      ansible.builtin.shell: "grep -q '^proxy = .socks5://127.0.0.1:{{ singbox_dnscrypt_socks_port }}.' {{ dnscrypt_config_path }}"
      changed_when: false

    - name: dnsmasq upstream points to dnscrypt-proxy
      ansible.builtin.shell: "grep -q '^server=127.0.0.1#{{ dnscrypt_port }}$' /jffs/configs/dnsmasq.conf.add"
      changed_when: false

    - name: OpenClaw private DNS override is absent in SSH-only mode
      ansible.builtin.shell: "! grep -q '^address=/{{ system_caddy_site_host }}/' /jffs/configs/dnsmasq.conf.add"
      changed_when: false

    - name: sing-box watchdog cron is installed
      ansible.builtin.shell: "cru l 2>/dev/null | grep -q '{{ singbox_watchdog_path }}'"
      changed_when: false

    - name: Channel A mangle hooks are absent
      ansible.builtin.shell: |
        ! iptables -t mangle -S PREROUTING | grep -q -- '-i wgs1 -j RC_VPN_ROUTE' &&
        ! iptables -t mangle -S PREROUTING | grep -q -- '-i br0 -j RC_VPN_ROUTE' &&
        ! iptables -t mangle -S OUTPUT | grep -q -- '-j RC_VPN_ROUTE'
      changed_when: false

    - name: Channel A stale NAT and fwmark rules are absent
      ansible.builtin.shell: |
        ! ip rule show | grep -Eq '0x1000|wgc1' &&
        ! iptables -t nat -S | grep -Eq 'wgs1|wgc1|0x1000|VPN_DOMAINS' &&
        ! iptables -t mangle -S | grep -Eq 'wgs1|wgc1|0x1000|RC_VPN_ROUTE|VPN_DOMAINS'
      changed_when: false
