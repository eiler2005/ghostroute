- name: Preflight router (install Entware packages if missing)
  hosts: routers
  gather_facts: false
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  tasks:
    - name: GhostRoute deploy gate before router mutation
      ansible.builtin.include_tasks: ../tasks/deploy-gate.yml

    - name: Ensure bash + python3 via opkg
      ansible.builtin.raw: |
        /opt/bin/opkg list-installed | grep -q '^bash ' || /opt/bin/opkg install bash
        /opt/bin/opkg list-installed | grep -q '^python3 ' || /opt/bin/opkg install python3
      changed_when: false

- name: Deploy stealth client on router
  hosts: routers
  gather_facts: true
  vars_files:
    - ../group_vars/all.yml
    - ../group_vars/routers.yml
    - ../secrets/stealth.yml
  pre_tasks:
    - name: Capture last-known-good router runtime before deploy
      ansible.builtin.include_tasks: ../tasks/router-last-good-backup.yml
  roles:
    - role: ipv6_kill
      tags:
        - ipv6_kill
    - singbox_client
    - stealth_routing
    - dnscrypt_proxy
    - dnsmasq_blocklists
    - role: health_monitor
      tags:
        - health_monitor
  post_tasks:
    - name: Refresh sing-box rule-sets after catalog deploy
      ansible.builtin.raw: >
        MANAGED_DNS_FORWARD_HOST='{{ router_managed_dns_forward_host | default("127.0.0.1") }}'
        MANAGED_DNS_FORWARD_PORT='{{ router_managed_dns_forward_port | default(dnscrypt_port) }}'
        /jffs/scripts/update-singbox-rule-sets.sh --restart-if-changed
      changed_when: false
      when: stealth_channel_a_lan_enabled | bool

    - name: Restart sing-box after all router service restarts
      ansible.builtin.raw: |
        {{ singbox_init_path }} restart
        sleep 3
      changed_when: false
      when: stealth_channel_a_lan_enabled | bool

    - name: Re-apply stealth routing after final sing-box restart
      ansible.builtin.raw: "{{ stealth_route_init_script }}"
      changed_when: false
      when: stealth_channel_a_lan_enabled | bool

    - name: GhostRoute deploy gate after router mutation
      ansible.builtin.include_tasks: ../tasks/deploy-gate.yml
