name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  repo-checks:
    name: Repo checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: modules/ghostroute-console/app/package-lock.json

      - name: Install Console dependencies
        run: npm --prefix modules/ghostroute-console/app ci

      - name: Install repo check tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Fast repo checks
        run: ./tests/run-fast.sh

  console-smoke:
    name: Console smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: modules/ghostroute-console/app/package-lock.json

      - name: Install Console dependencies
        run: npm --prefix modules/ghostroute-console/app ci

      - name: Install Playwright Chromium
        run: npm --prefix modules/ghostroute-console/app exec -- playwright install --with-deps chromium

      - name: Console smoke tests
        run: ./tests/run-smoke.sh
