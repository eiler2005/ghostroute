---
- name: Deploy GhostRoute Console read-only MVP
  hosts: vps_stealth
  become: true
  vars_files:
    - ../../../ansible/secrets/stealth.yml
  vars:
    console_root: /opt/ghostroute-console
    console_uid: "10000"
    console_gid: "10000"
    console_readonly_user: ghostroute_readonly
    console_router_remote_key_src: "{{ playbook_dir }}/../../../secrets/router-remote-ssh/ghostroute-router-remote-22022_rsa"
    console_router_remote_key_content: "{{ ghostroute_router_remote_private_key | default('', true) }}"
    console_router_remote_host: "{{ ghostroute_router_remote_host | default('', true) }}"
    console_router_remote_port: "{{ ghostroute_router_remote_port | default('22022', true) }}"
    console_router_remote_user: "{{ ghostroute_router_remote_user | default('admin', true) }}"
    console_reset_db: "{{ ghostroute_console_reset_db | default(false) }}"
    console_seed_local_data: "{{ ghostroute_console_seed_local_data | default(false) }}"
    console_build_commit: "{{ lookup('pipe', 'git -C ' ~ playbook_dir ~ '/../../../ rev-parse --short HEAD') }}"
    console_build_at: "{{ lookup('pipe', 'date -u +%Y-%m-%dT%H:%M:%SZ') }}"
    console_rollback_tag: "ghostroute-console:rollback-{{ lookup('pipe', 'date -u +%Y%m%dT%H%M%SZ') }}"
    console_ui_smoke_routes:
      - { path: "/", contains: "GhostRoute Console" }
      - { path: "/health", contains: "Health Center" }
      - { path: "/health", contains: "Deploy Gate" }
      - { path: "/live", contains: "Live event stream" }
      - { path: "/live", contains: "Showing" }
      - { path: "/live?activityPageSize=150", contains: "Client activity summary" }
      - { path: "/m/health", contains: "Alarm Center" }
      - { path: "/m/live", contains: "Client activity summary" }
      - { path: "/dns", contains: "DNS Query Log" }
      - { path: "/dns", contains: "Showing" }
      - { path: "/traffic", contains: "Flow Explorer" }
      - { path: "/traffic", contains: "Read-only analysis" }
      - { path: "/traffic?trafficClass=all", contains: "All traffic" }
      - { path: "/clients", contains: "Device Inventory" }
      - { path: "/clients", contains: "Showing" }
    console_api_smoke_routes:
      - /api/health
      - /api/dashboard
      - /api/live?limit=5
      - /api/dns?pageSize=5
      - /api/flows?pageSize=5
      - /api/clients
  tasks:
    - name: Create Console runtime directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        mode: "{{ item.mode }}"
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
      loop:
        - { path: "{{ console_root }}", mode: "0755" }
        - { path: "{{ console_root }}/repo", mode: "0755" }
        - { path: "{{ console_root }}/data", mode: "0750", owner: "{{ console_uid }}", group: "{{ console_gid }}" }
        - { path: "{{ console_root }}/ssh", mode: "0550", owner: "root", group: "{{ console_gid }}" }

    - name: Ensure Console readonly command user exists
      ansible.builtin.user:
        name: "{{ console_readonly_user }}"
        shell: /bin/sh
        create_home: true

    - name: Create router credential directory for Console readonly user
      ansible.builtin.file:
        path: "{{ console_root }}/router-ssh"
        state: directory
        mode: "0550"
        owner: root
        group: "{{ console_readonly_user }}"

    - name: Check local router remote key for read-only reports
      ansible.builtin.stat:
        path: "{{ console_router_remote_key_src }}"
      delegate_to: localhost
      become: false
      register: console_router_remote_key

    - name: Install router remote key for read-only reports
      ansible.builtin.copy:
        src: "{{ console_router_remote_key_src }}"
        dest: "{{ console_root }}/router-ssh/router_remote_22022_rsa"
        owner: "{{ console_readonly_user }}"
        group: "{{ console_readonly_user }}"
        mode: "0400"
      no_log: true
      when:
        - console_router_remote_key.stat.exists
        - console_router_remote_host | length > 0
        - console_router_remote_key_content | length == 0

    - name: Install Vault router remote key for read-only reports
      ansible.builtin.copy:
        content: "{{ console_router_remote_key_content }}"
        dest: "{{ console_root }}/router-ssh/router_remote_22022_rsa"
        owner: "{{ console_readonly_user }}"
        group: "{{ console_readonly_user }}"
        mode: "0400"
      no_log: true
      when:
        - console_router_remote_key_content | length > 0
        - console_router_remote_host | length > 0

    - name: Configure router remote env for read-only reports
      ansible.builtin.copy:
        dest: "{{ console_root }}/router.env"
        owner: root
        group: "{{ console_readonly_user }}"
        mode: "0440"
        content: |
          ROUTER={{ console_router_remote_host }}
          ROUTER_PORT={{ console_router_remote_port }}
          ROUTER_USER={{ console_router_remote_user }}
          CONNECT_TIMEOUT=8
          SSH_IDENTITY_FILE={{ console_root }}/router-ssh/router_remote_22022_rsa
          SSH_HOST_KEY_ALGORITHMS=+ssh-rsa
          SSH_KNOWN_HOSTS_FILE=/tmp/ghostroute-router-known-hosts
          GHOSTROUTE_ROUTER_ENV_FILE={{ console_root }}/router.env
      no_log: true
      when:
        - (console_router_remote_key.stat.exists or console_router_remote_key_content | length > 0)
        - console_router_remote_host | length > 0

    - name: Allow Console readonly user through SSH AllowUsers hardening
      ansible.builtin.shell: |
        set -eu
        hardening="/etc/ssh/sshd_config.d/99-maxtg-hardening.conf"
        if [ -f "$hardening" ] && grep -q '^AllowUsers ' "$hardening"; then
          if ! grep -Eq '^AllowUsers .*{{ console_readonly_user }}([[:space:]]|$)' "$hardening"; then
            sed -i '/^AllowUsers / s/$/ {{ console_readonly_user }}/' "$hardening"
          fi
        else
          printf '\nAllowUsers deploy {{ console_readonly_user }}\n' > /etc/ssh/sshd_config.d/98-ghostroute-console-readonly.conf
        fi
        sshd -t
        systemctl reload ssh
      changed_when: false

    - name: Harden Console readonly SSH login
      ansible.builtin.copy:
        dest: /etc/ssh/sshd_config.d/100-ghostroute-console-readonly.conf
        owner: root
        group: root
        mode: "0644"
        content: |
          Match User {{ console_readonly_user }}
              PasswordAuthentication no
              KbdInteractiveAuthentication no
              X11Forwarding no
              AllowTcpForwarding no
              PermitTTY no
              PermitTunnel no
      register: console_readonly_sshd_hardening

    - name: Validate and reload SSH after Console readonly hardening
      ansible.builtin.shell: |
        set -eu
        sshd -t
        systemctl reload ssh
      changed_when: console_readonly_sshd_hardening.changed

    - name: Install Console readonly forced command shell
      ansible.builtin.copy:
        src: ghostroute-readonly-shell
        dest: /usr/local/bin/ghostroute-readonly-shell
        mode: "0755"
        owner: root
        group: root

    - name: Generate Console readonly SSH keypair on VPS
      ansible.builtin.command:
        argv:
          - ssh-keygen
          - -t
          - ed25519
          - -N
          - ""
          - -f
          - "{{ console_root }}/ssh/id_ed25519"
        creates: "{{ console_root }}/ssh/id_ed25519"

    - name: Allow Console container user to read readonly SSH private key
      ansible.builtin.file:
        path: "{{ console_root }}/ssh/id_ed25519"
        owner: root
        group: "{{ console_gid }}"
        mode: "0440"

    - name: Read Console readonly public key
      ansible.builtin.slurp:
        src: "{{ console_root }}/ssh/id_ed25519.pub"
      register: console_readonly_public_key

    - name: Authorize Console readonly key with forced command
      ansible.posix.authorized_key:
        user: "{{ console_readonly_user }}"
        key: "{{ console_readonly_public_key.content | b64decode }}"
        key_options: 'command="/usr/local/bin/ghostroute-readonly-shell",no-agent-forwarding,no-port-forwarding,no-pty,no-user-rc,no-X11-forwarding'
        manage_dir: true

    - name: Tag current Console image for rollback before syncing updated sources
      ansible.builtin.shell: |
        set -eu
        current_image="$(docker inspect ghostroute-console --format '{% raw %}{{ .Image }}{% endraw %}' 2>/dev/null || true)"
        if [ -n "$current_image" ]; then
          docker tag "$current_image" "{{ console_rollback_tag }}"
        fi
      changed_when: false

    - name: Sync repo sources without secrets or generated artifacts
      ansible.builtin.command:
        argv:
          - rsync
          - -az
          - -e
          - ssh -o ControlMaster=no -o ControlPath=none -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=30
          - --delete
          - --rsync-path=sudo rsync
          - --exclude=.git/
          - --exclude=ansible/secrets/
          - --exclude=ansible/out/
          - --exclude=modules/ghostroute-console/data/
          - --exclude=modules/ghostroute-console/app/node_modules/
          - --exclude=modules/ghostroute-console/app/.next/
          - --exclude=modules/ghostroute-console/app/test-results/
          - --exclude=modules/ghostroute-console/app/playwright-report/
          - --exclude=ghostroute-console-handoff/
          - --exclude=*.db
          - --exclude=*.db-shm
          - --exclude=*.db-wal
          - "{{ playbook_dir }}/../../../"
          - "{{ ansible_user }}@{{ ansible_host }}:{{ console_root }}/repo/"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Sync private Console attribution registry files
      ansible.builtin.shell: |
        set -eu
        src="{{ playbook_dir }}/../data"
        [ -d "$src" ] || exit 0
        rsync -az \
          -e "ssh -o ControlMaster=no -o ControlPath=none -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=30" \
          --rsync-path="sudo rsync" \
          --include='device-attribution.json' \
          --include='device-attribution.local.json' \
          --include='device-aliases.json' \
          --exclude='*' \
          "$src/" "{{ ansible_user }}@{{ ansible_host }}:{{ console_root }}/data/"
      delegate_to: localhost
      become: false
      changed_when: true

    - name: Seed factual Console data snapshot without secrets
      ansible.builtin.command:
        argv:
          - rsync
          - -az
          - -e
          - ssh -o ControlMaster=no -o ControlPath=none -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=30
          - --rsync-path=sudo rsync
          - --exclude=console-basic-auth.txt
          - --exclude=backups/
          - --exclude=*.lock
          - --exclude=*.db
          - --exclude=*.db-shm
          - --exclude=*.db-wal
          - "{{ playbook_dir }}/../data/"
          - "{{ ansible_user }}@{{ ansible_host }}:{{ console_root }}/data/"
      delegate_to: localhost
      become: false
      changed_when: true
      when: console_seed_local_data | bool

    - name: Ensure Console data ownership after sync
      ansible.builtin.file:
        path: "{{ console_root }}/data"
        state: directory
        recurse: true
        owner: "{{ console_uid }}"
        group: "{{ console_gid }}"

    - name: Remove orphan SQLite shared-memory files before restart
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ console_root }}/data/ghostroute.db-shm"
        - "{{ console_root }}/data/ghostroute.db-wal"
      when: console_reset_db | bool

    - name: Quarantine Console SQLite database when explicitly requested
      ansible.builtin.shell: |
        set -eu
        stamp="$(date -u +%Y%m%dT%H%M%SZ)"
        mkdir -p "{{ console_root }}/data/backups"
        for file in "{{ console_root }}/data/ghostroute.db" "{{ console_root }}/data/ghostroute.db-shm" "{{ console_root }}/data/ghostroute.db-wal"; do
          if [ -e "$file" ]; then
            mv "$file" "{{ console_root }}/data/backups/$(basename "$file").quarantine-$stamp"
          fi
        done
      when: console_reset_db | bool

    - name: Configure Console collector runtime env
      ansible.builtin.copy:
        dest: "{{ console_root }}/repo/modules/ghostroute-console/vps/.env"
        owner: root
        group: root
        mode: "0640"
        content: |
          GHOSTROUTE_COLLECTOR_MODE=ssh
          GHOSTROUTE_LIVE_MODE=poll
          GHOSTROUTE_LIVE_COLLECTOR_MODE=ssh
          GHOSTROUTE_ALARM_STATE_MODE=ssh
          GHOSTROUTE_COLLECT_DAY_INTERVAL_SECONDS=1800
          GHOSTROUTE_COLLECT_NIGHT_INTERVAL_SECONDS=10800
          GHOSTROUTE_COLLECT_TIMEOUT_SECONDS=900
          GHOSTROUTE_LIGHT_COLLECT_INTERVAL_SECONDS=300
          GHOSTROUTE_LIGHT_COLLECT_TIMEOUT_SECONDS=45
          GHOSTROUTE_HOURLY_RETENTION_DAYS=30
          GHOSTROUTE_DB_BACKUP_MODE=daily
          GHOSTROUTE_BACKUP_RETENTION_DAYS=1
          GHOSTROUTE_DB_BACKUP_MAX_FILES=1
          GHOSTROUTE_COLLECTOR_WRITER_LOCK_WAIT_SECONDS=120
          GHOSTROUTE_READ_MODEL_FLOW_LIMIT=5000
          GHOSTROUTE_READ_MODEL_DNS_LIMIT=20000
          GHOSTROUTE_READ_MODEL_LIVE_DNS_LIMIT=10000
          GHOSTROUTE_READ_MODEL_DEVICE_LIMIT=5000
          GHOSTROUTE_READ_MODEL_ALARM_LIMIT=2000
          GHOSTROUTE_LIVE_RAW_RETENTION_HOURS=6
          GHOSTROUTE_LIVE_POLL_SECONDS=600
          GHOSTROUTE_LIVE_UI_REFRESH_MS=600000
          GHOSTROUTE_LIVE_LIMIT=200
          GHOSTROUTE_READONLY_SSH_HOST=127.0.0.1
          GHOSTROUTE_READONLY_SSH_USER={{ console_readonly_user }}
          GHOSTROUTE_READONLY_SSH_KEY_PATH=/ssh/id_ed25519
          GHOSTROUTE_READONLY_REMOTE_ROOT={{ console_root }}/repo
          GHOSTROUTE_VPS_EGRESS_IP={{ ghostroute_console_egress_ip | default(vps_ssh_host, true) }}
          GHOSTROUTE_VPS_EGRESS_ASN={{ ghostroute_console_egress_asn | default('', true) }}
          GHOSTROUTE_VPS_EGRESS_COUNTRY={{ ghostroute_console_egress_country | default('', true) }}
          GHOSTROUTE_CONSOLE_BUILD_COMMIT={{ console_build_commit }}
          GHOSTROUTE_CONSOLE_BUILD_AT={{ console_build_at }}

    - name: Remove legacy Console container before compose project migration
      ansible.builtin.shell: |
        set -eu
        if docker inspect ghostroute-console >/dev/null 2>&1; then
          project="$(docker inspect ghostroute-console --format '{% raw %}{{ index .Config.Labels "com.docker.compose.project" }}{% endraw %}' 2>/dev/null || true)"
          if [ "$project" != "ghostroute-console" ]; then
            docker rm -f ghostroute-console
          fi
        fi
      changed_when: false

    - name: Remove stale Console collector locks only when Console is stopped
      ansible.builtin.shell: |
        set -eu
        running="$(docker inspect ghostroute-console --format '{% raw %}{{ .State.Running }}{% endraw %}' 2>/dev/null || true)"
        if [ "$running" != "true" ]; then
          rm -f \
            "{{ console_root }}/data/collector.lock" \
            "{{ console_root }}/data/light-collector.lock" \
            "{{ console_root }}/data/live-collector.lock" \
            "{{ console_root }}/data/collector-writer.lock"
        fi
      changed_when: false

    - name: Build Console image before touching the running container
      ansible.builtin.command:
        cmd: docker compose -f modules/ghostroute-console/vps/docker-compose.yml build
        chdir: "{{ console_root }}/repo"
      changed_when: true

    - name: Tag prepared Console image with build commit
      ansible.builtin.shell: |
        set -eu
        docker tag ghostroute-console:latest "ghostroute-console:{{ console_build_commit }}"
      changed_when: false

    - name: Start prepared Console image and verify smoke routes
      block:
        - name: Start Console container from prepared image
          ansible.builtin.command:
            cmd: docker compose -f modules/ghostroute-console/vps/docker-compose.yml up -d --no-build
            chdir: "{{ console_root }}/repo"
          changed_when: true

        - name: Remove empty legacy generic network if present
          ansible.builtin.shell: docker network rm vps_default >/dev/null 2>&1 || true
          changed_when: false

        - name: Check local Console health endpoint
          ansible.builtin.uri:
            url: http://127.0.0.1:3000/api/health
            return_content: true
            status_code: 200
          register: console_health

        - name: Check local Console UI smoke routes
          ansible.builtin.uri:
            url: "http://127.0.0.1:3000{{ item.path }}"
            return_content: true
            status_code: 200
          loop: "{{ console_ui_smoke_routes }}"
          register: console_ui_smoke
          retries: 6
          delay: 5
          until:
            - console_ui_smoke.status == 200
            - item.contains in console_ui_smoke.content

        - name: Check local Console API smoke routes
          ansible.builtin.uri:
            url: "http://127.0.0.1:3000{{ item }}"
            return_content: true
            status_code: 200
          loop: "{{ console_api_smoke_routes }}"
          register: console_api_smoke
          retries: 6
          delay: 5
          until: console_api_smoke.status == 200
      rescue:
        - name: Roll back Console image after failed start or smoke
          ansible.builtin.shell: |
            set -eu
            if docker image inspect "{{ console_rollback_tag }}" >/dev/null 2>&1; then
              docker tag "{{ console_rollback_tag }}" ghostroute-console:latest
              docker compose -f modules/ghostroute-console/vps/docker-compose.yml up -d --no-build
            fi
          args:
            chdir: "{{ console_root }}/repo"
          changed_when: true

        - name: Fail after Console rollback attempt
          ansible.builtin.fail:
            msg: "Console start or smoke failed; rollback to {{ console_rollback_tag }} was attempted."

    - name: Remove stale Console rollback and commit image tags after successful smoke
      ansible.builtin.shell: |
        set -eu
        active_ids="$(docker ps --filter name=ghostroute-console --format '{% raw %}{{ .ID }}{% endraw %}' \
          | xargs -r docker inspect --format '{% raw %}{{ .Image }}{% endraw %}' \
          | sed 's/^sha256://' \
          | sort -u)"
        tmp_refs="$(mktemp)"
        docker image ls ghostroute-console --format '{% raw %}{{ .ID }}	{{ .Repository }}:{{ .Tag }}{% endraw %}' \
          | while IFS="$(printf '\t')" read -r image_id image_ref; do
              case "$image_ref" in
                ghostroute-console:latest|"{{ console_rollback_tag }}")
                  continue
                  ;;
                ghostroute-console:rollback-*|ghostroute-console:[0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f][0-9a-f]*)
                  ;;
                *)
                  continue
                  ;;
              esac
              if printf '%s\n' "$active_ids" | grep -qx "$image_id"; then
                continue
              fi
              printf '%s\n' "$image_ref" >> "$tmp_refs"
            done
        if [ -s "$tmp_refs" ]; then
          xargs -r docker image rm < "$tmp_refs"
        fi
        rm -f "$tmp_refs"
      changed_when: false

    - name: Prune unused Console Docker build cache after successful smoke
      ansible.builtin.command:
        cmd: docker builder prune -af
      changed_when: false

    - name: Show Console local status
      ansible.builtin.debug:
        msg:
          health: "{{ console_health.json }}"
          ui_smoke: "{{ console_ui_smoke.results | map(attribute='item.path') | list }}"
          api_smoke: "{{ console_api_smoke.results | map(attribute='item') | list }}"
