---
- name: Expose GhostRoute Console through dedicated public listener
  hosts: vps_stealth
  become: true
  vars_files:
    - ../../../ansible/secrets/stealth.yml
  vars:
    console_root: /opt/ghostroute-console
    console_public_host: "{{ ghostroute_console_public_host | default('console.' ~ vps_ssh_host ~ '.sslip.io') }}"
    console_public_port: "{{ ghostroute_console_public_port | default(2087) }}"
    console_public_url: "https://{{ console_public_host }}:{{ console_public_port }}"
    console_manage_ufw: "{{ ghostroute_console_manage_ufw | default(true) }}"
    console_reality_backend_port: "{{ xray_reality_listen_port | default(vault_xray_reality_listen_port | default(8443)) }}"
    console_tls_cert_file: "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/{{ console_public_host }}/{{ console_public_host }}.crt"
    console_tls_key_file: "/var/lib/caddy/.local/share/caddy/certificates/acme-v02.api.letsencrypt.org-directory/{{ console_public_host }}/{{ console_public_host }}.key"
    console_nginx_root: "{{ console_root }}/nginx"
    console_buffer_proxy_port: "{{ ghostroute_console_buffer_proxy_port | default(3001) }}"
    console_public_listener: "{{ ghostroute_console_public_listener | default('nginx') }}"
    console_basic_auth_user: "{{ ghostroute_console_basic_auth_user | default('ghostroute') }}"
    console_basic_auth_file: "{{ playbook_dir }}/../data/console-basic-auth.txt"
    console_basic_auth_password: "{{ lookup('ansible.builtin.ini', 'password type=properties file=' ~ console_basic_auth_file) }}"
  tasks:
    - name: Validate dedicated Console public listener
      ansible.builtin.assert:
        that:
          - console_public_port | int > 0
          - console_public_port | int < 65536
          - console_public_port | string != '443'
          - console_public_port | string != '3000'
          - console_public_port | string != (console_reality_backend_port | string)
        fail_msg: "Console public port must be a dedicated non-443 listener and must not collide with Console upstream or Reality backend."

    - name: Ensure Console auth and nginx directories exist
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: directory
        owner: "{{ item.owner | default('root') }}"
        group: "{{ item.group | default('root') }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ console_root }}/auth", mode: "0750", group: "www-data" }
        - { path: "{{ console_nginx_root }}", mode: "0755" }

    - name: Check Console TLS certificate files from Caddy storage
      ansible.builtin.stat:
        path: "{{ item }}"
      loop:
        - "{{ console_tls_cert_file }}"
        - "{{ console_tls_key_file }}"
      register: console_tls_files

    - name: Require existing Console TLS certificate files
      ansible.builtin.assert:
        that:
          - console_tls_files.results | map(attribute='stat.exists') | min
        fail_msg: "Console TLS certificate files were not found in Caddy storage; expose through Caddy once or provide certificate paths before enabling the nginx listener."

    - name: Store Console Basic Auth note on VPS
      ansible.builtin.copy:
        dest: "{{ console_root }}/auth/basic-auth.txt"
        owner: root
        group: root
        mode: "0600"
        content: |
          url={{ console_public_url }}
          username={{ console_basic_auth_user }}
          password={{ console_basic_auth_password }}
      no_log: true

    - name: Hash Console Basic Auth password for nginx
      ansible.builtin.command:
        argv:
          - openssl
          - passwd
          - -apr1
          - "{{ console_basic_auth_password }}"
      register: console_nginx_basic_auth_hash
      changed_when: false
      no_log: true

    - name: Hash Console Basic Auth password for Caddy
      ansible.builtin.command:
        argv:
          - caddy
          - hash-password
          - --plaintext
          - "{{ console_basic_auth_password }}"
      register: console_caddy_basic_auth_hash
      changed_when: false
      no_log: true

    - name: Store Console nginx Basic Auth file
      ansible.builtin.copy:
        dest: "{{ console_root }}/auth/nginx.htpasswd"
        owner: root
        group: www-data
        mode: "0640"
        content: "{{ console_basic_auth_user }}:{{ console_nginx_basic_auth_hash.stdout }}\n"
      no_log: true

    - name: Remove legacy GhostRoute Console Caddy proxy route from shared Caddy
      ansible.builtin.blockinfile:
        path: /etc/caddy/Caddyfile
        marker: "# {mark} GHOSTROUTE CONSOLE READONLY"
        backup: true
        state: absent

    - name: Keep GhostRoute Console certificate managed by Caddy
      ansible.builtin.blockinfile:
        path: /etc/caddy/Caddyfile
        marker: "# {mark} GHOSTROUTE CONSOLE CERTIFICATE"
        insertafter: EOF
        backup: true
        block: |
          https://{{ console_public_host }} {
              respond 404
          }

    - name: Expose GhostRoute Console dedicated listener through Caddy
      ansible.builtin.blockinfile:
        path: /etc/caddy/Caddyfile
        marker: "# {mark} GHOSTROUTE CONSOLE DEDICATED LISTENER"
        insertafter: EOF
        backup: true
        block: |
          https://{{ console_public_host }}:{{ console_public_port }} {
              basicauth {
                  {{ console_basic_auth_user }} {{ console_caddy_basic_auth_hash.stdout }}
              }
              header X-Robots-Tag "noindex, nofollow"
              header Referrer-Policy "no-referrer"
              header -Alt-Svc
              reverse_proxy 127.0.0.1:3000 {
                  header_up Host {http.request.host}
                  header_up X-Forwarded-Host {http.request.host}
                  header_up X-Forwarded-Proto https
                  header_up X-Forwarded-Port {{ console_public_port }}
                  transport http {
                      versions 1.1
                      keepalive off
                  }
                  header_up Connection close
              }
          }
      no_log: true
      when: console_public_listener == 'caddy'

    - name: Remove GhostRoute Console dedicated Caddy listener when nginx owns the public port
      ansible.builtin.replace:
        path: /etc/caddy/Caddyfile
        regexp: "(?ms)^\\s*# BEGIN GHOSTROUTE CONSOLE DEDICATED LISTENER\\n.*?^\\s*# END GHOSTROUTE CONSOLE DEDICATED LISTENER[^\\n]*\\n"
        replace: ""
      when: console_public_listener == 'nginx'

    - name: Remove existing GhostRoute Console L4 bridge
      ansible.builtin.replace:
        path: /etc/caddy/Caddyfile
        regexp: "(?ms)^\\s*# BEGIN GHOSTROUTE CONSOLE L4 BRIDGE\\n.*?^\\s*# END GHOSTROUTE CONSOLE L4 BRIDGE[^\\n]*\\n"
        replace: ""

    - name: Repair layer4 brace after legacy malformed Console bridge
      ansible.builtin.replace:
        path: /etc/caddy/Caddyfile
        regexp: "(?m)(^\\s*route @reality \\{\\n^\\s*proxy 127\\.0\\.0\\.1:{{ console_reality_backend_port }}\\n^\\s*\\}\\n)(^\\s*tls\\n)"
        replace: "\\1            }\n\\2"

    - name: Keep Console listener on HTTP/1 only
      ansible.builtin.blockinfile:
        path: /etc/caddy/Caddyfile
        marker: "    # {mark} GHOSTROUTE CONSOLE H1 H2 ONLY"
        insertafter: "^\\{$"
        backup: true
        block: |
          servers :{{ console_public_port }} {
              protocols h1
          }
      when: console_public_listener == 'caddy'

    - name: Remove Console Caddy HTTP/1 server override when nginx owns the public port
      ansible.builtin.replace:
        path: /etc/caddy/Caddyfile
        regexp: "(?ms)^\\s*# BEGIN GHOSTROUTE CONSOLE H1 H2 ONLY\\n.*?^\\s*# END GHOSTROUTE CONSOLE H1 H2 ONLY[^\\n]*\\n"
        replace: ""
      when: console_public_listener == 'nginx'

    - name: Allow inbound Console dedicated HTTPS port
      community.general.ufw:
        rule: allow
        port: "{{ console_public_port | string }}"
        proto: tcp
        comment: "GhostRoute Console HTTPS"
      when: console_manage_ufw | bool

    - name: Install GhostRoute Console buffer proxy
      ansible.builtin.copy:
        src: buffer-proxy.py
        dest: /usr/local/bin/ghostroute-console-buffer-proxy
        owner: root
        group: root
        mode: "0755"

    - name: Install GhostRoute Console buffer proxy systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/ghostroute-console-buffer-proxy.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=GhostRoute Console buffering proxy
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          ExecStart=/usr/local/bin/ghostroute-console-buffer-proxy
          Environment=GHOSTROUTE_BUFFER_LISTEN_HOST=127.0.0.1
          Environment=GHOSTROUTE_BUFFER_LISTEN_PORT={{ console_buffer_proxy_port }}
          Environment=GHOSTROUTE_BUFFER_UPSTREAM_HOST=127.0.0.1
          Environment=GHOSTROUTE_BUFFER_UPSTREAM_PORT=3000
          Restart=always
          RestartSec=2
          NoNewPrivileges=true
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target

    - name: Install GhostRoute Console nginx config
      ansible.builtin.copy:
        dest: "{{ console_nginx_root }}/nginx.conf"
        owner: root
        group: root
        mode: "0644"
        content: |
          user www-data;
          worker_processes 1;
          pid /run/ghostroute-console-nginx.pid;
          error_log /var/log/ghostroute-console-nginx-error.log warn;

          events {
              worker_connections 1024;
          }

          http {
              access_log /var/log/ghostroute-console-nginx-access.log combined;
              server_tokens off;
              keepalive_timeout 0;
              tcp_nodelay on;
              gzip on;
              gzip_vary on;
              gzip_min_length 512;
              gzip_types text/plain text/css application/json application/javascript text/javascript;

              server {
                  listen 0.0.0.0:{{ console_public_port }} ssl;
                  listen [::]:{{ console_public_port }} ssl;
                  server_name {{ console_public_host }};

                  ssl_certificate {{ console_tls_cert_file }};
                  ssl_certificate_key {{ console_tls_key_file }};
                  ssl_protocols TLSv1.2 TLSv1.3;
                  ssl_buffer_size 1400;

                  auth_basic "GhostRoute Console";
                  auth_basic_user_file {{ console_root }}/auth/nginx.htpasswd;

                  add_header X-Robots-Tag "noindex, nofollow" always;
                  add_header Referrer-Policy "no-referrer" always;

                  location / {
                      proxy_pass http://127.0.0.1:{{ console_buffer_proxy_port }};
                      proxy_http_version 1.0;
                      proxy_set_header Host $http_host;
                      proxy_set_header X-Forwarded-Host $http_host;
                      proxy_set_header X-Forwarded-Proto https;
                      proxy_set_header X-Forwarded-Port $server_port;
                      proxy_set_header Accept-Encoding "";
                      proxy_set_header Connection close;
                      proxy_set_header X-Real-IP $remote_addr;
                      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                      proxy_buffering on;
                      proxy_buffer_size 16k;
                      proxy_buffers 16 64k;
                      proxy_busy_buffers_size 128k;
                      proxy_read_timeout 60s;
                      proxy_send_timeout 60s;
                  }
              }
          }
      when: console_public_listener == 'nginx'

    - name: Install GhostRoute Console nginx systemd unit
      ansible.builtin.copy:
        dest: /etc/systemd/system/ghostroute-console-nginx.service
        owner: root
        group: root
        mode: "0644"
        content: |
          [Unit]
          Description=GhostRoute Console dedicated nginx listener
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=forking
          PIDFile=/run/ghostroute-console-nginx.pid
          ExecStartPre=/usr/sbin/nginx -t -c {{ console_nginx_root }}/nginx.conf
          ExecStart=/usr/sbin/nginx -c {{ console_nginx_root }}/nginx.conf
          ExecReload=/usr/sbin/nginx -s reload -c {{ console_nginx_root }}/nginx.conf
          ExecStop=/usr/sbin/nginx -s quit -c {{ console_nginx_root }}/nginx.conf
          PrivateTmp=true

          [Install]
          WantedBy=multi-user.target
      when: console_public_listener == 'nginx'

    - name: Validate Caddy config
      ansible.builtin.command: caddy validate --config /etc/caddy/Caddyfile
      changed_when: false

    - name: Stop legacy GhostRoute Console nginx listener when Caddy owns the public port
      ansible.builtin.systemd:
        name: ghostroute-console-nginx
        state: stopped
        enabled: false
        daemon_reload: true
      failed_when: false
      when: console_public_listener == 'caddy'

    - name: Reload Caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded

    - name: Restart GhostRoute Console buffer proxy
      ansible.builtin.systemd:
        name: ghostroute-console-buffer-proxy
        state: restarted
        enabled: true
        daemon_reload: true

    - name: Validate GhostRoute Console nginx config
      ansible.builtin.command: /usr/sbin/nginx -t -c {{ console_nginx_root }}/nginx.conf
      changed_when: false
      when: console_public_listener == 'nginx'

    - name: Restart GhostRoute Console nginx listener
      ansible.builtin.systemd:
        name: ghostroute-console-nginx
        state: restarted
        enabled: true
        daemon_reload: true
      when: console_public_listener == 'nginx'

    - name: Check Console public route requires auth
      ansible.builtin.uri:
        url: "{{ console_public_url }}/api/health"
        status_code: 401
        validate_certs: true

    - name: Check Console public route with auth
      ansible.builtin.uri:
        url: "{{ console_public_url }}/api/health"
        url_username: "{{ console_basic_auth_user }}"
        url_password: "{{ console_basic_auth_password }}"
        force_basic_auth: true
        status_code: 200
        validate_certs: true
        return_content: true
      register: console_public_health
      no_log: true

    - name: Check Console public large response with auth
      ansible.builtin.uri:
        url: "{{ console_public_url }}/api/reports/llm-safe"
        url_username: "{{ console_basic_auth_user }}"
        url_password: "{{ console_basic_auth_password }}"
        force_basic_auth: true
        status_code: 200
        validate_certs: true
        return_content: false
        timeout: 30
      register: console_public_large_response
      no_log: true

    - name: Check Console public HTML shell with auth
      ansible.builtin.uri:
        url: "{{ console_public_url }}/"
        url_username: "{{ console_basic_auth_user }}"
        url_password: "{{ console_basic_auth_password }}"
        force_basic_auth: true
        status_code: 200
        validate_certs: true
        return_content: false
        timeout: 30
      register: console_public_html_shell
      no_log: true

    - name: Show Console public URL
      ansible.builtin.debug:
        msg:
          url: "{{ console_public_url }}"
          username: "{{ console_basic_auth_user }}"
          health_ok: "{{ console_public_health.json.ok | default(false) }}"
          snapshots: "{{ console_public_health.json.snapshots | default('n/a') }}"
          large_response_status: "{{ console_public_large_response.status | default('n/a') }}"
          html_shell_status: "{{ console_public_html_shell.status | default('n/a') }}"
