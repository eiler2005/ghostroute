name: ghostroute-console

services:
  ghostroute-console:
    build:
      context: ../app
    image: ghostroute-console:latest
    container_name: ghostroute-console
    restart: unless-stopped
    user: "10000:10000"
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - /opt/ghostroute-console/data:/data
      - /opt/ghostroute-console/repo:/repo:ro
      - /opt/ghostroute-console/ssh:/ssh:ro
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      GHOSTROUTE_CONSOLE_DATA_DIR: /data
      GHOSTROUTE_CONSOLE_REPO_ROOT: /repo
      SSH_KEY_PATH: /ssh/id_ed25519
      ROUTER_USER: ghostroute_readonly
      GHOSTROUTE_COLLECT_INTERVAL_SECONDS: ${GHOSTROUTE_COLLECT_INTERVAL_SECONDS:-300}
      GHOSTROUTE_RAW_RETENTION_DAYS: ${GHOSTROUTE_RAW_RETENTION_DAYS:-7}
      GHOSTROUTE_HOURLY_RETENTION_DAYS: ${GHOSTROUTE_HOURLY_RETENTION_DAYS:-90}
      GHOSTROUTE_BACKUP_RETENTION_DAYS: ${GHOSTROUTE_BACKUP_RETENTION_DAYS:-14}
      GHOSTROUTE_CONSOLE_VPS_QUOTA_BYTES: ${GHOSTROUTE_CONSOLE_VPS_QUOTA_BYTES:-0}
      GHOSTROUTE_CONSOLE_LTE_QUOTA_BYTES: ${GHOSTROUTE_CONSOLE_LTE_QUOTA_BYTES:-0}
      GHOSTROUTE_COLLECTOR_MODE: ${GHOSTROUTE_COLLECTOR_MODE:-disabled}
      GHOSTROUTE_LIVE_MODE: ${GHOSTROUTE_LIVE_MODE:-poll}
      GHOSTROUTE_LIVE_COLLECTOR_MODE: ${GHOSTROUTE_LIVE_COLLECTOR_MODE:-disabled}
      GHOSTROUTE_LIVE_POLL_SECONDS: ${GHOSTROUTE_LIVE_POLL_SECONDS:-2}
      GHOSTROUTE_LIVE_LIMIT: ${GHOSTROUTE_LIVE_LIMIT:-200}
      GHOSTROUTE_READONLY_SSH_USER: ${GHOSTROUTE_READONLY_SSH_USER:-ghostroute_readonly}
      GHOSTROUTE_READONLY_SSH_KEY_PATH: ${GHOSTROUTE_READONLY_SSH_KEY_PATH:-/ssh/id_ed25519}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
