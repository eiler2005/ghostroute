name: ghostroute-console

services:
  ghostroute-console:
    build:
      context: ../app
      args:
        GHOSTROUTE_CONSOLE_BUILD_COMMIT: ${GHOSTROUTE_CONSOLE_BUILD_COMMIT:-unknown}
    image: ghostroute-console:latest
    container_name: ghostroute-console
    restart: unless-stopped
    user: "10000:10000"
    network_mode: host
    read_only: true
    cap_drop: [ALL]
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - /opt/ghostroute-console/data:/data
      - /opt/ghostroute-console/repo:/repo:ro
      - /opt/ghostroute-console/ssh:/ssh:ro
    environment:
      NODE_ENV: production
      GHOSTROUTE_CONSOLE_BUILD_COMMIT: ${GHOSTROUTE_CONSOLE_BUILD_COMMIT:-unknown}
      HOSTNAME: 127.0.0.1
      PORT: 3000
      GHOSTROUTE_CONSOLE_DATA_DIR: /data
      GHOSTROUTE_CONSOLE_REPO_ROOT: /repo
      SSH_KEY_PATH: /ssh/id_ed25519
      ROUTER_USER: ghostroute_readonly
      GHOSTROUTE_COLLECT_INTERVAL_SECONDS: ${GHOSTROUTE_COLLECT_INTERVAL_SECONDS:-300}
      GHOSTROUTE_COLLECT_DAY_INTERVAL_SECONDS: ${GHOSTROUTE_COLLECT_DAY_INTERVAL_SECONDS:-1800}
      GHOSTROUTE_COLLECT_NIGHT_INTERVAL_SECONDS: ${GHOSTROUTE_COLLECT_NIGHT_INTERVAL_SECONDS:-10800}
      GHOSTROUTE_COLLECT_TIMEOUT_SECONDS: ${GHOSTROUTE_COLLECT_TIMEOUT_SECONDS:-900}
      GHOSTROUTE_LIGHT_COLLECT_INTERVAL_SECONDS: ${GHOSTROUTE_LIGHT_COLLECT_INTERVAL_SECONDS:-300}
      GHOSTROUTE_LIGHT_COLLECT_TIMEOUT_SECONDS: ${GHOSTROUTE_LIGHT_COLLECT_TIMEOUT_SECONDS:-45}
      GHOSTROUTE_RAW_RETENTION_DAYS: ${GHOSTROUTE_RAW_RETENTION_DAYS:-7}
      GHOSTROUTE_HOURLY_RETENTION_DAYS: ${GHOSTROUTE_HOURLY_RETENTION_DAYS:-30}
      GHOSTROUTE_DB_BACKUP_MODE: ${GHOSTROUTE_DB_BACKUP_MODE:-daily}
      GHOSTROUTE_BACKUP_RETENTION_DAYS: ${GHOSTROUTE_BACKUP_RETENTION_DAYS:-2}
      GHOSTROUTE_DB_BACKUP_MAX_FILES: ${GHOSTROUTE_DB_BACKUP_MAX_FILES:-2}
      GHOSTROUTE_COLLECTOR_WRITER_LOCK_WAIT_SECONDS: ${GHOSTROUTE_COLLECTOR_WRITER_LOCK_WAIT_SECONDS:-120}
      GHOSTROUTE_READ_MODEL_FLOW_LIMIT: ${GHOSTROUTE_READ_MODEL_FLOW_LIMIT:-5000}
      GHOSTROUTE_READ_MODEL_DNS_LIMIT: ${GHOSTROUTE_READ_MODEL_DNS_LIMIT:-20000}
      GHOSTROUTE_READ_MODEL_LIVE_DNS_LIMIT: ${GHOSTROUTE_READ_MODEL_LIVE_DNS_LIMIT:-10000}
      GHOSTROUTE_READ_MODEL_DEVICE_LIMIT: ${GHOSTROUTE_READ_MODEL_DEVICE_LIMIT:-5000}
      GHOSTROUTE_READ_MODEL_ALARM_LIMIT: ${GHOSTROUTE_READ_MODEL_ALARM_LIMIT:-2000}
      GHOSTROUTE_LIVE_RAW_RETENTION_HOURS: ${GHOSTROUTE_LIVE_RAW_RETENTION_HOURS:-6}
      GHOSTROUTE_CONSOLE_VPS_QUOTA_BYTES: ${GHOSTROUTE_CONSOLE_VPS_QUOTA_BYTES:-0}
      GHOSTROUTE_CONSOLE_LTE_QUOTA_BYTES: ${GHOSTROUTE_CONSOLE_LTE_QUOTA_BYTES:-0}
      GHOSTROUTE_COLLECTOR_MODE: ${GHOSTROUTE_COLLECTOR_MODE:-ssh}
      GHOSTROUTE_LIVE_MODE: ${GHOSTROUTE_LIVE_MODE:-poll}
      GHOSTROUTE_LIVE_COLLECTOR_MODE: ${GHOSTROUTE_LIVE_COLLECTOR_MODE:-ssh}
      GHOSTROUTE_LIVE_POLL_SECONDS: ${GHOSTROUTE_LIVE_POLL_SECONDS:-600}
      GHOSTROUTE_LIVE_UI_REFRESH_MS: ${GHOSTROUTE_LIVE_UI_REFRESH_MS:-600000}
      GHOSTROUTE_LIVE_LIMIT: ${GHOSTROUTE_LIVE_LIMIT:-200}
      GHOSTROUTE_READONLY_SSH_USER: ${GHOSTROUTE_READONLY_SSH_USER:-ghostroute_readonly}
      GHOSTROUTE_READONLY_SSH_KEY_PATH: ${GHOSTROUTE_READONLY_SSH_KEY_PATH:-/ssh/id_ed25519}
      GHOSTROUTE_READONLY_SSH_HOST: ${GHOSTROUTE_READONLY_SSH_HOST:-127.0.0.1}
      GHOSTROUTE_READONLY_REMOTE_ROOT: ${GHOSTROUTE_READONLY_REMOTE_ROOT:-/opt/ghostroute-console/repo}
      GHOSTROUTE_VPS_EGRESS_IP: ${GHOSTROUTE_VPS_EGRESS_IP:-}
      GHOSTROUTE_VPS_EGRESS_ASN: ${GHOSTROUTE_VPS_EGRESS_ASN:-}
      GHOSTROUTE_VPS_EGRESS_COUNTRY: ${GHOSTROUTE_VPS_EGRESS_COUNTRY:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 30s
