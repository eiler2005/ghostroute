<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">GhostRoute router architecture</title>
  <desc id="desc">Sanitized architecture diagram for Channels A, B, C, D, M, managed split routing and the router runtime supervisor.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fb; }
      .panel { fill: #ffffff; stroke: #c8d2dc; stroke-width: 2; rx: 14; }
      .subtle { fill: #eef3f7; stroke: #d5dee7; stroke-width: 1.5; rx: 10; }
      .router { fill: #e9f7ef; stroke: #9ed0b2; stroke-width: 2; rx: 14; }
      .vps { fill: #eef2ff; stroke: #aebcf5; stroke-width: 2; rx: 14; }
      .supervisor { fill: #fff6df; stroke: #e1bd62; stroke-width: 2; rx: 14; }
      .channel { fill: #ffffff; stroke: #aab7c4; stroke-width: 1.5; rx: 9; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #1f2933; }
      .title { font-size: 28px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 700; }
      .small { font-size: 14px; }
      .tiny { font-size: 12px; fill: #52616f; }
      .muted { fill: #52616f; }
      .arrow { stroke: #485866; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow2 { stroke: #2f7d4f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .arrow3 { stroke: #6c5ce7; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 7 6; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#485866"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>
  <text class="text title" x="48" y="56">GhostRoute Architecture</text>
  <text class="text small muted" x="48" y="82">home-first channels, router-managed split routing, targeted reboot recovery</text>

  <rect class="panel" x="44" y="118" width="250" height="448"/>
  <text class="text label" x="68" y="154">Layer 0 / 1</text>
  <text class="text small muted" x="68" y="178">clients and channel entry</text>

  <rect class="channel" x="68" y="210" width="198" height="52"/>
  <text class="text small" x="86" y="232">Channel A</text>
  <text class="text tiny" x="86" y="252">LAN / Wi-Fi / Home Reality</text>

  <rect class="channel" x="68" y="278" width="198" height="52"/>
  <text class="text small" x="86" y="300">Channel B</text>
  <text class="text tiny" x="86" y="320">XHTTP/TLS selected clients</text>

  <rect class="channel" x="68" y="346" width="198" height="52"/>
  <text class="text small" x="86" y="368">Channel C</text>
  <text class="text tiny" x="86" y="388">Naive / HTTPS CONNECT</text>

  <rect class="channel" x="68" y="414" width="198" height="52"/>
  <text class="text small" x="86" y="436">Channel D</text>
  <text class="text tiny" x="86" y="456">Karing -> Caddy naive</text>

  <rect class="channel" x="68" y="482" width="198" height="52"/>
  <text class="text small" x="86" y="504">Channel M</text>
  <text class="text tiny" x="86" y="524">maxtg_bridge service egress</text>

  <rect class="router" x="366" y="118" width="500" height="448"/>
  <text class="text label" x="390" y="154">Layer 2 / ASUS Merlin Router</text>
  <text class="text small muted" x="390" y="178">single owner for policy, runtime and recovery</text>

  <rect class="subtle" x="398" y="210" width="200" height="74"/>
  <text class="text small" x="420" y="236">dnsmasq + ipset</text>
  <text class="text tiny" x="420" y="256">STEALTH_DOMAINS</text>
  <text class="text tiny" x="420" y="274">VPN_STATIC_NETS</text>

  <rect class="subtle" x="632" y="210" width="200" height="74"/>
  <text class="text small" x="654" y="236">dnscrypt-proxy</text>
  <text class="text tiny" x="654" y="256">managed DNS</text>
  <text class="text tiny" x="654" y="274">via sing-box SOCKS</text>

  <rect class="subtle" x="398" y="322" width="434" height="118"/>
  <text class="text small" x="420" y="350">sing-box managed split</text>
  <text class="text tiny" x="420" y="374">inbounds: redirect, reality, B SOCKS, C, D SOCKS, M HTTP</text>
  <text class="text tiny" x="420" y="398">managed destinations -> reality-out</text>
  <text class="text tiny" x="420" y="420">non-managed destinations -> direct-out</text>

  <rect class="supervisor" x="398" y="476" width="434" height="64"/>
  <text class="text small" x="420" y="501">Runtime supervisor</text>
  <text class="text tiny" x="420" y="522">services-start -> boot -> targeted recovery + delayed firewall stabilization</text>

  <rect class="vps" x="938" y="118" width="294" height="448"/>
  <text class="text label" x="966" y="154">Layer 3 / VPS</text>
  <text class="text small muted" x="966" y="178">egress and bridge-scoped service surfaces</text>

  <rect class="channel" x="970" y="232" width="228" height="80"/>
  <text class="text small" x="992" y="260">Reality egress</text>
  <text class="text tiny" x="992" y="282">managed / selected full-VPS</text>
  <text class="text tiny" x="992" y="300">Internet sees VPS identity</text>

  <rect class="channel" x="970" y="366" width="228" height="88"/>
  <text class="text small" x="992" y="394">Channel M reverse listener</text>
  <text class="text tiny" x="992" y="416">Docker bridge scoped</text>
  <text class="text tiny" x="992" y="434">VPS/app may request M-only recover</text>

  <rect class="subtle" x="970" y="492" width="228" height="48"/>
  <text class="text small" x="992" y="520">Internet</text>

  <path class="arrow" d="M266 236 C314 236 334 240 398 240"/>
  <path class="arrow" d="M266 304 C324 304 338 344 398 356"/>
  <path class="arrow" d="M266 372 C324 372 338 372 398 372"/>
  <path class="arrow" d="M266 440 C324 440 338 392 398 392"/>
  <path class="arrow3" d="M266 508 C338 508 328 420 398 420"/>

  <path class="arrow2" d="M598 247 C616 247 620 247 632 247"/>
  <path class="arrow2" d="M732 284 C732 304 700 316 670 322"/>

  <path class="arrow3" d="M832 374 C890 360 914 300 970 276"/>
  <path class="arrow2" d="M832 418 C900 450 930 506 970 516"/>
  <path class="arrow3" d="M970 410 C902 410 888 430 832 420"/>
  <path class="arrow dash" d="M970 432 C900 480 894 508 832 508"/>

  <path class="arrow dash" d="M615 476 C615 456 615 452 615 440"/>
  <path class="arrow dash" d="M615 540 C616 572 612 590 602 612"/>

  <rect class="panel" x="44" y="608" width="1188" height="98"/>
  <text class="text small" x="68" y="636">Recovery invariants</text>
  <text class="text tiny" x="68" y="662">services-start is single-owner. Supervisor starts sing-box first, applies firewall/stealth rules, starts dnscrypt, B, D and M in dependency order.</text>
  <text class="text tiny" x="68" y="684">After reboot it performs delayed firewall stabilization so LAN REDIRECT and managed UDP/443 DROP survive Merlin chain rebuilds.</text>
</svg>
