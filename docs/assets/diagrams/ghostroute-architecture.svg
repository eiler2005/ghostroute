<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1240" viewBox="0 0 2200 1240" role="img" aria-labelledby="title desc">
  <title id="title">GhostRoute Architecture</title>
  <desc id="desc">Home-first managed routing architecture with endpoint devices, ASUS Merlin router, VPS Reality edge, policy-based DNS and internet egress.</desc>
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="15%" r="70%">
      <stop offset="0%" stop-color="#12355f"/>
      <stop offset="42%" stop-color="#061427"/>
      <stop offset="100%" stop-color="#020712"/>
    </radialGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d3760" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#07182e" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="panelCyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#08344b" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#06252d" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="panelPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#24205d" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#100f2d" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="panelGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123d2e" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#092117" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="panelOrange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d2414" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#1f140d" stop-opacity="0.98"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="titleGlow" x="-20%" y="-50%" width="140%" height="220%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#2f8cff"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#3bd672"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
      <path d="M1,1 L11,6 L1,11 Z" fill="#ff9b2f"/>
    </marker>
    <style>
      .bg { fill: url(#bgGlow); }
      .title { font: 700 66px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f5f8ff; letter-spacing: .2px; filter: url(#titleGlow); }
      .title-accent { fill: #82b6ff; }
      .subtitle { font: 500 26px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #b6c4d7; }
      .panel-title { font: 700 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f4f8ff; }
      .panel-subtitle { font: 500 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9fb2c9; }
      .item-title { font: 700 21px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #eff6ff; }
      .item-text { font: 500 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #bcc9d9; }
      .tag { font: 700 17px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dbeafe; }
      .small { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #98a9bf; }
      .flow-label { font: 700 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #dbeafe; }
      .flow-muted { font: 500 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #9db0c7; }
      .panel { filter: url(#softShadow); }
      .box { fill: rgba(7, 18, 34, .72); }
      .stroke-blue { stroke: #4d9aff; }
      .stroke-cyan { stroke: #25d0e8; }
      .stroke-purple { stroke: #8a79ff; }
      .stroke-green { stroke: #42d36d; }
      .stroke-orange { stroke: #ff9b2f; }
      .muted-stroke { stroke: rgba(147, 197, 253, .28); }
      .thin { stroke-width: 2; }
      .medium { stroke-width: 3; }
      .heavy { stroke-width: 5; }
      .dash { stroke-dasharray: 8 10; }
      .no-fill { fill: none; }
      .glow-blue { filter: drop-shadow(0 0 12px rgba(59, 130, 246, .65)); }
      .glow-cyan { filter: drop-shadow(0 0 12px rgba(34, 211, 238, .65)); }
      .glow-green { filter: drop-shadow(0 0 12px rgba(74, 222, 128, .65)); }
      .glow-orange { filter: drop-shadow(0 0 12px rgba(251, 146, 60, .65)); }
    </style>
  </defs>

  <rect class="bg" width="2200" height="1240"/>
  <path d="M0 0H2200V1240H0Z" fill="url(#bgGlow)"/>
  <g opacity=".28">
    <path d="M160 170H2040" class="no-fill muted-stroke thin"/>
    <path d="M160 990H2040" class="no-fill muted-stroke thin"/>
    <path d="M420 165V1020M760 165V1020M1100 165V1020M1440 165V1020M1780 165V1020" class="no-fill muted-stroke thin" opacity=".35"/>
  </g>

  <text x="1100" y="92" text-anchor="middle" class="title">GhostRoute <tspan class="title-accent">Architecture</tspan></text>
  <text x="1100" y="142" text-anchor="middle" class="subtitle">Home-first managed routing: ASUS Merlin -> VPS Reality</text>
  <circle cx="1100" cy="178" r="7" fill="#2f8cff" class="glow-blue"/>
  <path d="M520 178H1086M1114 178H1680" class="no-fill stroke-blue thin" opacity=".55"/>

  <g class="panel">
    <rect x="50" y="220" width="365" height="575" rx="18" fill="url(#panelBlue)" stroke="#5aa7ff" stroke-width="3"/>
    <text x="160" y="284" class="panel-title">Endpoint Devices</text>
    <text x="160" y="315" class="panel-subtitle">Layer 0 client choices</text>
    <g transform="translate(82 260)" class="glow-blue">
      <rect x="0" y="22" width="58" height="34" rx="7" fill="none" stroke="#70b7ff" stroke-width="4"/>
      <path d="M10 56H48M14 22L10 0M44 22L49 0" stroke="#70b7ff" stroke-width="4" stroke-linecap="round"/>
    </g>

    <rect x="82" y="360" width="300" height="68" rx="10" class="box stroke-blue thin"/>
    <text x="142" y="392" class="item-title">Home Wi-Fi / LAN</text>
    <text x="142" y="417" class="item-text">No VPN app required</text>
    <path d="M104 397h22M115 386v22" stroke="#55a7ff" stroke-width="4" stroke-linecap="round"/>

    <rect x="82" y="448" width="300" height="68" rx="10" class="box stroke-blue thin"/>
    <text x="142" y="480" class="item-title">Channel A Clients</text>
    <text x="142" y="505" class="item-text">Home Reality first hop</text>
    <circle cx="115" cy="482" r="18" fill="none" stroke="#55a7ff" stroke-width="4"/>
    <path d="M103 482h24M115 470v24" stroke="#55a7ff" stroke-width="3" stroke-linecap="round"/>

    <rect x="82" y="536" width="300" height="68" rx="10" class="box stroke-blue thin"/>
    <text x="142" y="568" class="item-title">Channel B Clients</text>
    <text x="142" y="593" class="item-text">XHTTP/TLS selected lane</text>
    <path d="M100 570h32M105 555h22M105 585h22" stroke="#55a7ff" stroke-width="4" stroke-linecap="round"/>

    <rect x="82" y="624" width="300" height="88" rx="10" class="box stroke-blue thin"/>
    <text x="142" y="658" class="item-title">Channel C1 Clients</text>
    <text x="142" y="683" class="item-text">Shadowrocket HTTPS</text>
    <text x="142" y="706" class="item-text">Native Naive target</text>
    <path d="M105 654l18 18-18 18M126 654l18 18-18 18" fill="none" stroke="#55a7ff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g class="panel">
    <rect x="510" y="220" width="430" height="575" rx="18" fill="url(#panelCyan)" stroke="#22d3ee" stroke-width="3"/>
    <text x="640" y="284" class="panel-title">Home Edge Router</text>
    <text x="640" y="315" class="panel-subtitle">ASUS Merlin runtime</text>
    <g transform="translate(548 259)" class="glow-cyan">
      <path d="M10 46h58v26H10z" fill="none" stroke="#5eeaff" stroke-width="4" rx="5"/>
      <path d="M18 46V24M58 46V24M24 60h8M40 60h8M56 60h8" stroke="#5eeaff" stroke-width="4" stroke-linecap="round"/>
    </g>

    <rect x="548" y="360" width="354" height="68" rx="10" class="box stroke-cyan thin"/>
    <text x="620" y="392" class="item-title">dnsmasq + ipset</text>
    <text x="620" y="417" class="item-text">Wi-Fi classification</text>
    <path d="M570 382h28M570 394h28M570 406h28" stroke="#5eeaff" stroke-width="4" stroke-linecap="round"/>

    <rect x="548" y="448" width="354" height="76" rx="10" class="box stroke-cyan thin"/>
    <text x="620" y="481" class="item-title">sing-box Inbounds</text>
    <text x="620" y="507" class="item-text">redirect-in, reality-in, B relay, C1</text>
    <path d="M574 484c14-22 34-22 48 0M574 502c14-22 34-22 48 0" fill="none" stroke="#5eeaff" stroke-width="4" stroke-linecap="round"/>

    <rect x="548" y="544" width="354" height="76" rx="10" class="box stroke-cyan thin"/>
    <text x="620" y="577" class="item-title">Managed Split</text>
    <text x="620" y="603" class="item-text">Domains + static CIDRs</text>
    <path d="M570 586h22l14-14M592 586l14 14" fill="none" stroke="#5eeaff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="548" y="640" width="354" height="76" rx="10" class="box stroke-cyan thin"/>
    <text x="620" y="673" class="item-title">Policy-Based DNS</text>
    <text x="620" y="699" class="item-text">Managed to VPS; default home</text>
    <circle cx="588" cy="678" r="23" fill="none" stroke="#5eeaff" stroke-width="4"/>
    <path d="M577 678h22M588 667v22" stroke="#5eeaff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g class="panel">
    <rect x="1030" y="220" width="370" height="575" rx="18" fill="url(#panelPurple)" stroke="#8a79ff" stroke-width="3"/>
    <text x="1160" y="284" class="panel-title">VPS Edge</text>
    <text x="1160" y="315" class="panel-subtitle">Reality egress + DNS</text>
    <g transform="translate(1068 258)" class="glow-blue">
      <path d="M10 34c0-12 12-22 28-22s28 10 28 22-12 22-28 22-28-10-28-22z" fill="none" stroke="#9d8cff" stroke-width="4"/>
      <path d="M18 48v28M58 48v28M18 76c0 9 40 9 40 0" fill="none" stroke="#9d8cff" stroke-width="4" stroke-linecap="round"/>
    </g>

    <rect x="1068" y="360" width="294" height="82" rx="10" class="box stroke-purple thin"/>
    <text x="1138" y="394" class="item-title">Caddy Layer4 :443</text>
    <text x="1138" y="420" class="item-text">SNI / TCP demux</text>
    <path d="M1090 390h28M1090 406h28M1090 422h28" stroke="#9d8cff" stroke-width="4" stroke-linecap="round"/>

    <rect x="1068" y="468" width="294" height="82" rx="10" class="box stroke-purple thin"/>
    <text x="1138" y="502" class="item-title">Xray Reality/Vision</text>
    <text x="1138" y="528" class="item-text">Managed foreign egress</text>
    <path d="M1090 506l18-18 18 18-18 18z" fill="none" stroke="#9d8cff" stroke-width="4" stroke-linejoin="round"/>

    <rect x="1068" y="576" width="294" height="92" rx="10" class="box stroke-purple thin"/>
    <text x="1138" y="610" class="item-title">Unbound :15353</text>
    <text x="1138" y="636" class="item-text">Restricted to Xray bridge</text>
    <text x="1138" y="659" class="item-text">Managed domains only</text>
    <path d="M1092 610h34M1098 626h22M1098 642h22" stroke="#9d8cff" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g class="panel">
    <rect x="1490" y="220" width="365" height="575" rx="18" fill="url(#panelGreen)" stroke="#42d36d" stroke-width="3"/>
    <text x="1610" y="284" class="panel-title">Internet View</text>
    <text x="1610" y="315" class="panel-subtitle">Destination observations</text>
    <g transform="translate(1528 259)" class="glow-green">
      <circle cx="38" cy="38" r="30" fill="none" stroke="#62e887" stroke-width="4"/>
      <path d="M8 38h60M38 8c14 16 14 44 0 60M38 8c-14 16-14 44 0 60" fill="none" stroke="#62e887" stroke-width="4" stroke-linecap="round"/>
    </g>

    <rect x="1528" y="360" width="292" height="92" rx="10" class="box stroke-green thin"/>
    <text x="1598" y="394" class="item-title">Managed Foreign</text>
    <text x="1598" y="420" class="item-text">Web exit: VPS</text>
    <text x="1598" y="443" class="item-text">DNS exit: VPS resolver</text>
    <path d="M1550 406l17 17 35-40" fill="none" stroke="#62e887" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1528" y="482" width="292" height="92" rx="10" class="box stroke-green thin"/>
    <text x="1598" y="516" class="item-title">RU / Direct</text>
    <text x="1598" y="542" class="item-text">Web exit: home RF</text>
    <text x="1598" y="565" class="item-text">DNS exit: home RF</text>
    <path d="M1554 529h42M1575 508v42" stroke="#62e887" stroke-width="4" stroke-linecap="round"/>

    <rect x="1528" y="604" width="292" height="92" rx="10" class="box stroke-green thin"/>
    <text x="1598" y="638" class="item-title">Unknown Default</text>
    <text x="1598" y="664" class="item-text">Home/RF until classified</text>
    <text x="1598" y="687" class="item-text">No blanket .com rule</text>
    <path d="M1576 626c17 0 30 13 30 30s-13 30-30 30-30-13-30-30 13-30 30-30z" fill="none" stroke="#62e887" stroke-width="4"/>
    <path d="M1563 648h26M1563 664h26" stroke="#62e887" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g class="panel">
    <rect x="1900" y="220" width="250" height="575" rx="18" fill="url(#panelOrange)" stroke="#ff9b2f" stroke-width="3"/>
    <text x="2005" y="284" class="panel-title">Operations</text>
    <text x="2005" y="315" class="panel-subtitle">Operator actions</text>
    <g transform="translate(1938 263)" class="glow-orange">
      <circle cx="28" cy="18" r="12" fill="none" stroke="#ffae46" stroke-width="4"/>
      <path d="M8 62c3-22 37-22 40 0" fill="none" stroke="#ffae46" stroke-width="4" stroke-linecap="round"/>
    </g>

    <rect x="1928" y="360" width="194" height="68" rx="10" class="box stroke-orange thin"/>
    <text x="1985" y="395" class="item-title">Deploy</text>
    <text x="1985" y="419" class="item-text">Ansible + verify</text>
    <path d="M1951 392h22l-11-11M1973 392l-11 11" fill="none" stroke="#ffae46" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1928" y="452" width="194" height="68" rx="10" class="box stroke-orange thin"/>
    <text x="1985" y="487" class="item-title">Curate</text>
    <text x="1985" y="511" class="item-text">Add base domains</text>
    <path d="M1948 486h28M1962 472v28" stroke="#ffae46" stroke-width="4" stroke-linecap="round"/>

    <rect x="1928" y="544" width="194" height="68" rx="10" class="box stroke-orange thin"/>
    <text x="1985" y="579" class="item-title">Check</text>
    <text x="1985" y="603" class="item-text">Leaks and health</text>
    <path d="M1949 579l13 13 28-34" fill="none" stroke="#ffae46" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="1928" y="636" width="194" height="84" rx="10" fill="rgba(120, 55, 18, .72)" stroke="#ff9b2f" stroke-width="2"/>
    <text x="1985" y="671" class="item-title">Explicit Lanes</text>
    <text x="1985" y="697" class="item-text">No auto failover</text>
    <path d="M1954 668l14-26 14 26z" fill="none" stroke="#ffae46" stroke-width="4" stroke-linejoin="round"/>
  </g>

  <path d="M415 505H500" class="no-fill stroke-blue heavy glow-blue" marker-end="url(#arrowBlue)"/>
  <text x="458" y="472" text-anchor="middle" class="flow-label">home-first</text>
  <text x="458" y="496" text-anchor="middle" class="flow-muted">Wi-Fi + A/B/C</text>

  <path d="M940 502H1020" class="no-fill stroke-blue heavy glow-blue" marker-end="url(#arrowBlue)"/>
  <text x="980" y="472" text-anchor="middle" class="flow-label">managed</text>
  <text x="980" y="496" text-anchor="middle" class="flow-muted">Reality/Vision</text>

  <path d="M1400 502H1480" class="no-fill stroke-green heavy glow-green" marker-end="url(#arrowGreen)"/>
  <text x="1440" y="472" text-anchor="middle" class="flow-label">VPS exit</text>
  <text x="1440" y="496" text-anchor="middle" class="flow-muted">foreign services</text>

  <path d="M900 682C1110 855 1320 855 1510 666" class="no-fill stroke-green medium glow-green" marker-end="url(#arrowGreen)"/>
  <text x="1200" y="850" text-anchor="middle" class="flow-label">RU / direct / default stays on home RF path</text>

  <path d="M902 676C1010 760 1130 760 1214 674" class="no-fill stroke-purple medium dash" marker-end="url(#arrowBlue)"/>
  <text x="1058" y="742" text-anchor="middle" class="flow-muted">managed DNS: vps-dns-in to Unbound</text>

  <g class="panel">
    <rect x="50" y="875" width="2100" height="205" rx="18" fill="rgba(8, 19, 34, .86)" stroke="rgba(147, 197, 253, .38)" stroke-width="2"/>
    <g transform="translate(95 920)">
      <rect x="0" y="0" width="350" height="112" rx="12" fill="rgba(8, 28, 52, .78)" stroke="#4d9aff" stroke-width="2"/>
      <text x="86" y="43" class="item-title">Home-first by default</text>
      <text x="86" y="72" class="item-text">Carrier sees home endpoint;</text>
      <text x="86" y="96" class="item-text">not direct VPS.</text>
      <path d="M30 62h34M47 45v34" stroke="#4d9aff" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="translate(505 920)">
      <rect x="0" y="0" width="350" height="112" rx="12" fill="rgba(8, 43, 51, .78)" stroke="#22d3ee" stroke-width="2"/>
      <text x="86" y="43" class="item-title">One curated catalog</text>
      <text x="86" y="72" class="item-text">Base domains curated once;</text>
      <text x="86" y="96" class="item-text">runtime files are generated.</text>
      <path d="M28 48h38M28 64h38M28 80h38" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"/>
    </g>
    <g transform="translate(915 920)">
      <rect x="0" y="0" width="350" height="112" rx="12" fill="rgba(30, 25, 66, .78)" stroke="#8a79ff" stroke-width="2"/>
      <text x="86" y="43" class="item-title">DNS consistency</text>
      <text x="86" y="72" class="item-text">Managed DNS uses VPS;</text>
      <text x="86" y="96" class="item-text">RU/default stays home.</text>
      <circle cx="48" cy="64" r="27" fill="none" stroke="#8a79ff" stroke-width="5"/>
    </g>
    <g transform="translate(1325 920)">
      <rect x="0" y="0" width="350" height="112" rx="12" fill="rgba(15, 49, 31, .78)" stroke="#42d36d" stroke-width="2"/>
      <text x="86" y="43" class="item-title">Channel isolation</text>
      <text x="86" y="72" class="item-text">A, B and C are explicit lanes;</text>
      <text x="86" y="96" class="item-text">no silent failover.</text>
      <path d="M48 34l30 12v26c0 24-30 38-30 38S18 96 18 72V46z" fill="none" stroke="#42d36d" stroke-width="5" stroke-linejoin="round"/>
    </g>
    <g transform="translate(1735 920)">
      <rect x="0" y="0" width="350" height="112" rx="12" fill="rgba(54, 31, 16, .78)" stroke="#ff9b2f" stroke-width="2"/>
      <text x="86" y="43" class="item-title">Cold fallback only</text>
      <text x="86" y="72" class="item-text">Legacy WireGuard remains</text>
      <text x="86" y="96" class="item-text">manual emergency recovery.</text>
      <path d="M30 80c8-34 44-34 52 0M56 32v40" fill="none" stroke="#ff9b2f" stroke-width="5" stroke-linecap="round"/>
    </g>
  </g>

  <text x="1100" y="1140" text-anchor="middle" class="small">Managed foreign services: VPS web egress + VPS DNS. RU/direct/default services: home RF web egress + home RF DNS.</text>
</svg>
